const UNIT_OPTIONS = ["pz", "kg", "g", "lt", "ml", "cassa", "conf", "scat"];

const emptyInventoryItem = () => ({
  id: uid(),
  name: "",
  category: "bere", // "bere" | "mangiare"
  unit: "pz",
  supplier: "",
  initial: 0,
  remaining: 0,
});

function InventoryView({ inventory, setInventory, showToast }) {
  const [editing, setEditing] = useState(null);
  const [importOpen, setImportOpen] = useState(false);

  const bere = inventory.filter(i => i.category === "bere");
  const mangiare = inventory.filter(i => i.category === "mangiare");

  const saveItem = (item) => {
    if (inventory.find(i => i.id === item.id)) {
      setInventory(inventory.map(i => i.id === item.id ? item : i));
      showToast("Prodotto aggiornato");
    } else {
      setInventory([...inventory, item]);
      showToast("Prodotto aggiunto");
    }
    setEditing(null);
  };

  const deleteItem = (id) => {
    if (!confirm("Eliminare questo prodotto dall'inventario?")) return;
    setInventory(inventory.filter(i => i.id !== id));
    showToast("Prodotto eliminato");
  };

  const updateQty = (id, newRemaining) => {
    const clamped = Math.max(0, newRemaining);
    setInventory(inventory.map(i => i.id === id ? Object.assign({}, i, { remaining: clamped }) : i));
  };

  const importItems = (parsedItems, mode) => {
    if (mode === "replace") {
      setInventory(parsedItems);
    } else {
      setInventory([...inventory, ...parsedItems]);
    }
    setImportOpen(false);
    showToast("Importati " + parsedItems.length + " prodotti");
  };

  // Sommario
  const totalItems = inventory.length;
  const lowStock = inventory.filter(i => i.initial > 0 && i.remaining / i.initial < 0.25).length;
  const empty = inventory.filter(i => i.remaining === 0).length;

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Inventario</h1>
          <div className="subtitle">{totalItems} prodotti · {bere.length} bere · {mangiare.length} mangiare</div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
          <button className="btn btn-primary" onClick={() => setEditing(emptyInventoryItem())}>+ Nuovo prodotto</button>
        </div>
      </div>

      {/* SOMMARIO */}
      {totalItems > 0 && (
        <div className="inv-summary">
          <div className="stat">
            <div className="stat-label">Prodotti totali</div>
            <div className="stat-value">{totalItems}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Sotto 25%</div>
            <div className={"stat-value " + (lowStock > 0 ? "warn" : "ok")}>{lowStock}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Esauriti</div>
            <div className={"stat-value " + (empty > 0 ? "warn" : "ok")}>{empty}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Bere</div>
            <div className="stat-value">{bere.length}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Mangiare</div>
            <div className="stat-value">{mangiare.length}</div>
          </div>
        </div>
      )}

      {totalItems === 0 && (
        <div className="empty">
          <div className="empty-icon">📦</div>
          <h3>Inventario vuoto</h3>
          <p>Importa il tuo file Excel della spesa o aggiungi i prodotti uno a uno.</p>
          <div style={{display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
            <button className="btn btn-primary" onClick={() => setEditing(emptyInventoryItem())}>+ Nuovo prodotto</button>
          </div>
        </div>
      )}

      {/* SEZIONE BERE */}
      {totalItems > 0 && (
        <div className="inv-section">
          <div className="inv-section-head bere">
            <h2>🍺 Bere</h2>
            <span className="count">{bere.length} {bere.length === 1 ? "prodotto" : "prodotti"}</span>
          </div>
          <div className="inv-section-body">
            {bere.length === 0 ? (
              <div className="inv-empty-section">Nessun prodotto in questa categoria</div>
            ) : (
              bere.map(item => (
                <InventoryRow key={item.id} item={item} onUpdate={updateQty} onEdit={() => setEditing(item)} onDelete={() => deleteItem(item.id)} />
              ))
            )}
          </div>
        </div>
      )}

      {/* SEZIONE MANGIARE */}
      {totalItems > 0 && (
        <div className="inv-section">
          <div className="inv-section-head mangiare">
            <h2>🍔 Mangiare</h2>
            <span className="count">{mangiare.length} {mangiare.length === 1 ? "prodotto" : "prodotti"}</span>
          </div>
          <div className="inv-section-body">
            {mangiare.length === 0 ? (
              <div className="inv-empty-section">Nessun prodotto in questa categoria</div>
            ) : (
              mangiare.map(item => (
                <InventoryRow key={item.id} item={item} onUpdate={updateQty} onEdit={() => setEditing(item)} onDelete={() => deleteItem(item.id)} />
              ))
            )}
          </div>
        </div>
      )}

      {editing && <InventoryEditor item={editing} onSave={saveItem} onCancel={() => setEditing(null)} isNew={!inventory.find(i => i.id === editing.id)} />}
      {importOpen && <InventoryImportModal onImport={importItems} onCancel={() => setImportOpen(false)} existingCount={inventory.length} />}
    </>
  );
}

function InventoryRow({ item, onUpdate, onEdit, onDelete }) {
  const initial = parseFloat(item.initial) || 0;
  const remaining = parseFloat(item.remaining) || 0;
  const pct = initial > 0 ? Math.min(100, Math.max(0, (remaining / initial) * 100)) : 0;
  let level = "high";
  if (initial === 0 || remaining === 0) level = "empty";
  else if (pct < 25) level = "low";
  else if (pct < 50) level = "med";

  return (
    <div className="inv-item">
      <div className="inv-item-info">
        <div className="name">{item.name}</div>
        <div className="meta">
          {item.supplier && <span style={{color:"var(--gold-deep)", fontWeight:600}}>{item.supplier.toUpperCase()} · </span>}
          INIZ. {initial} {item.unit}
          {initial > 0 && " · " + Math.round(pct) + "% RIMASTO"}
        </div>
      </div>
      <div className="inv-progress">
        <div className="inv-bar">
          <div className={"inv-bar-fill " + level} style={{width: pct + "%"}} />
        </div>
        <div className="inv-progress-text">{remaining}/{initial} {item.unit}</div>
      </div>
      <div className="inv-qty">
        <button className="minus" onClick={() => onUpdate(item.id, remaining - 1)} title="-1">−</button>
        <input
          type="number"
          min="0"
          step="any"
          value={remaining}
          onChange={e => {
            const v = e.target.value === "" ? 0 : parseFloat(e.target.value);
            onUpdate(item.id, isNaN(v) ? 0 : v);
          }}
        />
        <button className="plus" onClick={() => onUpdate(item.id, remaining + 1)} title="+1">+</button>
        <span className="unit">{item.unit}</span>
      </div>
      <div className="inv-actions">
        <button className="edit" onClick={onEdit} title="Modifica">✎</button>
        <button className="delete" onClick={onDelete} title="Elimina">🗑</button>
      </div>
    </div>
  );
}

function InventoryEditor({ item, onSave, onCancel, isNew }) {
  const [name, setName] = useState(item.name || "");
  const [category, setCategory] = useState(item.category || "bere");
  const [unit, setUnit] = useState(item.unit || "pz");
  const [customUnit, setCustomUnit] = useState(UNIT_OPTIONS.includes(item.unit) ? "" : (item.unit || ""));
  const [supplier, setSupplier] = useState(item.supplier || "");
  const [initial, setInitial] = useState(item.initial != null ? String(item.initial) : "0");
  const [remaining, setRemaining] = useState(item.remaining != null ? String(item.remaining) : "0");

  const handleSave = () => {
    if (!name.trim()) { alert("Inserisci il nome del prodotto"); return; }
    const finalUnit = unit === "__custom__" ? (customUnit.trim() || "pz") : unit;
    const ini = parseFloat(initial) || 0;
    const rem = parseFloat(remaining) || 0;
    onSave(Object.assign({}, item, {
      name: name.trim(),
      category, unit: finalUnit,
      supplier: supplier.trim(),
      initial: ini, remaining: rem,
    }));
  };

  const initialChanged = (val) => {
    setInitial(val);
    if (isNew) setRemaining(val);
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>{isNew ? "Nuovo prodotto" : "Modifica prodotto"}</h2>
        </div>
        <div className="form-row">
          <div>
            <label>Nome prodotto <span className="req">*</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Es. Birra Moretti 33cl" autoFocus />
          </div>
        </div>
        <div className="form-row" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div>
            <label>Categoria</label>
            <select value={category} onChange={e=>setCategory(e.target.value)}>
              <option value="bere">🍺 Bere</option>
              <option value="mangiare">🍔 Mangiare</option>
            </select>
          </div>
          <div>
            <label>Fornitore</label>
            <input value={supplier} onChange={e=>setSupplier(e.target.value)} placeholder="Es. Ghidoni, Conad..." />
          </div>
        </div>
        <div className="form-row" style={{gridTemplateColumns:"1fr"}}>
          <div>
            <label>Unità</label>
            <select value={UNIT_OPTIONS.includes(unit) ? unit : "__custom__"} onChange={e=>setUnit(e.target.value)}>
              {UNIT_OPTIONS.map(u => <option key={u} value={u}>{u}</option>)}
              <option value="__custom__">altro...</option>
            </select>
          </div>
        </div>
        {unit === "__custom__" && (
          <div className="form-row">
            <div>
              <label>Unità personalizzata</label>
              <input value={customUnit} onChange={e=>setCustomUnit(e.target.value)} placeholder="Es. busta, fusto..." />
            </div>
          </div>
        )}
        <div className="form-row" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div>
            <label>Quantità iniziale</label>
            <input type="number" min="0" step="any" value={initial} onChange={e=>initialChanged(e.target.value)} />
          </div>
          <div>
            <label>Rimanenze</label>
            <input type="number" min="0" step="any" value={remaining} onChange={e=>setRemaining(e.target.value)} />
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>Salva</button>
        </div>
      </div>
    </div>
  );
}

// Parser Excel inventario: cerca foglio "LISTA ORDINI" (formato lista materiale TdP)
// con header: N.ORDINAZIONE | TIPOLOGIA | FORNITORE | IMPORTO UNITARIO | QUANTITÀ | COSTO FINALE
// Se non trova il foglio specifico, fallback su un parser generico
function parseInventoryExcel(workbook) {
  // 1) Cerco il foglio "LISTA ORDINI" (case-insensitive, accetta anche "Lista Ordini", ecc.)
  let sheetName = workbook.SheetNames.find(n => /lista.*ordin/i.test(n));
  if (!sheetName) sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
  if (rows.length === 0) return [];

  // 2) Cerco la riga header
  let headerRowIdx = -1;
  let cols = { name: -1, supplier: -1, qty: -1, unit: -1, category: -1 };
  for (let i = 0; i < Math.min(20, rows.length); i++) {
    const row = rows[i] || [];
    const m = { name: -1, supplier: -1, qty: -1, unit: -1, category: -1 };
    row.forEach((cell, idx) => {
      if (cell == null) return;
      const s = String(cell).toLowerCase().trim();
      // TIPOLOGIA = è il NOME dell'articolo nella lista ordini TdP
      if (m.name === -1 && /^(tipologia|prodotto|nome|articolo|descrizione|item)/.test(s)) m.name = idx;
      else if (m.supplier === -1 && /^(fornitore|supplier|negozio)/.test(s)) m.supplier = idx;
      else if (m.category === -1 && /^(categoria|tipo|reparto|gruppo)$/.test(s)) m.category = idx;
      else if (m.qty === -1 && /(quantit|q\.t|qta|qty|pezzi|^n\.?$|n°)/.test(s)) m.qty = idx;
      else if (m.unit === -1 && /^(unit|u\.m|um|misura)/.test(s)) m.unit = idx;
    });
    if (m.name !== -1) {
      headerRowIdx = i;
      cols = m;
      break;
    }
  }

  // Fallback: nessuna header trovata, prendo le prime colonne
  if (headerRowIdx === -1) {
    headerRowIdx = -1;
    cols = { name: 0, supplier: -1, qty: 1, unit: 2, category: -1 };
  }

  const items = [];
  const startRow = headerRowIdx + 1;
  for (let i = startRow; i < rows.length; i++) {
    const row = rows[i] || [];
    const name = cols.name >= 0 ? row[cols.name] : null;
    if (name == null || name === "") continue;
    const sName = String(name).trim();
    if (!sName) continue;
    // Salto header parziali / totali
    if (/^(totale|total|sub-?total|categoria|reparto|tipologia|n\.ordinazione)$/i.test(sName)) continue;

    // Quantità (può essere vuota — è il caso del file TdP)
    let qty = cols.qty >= 0 ? row[cols.qty] : null;
    qty = parseFloat(qty);
    if (isNaN(qty)) qty = 0;

    // Unità (può essere vuota)
    let unit = cols.unit >= 0 && row[cols.unit] ? String(row[cols.unit]).trim().toLowerCase() : "";
    // Normalizzo unità comuni
    if (unit) {
      if (/^(kg|chilogrammi|chilogrammo)$/.test(unit)) unit = "kg";
      else if (/^(lt|litri|litro|l)$/.test(unit)) unit = "lt";
      else if (/^(ml|millilitri)$/.test(unit)) unit = "ml";
      else if (/^(g|grammi|grammo|gr)$/.test(unit)) unit = "g";
      else if (/^(pz|pezzi|pezzo|pcs|n)$/.test(unit)) unit = "pz";
      else if (/^(cas|cassa|casse)$/.test(unit)) unit = "cassa";
      else if (/^(conf|confezione|confezioni)$/.test(unit)) unit = "conf";
      else if (/^(scat|scatola|scatole)$/.test(unit)) unit = "scat";
    } else {
      unit = "pz"; // default
    }

    // Fornitore
    const supplier = cols.supplier >= 0 && row[cols.supplier] ? String(row[cols.supplier]).trim() : "";

    // Categoria: prima provo la colonna esplicita, poi il fornitore, poi euristica sul nome
    let category = "mangiare";
    if (cols.category >= 0 && row[cols.category]) {
      const c = String(row[cols.category]).toLowerCase();
      if (/(ber|bibit|bevand|drink|alcol|birr|vino|acqua|cola|succh)/.test(c)) category = "bere";
      else if (/(mangi|cib|food|salume|formag|pane|carne|pasta)/.test(c)) category = "mangiare";
    } else {
      // Heuristic dal nome (esteso per coprire i prodotti tipici del file TdP)
      const n = sName.toLowerCase();
      const bereKeywords = [
        "birra","vino","acqua","coca","cola","fanta","sprite","spritz","aperol","caff","caffe","caffè",
        "the","tè","succo","bevand","prosecco","rosso","bianco","moretti","peroni","heineken","nastro",
        "ichnusa","red bull","amaro","gin","vodka","rum","tequila","jager","jäger","montenegro",
        "campari","triple sec","vermut","tonica","lemonsoda","sciroppo","ghiaccio","cocktail",
        "bicchier","cannucc","pepsi","soda","bif"
      ];
      const mangiareKeywords = [
        "salsicc","wurstel","cotolett","nugget","pane","piad","pizza","panin","hamburg","carne",
        "patat","verdur","salsa","ketchup","maion","senape","formag","prosciutto","salume",
        "pasta","riso","sale","zucchero","limone","menta","rosmarino"
      ];
      if (bereKeywords.some(k => n.includes(k))) category = "bere";
      else if (mangiareKeywords.some(k => n.includes(k))) category = "mangiare";
      else category = "mangiare"; // default
    }

    items.push({
      id: uid(),
      name: sName,
      category, unit, supplier,
      initial: qty,
      remaining: qty,
    });
  }
  return items;
}

function InventoryImportModal({ onImport, onCancel, existingCount }) {
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const fileInputRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true);
    setError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true });
        const items = parseInventoryExcel(wb);
        if (items.length === 0) {
          setError("Nessun prodotto trovato nel file. Verifica che ci sia almeno una colonna con i nomi e una con le quantità.");
        } else {
          setParsed(items);
        }
      } catch (err) {
        setError("Errore lettura file: " + err.message);
      } finally {
        setLoading(false);
      }
    };
    reader.onerror = () => { setError("Impossibile leggere il file"); setLoading(false); };
    reader.readAsArrayBuffer(file);
  };

  const setCategory = (idx, newCat) => {
    const updated = parsed.slice();
    updated[idx] = Object.assign({}, updated[idx], { category: newCat });
    setParsed(updated);
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>Importa inventario da Excel</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
            Carica il file con la lista dei prodotti acquistati.
          </div>
        </div>

        {!parsed && !loading && (
          <>
            <div style={{padding:"24px", background:"var(--cream-soft)", border:"1.5px dashed var(--ink)", borderRadius:4, textAlign:"center", marginBottom: 14}}>
              <div style={{fontSize:48, marginBottom:8}}>📊</div>
              <p style={{marginBottom:14, fontStyle:"italic"}}>Seleziona il file .xlsx con la lista materiale</p>
              <input ref={fileInputRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}} />
              <button className="btn btn-primary" onClick={() => fileInputRef.current && fileInputRef.current.click()}>
                Scegli file Excel
              </button>
            </div>
            <div style={{fontSize:12, color:"var(--ink-soft)", fontStyle:"italic"}}>
              <strong>Cosa cerca:</strong> il foglio "LISTA ORDINI" con colonne <em>TIPOLOGIA, FORNITORE, QUANTITÀ</em>. Funziona anche con altri layout (riconosce automaticamente nome, fornitore, quantità, unità). La categoria <em>bere/mangiare</em> viene dedotta dal nome dell'articolo (puoi correggerla nella preview).
            </div>
          </>
        )}

        {loading && <div style={{textAlign:"center", padding:30}}>Lettura file in corso...</div>}

        {error && (
          <div style={{padding:14, background:"#fff", border:"1.5px solid var(--terracotta-dark)", borderRadius:3, color:"var(--terracotta-dark)", marginBottom:14}}>
            ⚠ {error}
          </div>
        )}

        {parsed && (
          <>
            <div style={{padding:12, background:"rgba(45,143,90,0.1)", border:"1.5px solid var(--green-field)", borderRadius:3, marginBottom:14}}>
              ✓ Trovati <strong>{parsed.length} prodotti</strong>: {parsed.filter(p=>p.category==="bere").length} bere · {parsed.filter(p=>p.category==="mangiare").length} mangiare.
              <div style={{fontSize:12, marginTop:6, fontStyle:"italic"}}>Controlla la categoria di ciascuno e correggi prima di importare (click sui bottoni).</div>
            </div>
            <div className="import-preview">
              {parsed.map((it, idx) => (
                <div key={it.id} className="import-team-block" style={{borderLeftColor: it.category==="bere" ? "#2a4a8c" : "#a04420"}}>
                  <div style={{display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr auto", gap:8, alignItems:"center"}}>
                    <div>
                      <h4 style={{fontFamily:"'Fraunces', serif", fontSize:14, fontWeight:600, letterSpacing:0}}>{it.name}</h4>
                      {it.supplier && <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--gold-deep)", marginTop:2, letterSpacing:"0.06em"}}>{it.supplier.toUpperCase()}</div>}
                    </div>
                    <span className="count">{it.initial || "?"} {it.unit}</span>
                    <div style={{display:"flex", gap:4}}>
                      <button
                        className={"btn btn-sm " + (it.category === "bere" ? "btn-primary" : "")}
                        style={{flex:1, fontSize:10}}
                        onClick={() => setCategory(idx, "bere")}
                      >🍺 Bere</button>
                      <button
                        className={"btn btn-sm " + (it.category === "mangiare" ? "btn-primary" : "")}
                        style={{flex:1, fontSize:10}}
                        onClick={() => setCategory(idx, "mangiare")}
                      >🍔 Mangiare</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="modal-actions">
              <button className="btn" onClick={onCancel}>Annulla</button>
              {existingCount > 0 && (
                <button className="btn" onClick={() => onImport(parsed, "append")}>
                  Aggiungi a esistenti ({existingCount})
                </button>
              )}
              <button className="btn btn-primary" onClick={() => {
                if (existingCount > 0 && !confirm("Vuoi SOSTITUIRE i " + existingCount + " prodotti esistenti?")) return;
                onImport(parsed, "replace");
              }}>
                {existingCount > 0 ? "Sostituisci tutto" : "Importa"}
              </button>
            </div>
          </>
        )}

        {!parsed && (
          <div className="modal-actions">
            <button className="btn" onClick={onCancel}>Chiudi</button>
          </div>
        )}
      </div>
    </div>
  );
}

function ShiftsView({ staff, setStaff, positions, setPositions, shifts, setShifts, showToast }) {
  const [addingStaff, setAddingStaff] = useState(false);
  const [newName, setNewName] = useState("");
  const [newPreferred, setNewPreferred] = useState("");
  const [newNote, setNewNote] = useState("");

  const [addingPos, setAddingPos] = useState(false);
  const [newPosName, setNewPosName] = useState("");

  // Picker per aggiungere persona a una cella: { iso, posId } | null
  const [picker, setPicker] = useState(null);
  // Editor persona staff (per modifica/eliminazione): persona | null
  const [editingStaff, setEditingStaff] = useState(null);

  // Helpers: ogni cella è un ARRAY di staff IDs
  const shiftKey = (iso, posId) => iso + "::" + posId;
  const getAssigned = (iso, posId) => {
    const v = shifts[shiftKey(iso, posId)];
    if (!v) return [];
    // Backward-compat: se per caso fosse string (vecchio formato), la converto in array
    if (typeof v === "string") return [v];
    return Array.isArray(v) ? v : [];
  };

  const addAssignment = (iso, posId, staffId) => {
    if (!staffId) return;
    const key = shiftKey(iso, posId);
    const current = getAssigned(iso, posId);
    if (current.includes(staffId)) return; // già presente
    setShifts(Object.assign({}, shifts, { [key]: [...current, staffId] }));
  };

  const removeAssignment = (iso, posId, staffId) => {
    const key = shiftKey(iso, posId);
    const current = getAssigned(iso, posId);
    const filtered = current.filter(id => id !== staffId);
    const newShifts = Object.assign({}, shifts);
    if (filtered.length === 0) delete newShifts[key];
    else newShifts[key] = filtered;
    setShifts(newShifts);
  };

  const addStaff = () => {
    if (!newName.trim()) { alert("Inserisci almeno il nome"); return; }
    setStaff([...staff, {
      id: uid(),
      name: newName.trim(),
      preferredPosition: newPreferred || "",
      note: newNote.trim()
    }]);
    setNewName(""); setNewPreferred(""); setNewNote("");
    setAddingStaff(false);
    showToast("Persona aggiunta allo staff");
  };

  const updateStaff = (updated) => {
    setStaff(staff.map(s => s.id === updated.id ? updated : s));
    setEditingStaff(null);
    showToast("Persona aggiornata");
  };

  const removeStaff = (id) => {
    if (!confirm("Rimuovere DEFINITIVAMENTE questa persona dallo staff?\nLe sue assegnazioni verranno cancellate.")) return;
    const newShifts = {};
    Object.entries(shifts).forEach(([k, v]) => {
      const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
      const filtered = arr.filter(sid => sid !== id);
      if (filtered.length > 0) newShifts[k] = filtered;
    });
    setShifts(newShifts);
    setStaff(staff.filter(s => s.id !== id));
    setEditingStaff(null);
    showToast("Persona rimossa");
  };

  const addPosition = () => {
    if (!newPosName.trim()) { alert("Inserisci il nome della posizione"); return; }
    const colors = ["#c8553d", "#1a5d3a", "#b8870f", "#2d8f5a", "#7a5cab", "#4a6fa5", "#a04668", "#5d8a4e"];
    const used = positions.map(p => p.color);
    const color = colors.find(c => !used.includes(c)) || "#555";
    setPositions([...positions, { id: "pos_" + uid(), name: newPosName.trim(), color }]);
    setNewPosName("");
    setAddingPos(false);
    showToast("Posizione aggiunta");
  };

  const removePosition = (posId) => {
    if (positions.length <= 1) { alert("Devi avere almeno una posizione."); return; }
    if (!confirm("Rimuovere questa posizione? Tutte le assegnazioni per questa posizione verranno cancellate.")) return;
    const newShifts = {};
    Object.entries(shifts).forEach(([k, v]) => { if (!k.endsWith("::" + posId)) newShifts[k] = v; });
    setShifts(newShifts);
    setPositions(positions.filter(p => p.id !== posId));
    showToast("Posizione rimossa");
  };

  const clearAllShifts = () => {
    if (!confirm("Cancellare TUTTE le assegnazioni dei turni? L'azione è irreversibile.")) return;
    setShifts({});
    showToast("Turni svuotati");
  };

  // Stats: assegnazioni per persona (conto tutte le occorrenze, anche se in array)
  const staffStats = useMemo(() => {
    const counts = {};
    staff.forEach(s => { counts[s.id] = 0; });
    Object.values(shifts).forEach(v => {
      const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
      arr.forEach(sid => { if (counts[sid] != null) counts[sid]++; });
    });
    return counts;
  }, [shifts, staff]);

  const totalAssignments = Object.values(shifts).reduce((acc, v) => {
    const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
    return acc + arr.length;
  }, 0);

  const filledCells = Object.values(shifts).filter(v => {
    const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
    return arr.length > 0;
  }).length;
  const totalCells = TOURNAMENT_DATES.length * positions.length;

  // Lookup map per nome staff
  const staffById = useMemo(() => {
    const m = {};
    staff.forEach(s => { m[s.id] = s; });
    return m;
  }, [staff]);

  // Per la modale picker: ID delle persone già in quella cella
  const pickerCurrent = picker ? getAssigned(picker.iso, picker.posId) : [];
  const pickerAvailable = picker ? staff.filter(s => !pickerCurrent.includes(s.id)) : [];
  // Ordino i disponibili mettendo prima chi ha quella posizione come preferita
  const pickerSorted = picker ? pickerAvailable.slice().sort((a, b) => {
    const aPref = a.preferredPosition === picker.posId ? 0 : 1;
    const bPref = b.preferredPosition === picker.posId ? 0 : 1;
    if (aPref !== bPref) return aPref - bPref;
    return a.name.localeCompare(b.name);
  }) : [];

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Turni Staff</h1>
          <div className="subtitle">
            {totalAssignments} assegnazioni · {filledCells}/{totalCells} celle coperte
          </div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {totalAssignments > 0 && <button className="btn btn-sm btn-danger" onClick={clearAllShifts}>Svuota tutto</button>}
        </div>
      </div>

      {/* PANNELLO STAFF */}
      <div className="shifts-panel">
        <div className="shifts-panel-head">
          <h3>Staff ({staff.length})</h3>
          <button className="btn btn-sm btn-primary" onClick={() => setAddingStaff(!addingStaff)}>
            {addingStaff ? "Annulla" : "+ Aggiungi persona"}
          </button>
        </div>

        {addingStaff && (
          <div style={{display:"grid", gridTemplateColumns:"2fr 1.5fr 2fr auto", gap:8, marginBottom:14, alignItems:"end"}}>
            <div>
              <label>Nome <span className="req">*</span></label>
              <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Mario Rossi" autoFocus />
            </div>
            <div>
              <label>Posizione desiderata</label>
              <select value={newPreferred} onChange={e=>setNewPreferred(e.target.value)}>
                <option value="">— Nessuna preferenza —</option>
                {positions.map(p => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            </div>
            <div>
              <label>Note</label>
              <input value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Disponibile solo dopo le 21" />
            </div>
            <button className="btn btn-gold" onClick={addStaff}>Salva</button>
          </div>
        )}

        {staff.length === 0 ? (
          <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"12px"}}>
            Nessuna persona nello staff. Aggiungile per poterle assegnare ai turni.
          </p>
        ) : (
          <div className="staff-list">
            {staff.map(s => {
              const pref = s.preferredPosition ? positions.find(p => p.id === s.preferredPosition) : null;
              return (
                <span key={s.id} className="staff-chip" title={s.note || ""}>
                  <span className="name">{s.name}</span>
                  {pref && (
                    <span className="position-chip" style={{background: pref.color, padding:"2px 8px", fontSize:11, letterSpacing:"0.06em"}}>
                      {pref.name}
                    </span>
                  )}
                  <span className="phone" style={{color:"var(--gold-deep)", fontWeight:600}}>
                    {staffStats[s.id] || 0} turni
                  </span>
                  <button onClick={() => setEditingStaff(s)} title="Modifica / elimina" className="chip-edit-btn">✎</button>
                </span>
              );
            })}
          </div>
        )}
      </div>

      {/* PANNELLO POSIZIONI */}
      <div className="shifts-panel">
        <div className="shifts-panel-head">
          <h3>Posizioni ({positions.length})</h3>
          <button className="btn btn-sm btn-primary" onClick={() => setAddingPos(!addingPos)}>
            {addingPos ? "Annulla" : "+ Aggiungi posizione"}
          </button>
        </div>

        {addingPos && (
          <div style={{display:"grid", gridTemplateColumns:"1fr auto", gap:8, marginBottom:14, alignItems:"end"}}>
            <div>
              <label>Nome posizione <span className="req">*</span></label>
              <input value={newPosName} onChange={e=>setNewPosName(e.target.value)} placeholder="Es. Pizza, Griglia, Arbitro..." autoFocus />
            </div>
            <button className="btn btn-gold" onClick={addPosition}>Salva</button>
          </div>
        )}

        <div className="positions-list">
          {positions.map(p => (
            <span key={p.id} className="position-chip" style={{background: p.color}}>
              {p.name}
              <button onClick={() => removePosition(p.id)} title="Rimuovi">✕</button>
            </span>
          ))}
        </div>
      </div>

      {/* MATRICE TURNI */}
      {staff.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">👥</div>
          <h3>Aggiungi persone allo staff</h3>
          <p>Prima di poter compilare i turni devi aggiungere almeno una persona qui sopra.</p>
        </div>
      ) : (
        <div className="shifts-matrix-wrap">
          <table className="shifts-matrix">
            <thead>
              <tr>
                <th className="date-col">Serata</th>
                {positions.map(p => (
                  <th key={p.id} style={{background: p.color, color: "var(--cream)"}}>{p.name}</th>
                ))}
                <th className="total-col-header">Tot</th>
              </tr>
            </thead>
            <tbody>
              {TOURNAMENT_DATES.map(d => {
                // Totale per riga (questa serata)
                const rowTotal = positions.reduce((acc, p) => acc + getAssigned(d.iso, p.id).length, 0);
                return (
                  <tr key={d.iso}>
                    <td className="date-cell">
                      <div className="date-label">{d.label}</div>
                      <span className={"date-phase " + (d.phase === "Finali" ? "finali" : "")}>{d.phase}</span>
                    </td>
                    {positions.map(p => {
                      const assigned = getAssigned(d.iso, p.id);
                      return (
                        <td key={p.id} className={"shift-cell " + (assigned.length > 0 ? "assigned" : "empty")}>
                          <div className="assigned-stack">
                            {assigned.map(sid => {
                              const person = staffById[sid];
                              if (!person) return null;
                              return (
                                <span key={sid} className="assigned-pill">
                                  {person.name}
                                  <button onClick={() => removeAssignment(d.iso, p.id, sid)} title="Rimuovi">✕</button>
                                </span>
                              );
                            })}
                            <button
                              className="assign-add-btn"
                              onClick={() => setPicker({ iso: d.iso, posId: p.id })}
                              title="Aggiungi persona"
                            >
                              +
                            </button>
                          </div>
                        </td>
                      );
                    })}
                    <td className={"total-cell " + (rowTotal === 0 ? "zero" : "")}>{rowTotal}</td>
                  </tr>
                );
              })}
              {/* RIGA TOTALI PER COLONNA */}
              <tr className="totals-row">
                <td className="date-cell totals-label">Totale per area</td>
                {positions.map(p => {
                  const colTotal = TOURNAMENT_DATES.reduce((acc, d) => acc + getAssigned(d.iso, p.id).length, 0);
                  return (
                    <td key={p.id} className={"total-cell " + (colTotal === 0 ? "zero" : "")}>{colTotal}</td>
                  );
                })}
                <td className="total-cell grand-total">{totalAssignments}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {/* RIEPILOGO TURNI PER PERSONA */}
      {staff.length > 0 && totalAssignments > 0 && (
        <div className="shifts-panel" style={{marginTop:24}}>
          <div className="shifts-panel-head">
            <h3>Riepilogo turni per persona</h3>
          </div>
          <div className="staff-summary">
            {staff
              .map(s => ({ ...s, count: staffStats[s.id] || 0 }))
              .sort((a,b) => b.count - a.count)
              .map(s => (
                <div key={s.id} className="staff-summary-item">
                  <div className="name">{s.name}</div>
                  <div className="count">{s.count}<span className="count-label" style={{marginLeft:6, fontSize:11}}>{s.count === 1 ? "turno" : "turni"}</span></div>
                </div>
              ))}
          </div>
        </div>
      )}

      {/* MODALE PICKER: aggiungi persona a cella */}
      {picker && (
        <div className="modal-overlay" onClick={() => setPicker(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 480}}>
            <div className="modal-head">
              <h2>Aggiungi a {positions.find(p => p.id === picker.posId) ? positions.find(p => p.id === picker.posId).name : ""}</h2>
              <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
                {TOURNAMENT_DATES.find(d => d.iso === picker.iso) ? TOURNAMENT_DATES.find(d => d.iso === picker.iso).label : ""}
                {pickerCurrent.length > 0 && " · " + pickerCurrent.length + " già assegnati"}
              </div>
            </div>
            {pickerSorted.length === 0 ? (
              <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"20px"}}>
                Tutte le persone dello staff sono già assegnate a questa cella.
              </p>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:6, maxHeight:400, overflowY:"auto"}}>
                {pickerSorted.map(s => {
                  const isPref = s.preferredPosition === picker.posId;
                  return (
                    <button
                      key={s.id}
                      className="btn"
                      style={{
                        textAlign:"left",
                        justifyContent:"space-between",
                        display:"flex",
                        alignItems:"center",
                        padding:"10px 14px",
                        background: isPref ? "rgba(232,185,72,0.15)" : "var(--paper)",
                        borderColor: isPref ? "var(--gold-deep)" : "var(--ink)",
                      }}
                      onClick={() => { addAssignment(picker.iso, picker.posId, s.id); setPicker(null); }}
                    >
                      <span style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:15, textTransform:"none", letterSpacing:0}}>
                        {s.name}
                        {isPref && <span style={{marginLeft:8, fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--gold-deep)", letterSpacing:"0.1em"}}>★ DESIDERATA</span>}
                      </span>
                      <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:"var(--ink-soft)"}}>
                        {staffStats[s.id] || 0} turni
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
            <div className="modal-actions">
              <button className="btn" onClick={() => setPicker(null)}>Chiudi</button>
            </div>
          </div>
        </div>
      )}

      {/* MODALE MODIFICA PERSONA STAFF */}
      {editingStaff && (
        <StaffEditModal
          person={editingStaff}
          positions={positions}
          turniCount={staffStats[editingStaff.id] || 0}
          onSave={updateStaff}
          onDelete={() => removeStaff(editingStaff.id)}
          onCancel={() => setEditingStaff(null)}
        />
      )}
    </>
  );
}

function StaffEditModal({ person, positions, turniCount, onSave, onDelete, onCancel }) {
  const [name, setName] = useState(person.name || "");
  const [preferred, setPreferred] = useState(person.preferredPosition || "");
  const [note, setNote] = useState(person.note || "");

  const handleSave = () => {
    if (!name.trim()) { alert("Il nome non può essere vuoto"); return; }
    onSave(Object.assign({}, person, {
      name: name.trim(),
      preferredPosition: preferred,
      note: note.trim()
    }));
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 500}}>
        <div className="modal-head">
          <h2>Modifica persona</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
            Assegnata a {turniCount} {turniCount === 1 ? "turno" : "turni"}
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Nome <span className="req">*</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} autoFocus />
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Posizione desiderata</label>
            <select value={preferred} onChange={e=>setPreferred(e.target.value)}>
              <option value="">— Nessuna preferenza —</option>
              {positions.map(p => (
                <option key={p.id} value={p.id}>{p.name}</option>
              ))}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Note</label>
            <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Disponibile solo dopo le 21" />
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-danger" onClick={onDelete} style={{marginRight:"auto"}}>🗑 Elimina</button>
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>Salva</button>
        </div>
      </div>
    </div>
  );
}

function AdminView({ config, setConfig, teams, setTeams, matches, setMatches, onRegenerate, showToast }) {
  const [nameDraft, setNameDraft] = useState(config.tournamentName || "");

  const exportJSON = () => {
    const data = { config, teams, matches, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "tdp-backup-" + Date.now() + ".json";
    a.click();
    URL.revokeObjectURL(url);
    showToast("Backup esportato");
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm("Importare i dati? Sovrascriverà tutto.")) return;
        if (data.config) setConfig(data.config);
        if (data.teams) setTeams(data.teams);
        if (data.matches) setMatches(data.matches);
        showToast("Dati importati");
      } catch (err) { alert("File non valido"); }
    };
    reader.readAsText(file);
  };

  const exportExcel = () => {
    try {
      const wb = XLSX.utils.book_new();
      const playersRows = [["", "GIOCATORE", "DATA DI NASCITA", "LUOGO DI NASCITA", "INDIRIZZO", "N. CARTA DI IDENTITÀ", "CODICE FISCALE"]];
      teams.forEach((t) => {
        // Flag True in colonna A per la riga del nome squadra (formato GIOCATORI 2026)
        playersRows.push([true, t.name, null, null, null, null, null]);
        (t.players || []).forEach(p => {
          playersRows.push(["", p.name, p.birthDate || "", p.birthPlace || "", p.address || "", p.idCard || "", p.fiscalCode || ""]);
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(playersRows), "GIOCATORI 2026");

      const teamRows = [["Squadra", "Girone", "Capitano", "Contatto", "N. Giocatori"]];
      teams.forEach(t => {
        const cap = (t.players || []).find(p => p.isCaptain);
        teamRows.push([t.name, t.girone || "", cap ? cap.name : "", t.contact || "", (t.players||[]).length]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(teamRows), "SQUADRE");

      if (matches.length > 0) {
        const matchRows = [["Girone", "Casa", "Trasferta", "Pt Casa", "Pt Trasf", "Giocata", "Data", "Campo"]];
        matches.forEach(m => {
          const h = teams.find(t => t.id === m.home);
          const a = teams.find(t => t.id === m.away);
          matchRows.push([m.girone, h ? h.name : "", a ? a.name : "", m.homeScore != null ? m.homeScore : "", m.awayScore != null ? m.awayScore : "", m.played ? "SI" : "NO", m.date || "", m.field || ""]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matchRows), "PARTITE");
      }
      XLSX.writeFile(wb, "TdP-export-" + new Date().toISOString().slice(0,10) + ".xlsx");
      showToast("Excel esportato");
    } catch (e) {
      alert("Errore export: " + e.message);
    }
  };

  const wipeAll = () => {
    if (!confirm("ATTENZIONE: cancellare TUTTI i dati? L'azione è irreversibile.")) return;
    if (!confirm("Sei davvero sicuro?")) return;
    setTeams([]); setMatches([]);
    setConfig({ tournamentName: "Torneo del Prete 2026", initialized: false });
    showToast("Dati cancellati");
  };

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Pannello Admin</h1>
          <div className="subtitle">Solo per lo staff.</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Configurazione</h3>
          <div className="form-row">
            <div>
              <label>Nome del torneo</label>
              <input value={nameDraft} onChange={e=>setNameDraft(e.target.value)} />
            </div>
          </div>
          <button className="btn btn-primary" onClick={()=>{ setConfig(Object.assign({}, config, {tournamentName: nameDraft})); showToast("Salvato"); }}>Salva nome</button>
        </div>

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Calendario gironi</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>
            Genera le partite dei gironi. <strong>Sovrascrive i risultati esistenti.</strong>
            <br/>Squadre assegnate ai gironi: <strong>{teams.filter(t=>t.girone).length}</strong> su {teams.length}
          </p>
          <button className="btn" onClick={onRegenerate}>Genera / Rigenera calendario</button>
        </div>

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Export Excel</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Esporta squadre, giocatori e partite in .xlsx.</p>
          <button className="btn btn-gold" onClick={exportExcel}>📊 Esporta Excel</button>
        </div>

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Backup JSON</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Backup completo dei dati in JSON.</p>
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            <button className="btn" onClick={exportJSON}>Esporta</button>
            <label className="btn" style={{cursor:"pointer"}}>
              Importa
              <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}} />
            </label>
          </div>
        </div>

        <div className="card" style={{borderColor:"var(--terracotta-dark)", boxShadow:"4px 4px 0 var(--terracotta-dark)"}}>
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em", color:"var(--terracotta-dark)"}}>Zona pericolo</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Cancella tutti i dati.</p>
          <button className="btn btn-danger" onClick={wipeAll}>Cancella tutto</button>
        </div>
      </div>
    </>
  );
}

document.getElementById("loading").style.display = "none";
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
