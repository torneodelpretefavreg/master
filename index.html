// Parsing data CassaPro: formato "dd/mm/yyyy, HH:MM:SS" (italiano)
function parseCassaProDate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  const m = String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s+(\d{1,2}):(\d{2}):?(\d{0,2})/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]), parseInt(m[6] || "0"));
}

// Estrae solo la parte data (yyyy-mm-dd) dal timestamp CassaPro
function dateOnlyFromCassa(s) {
  const d = parseCassaProDate(s);
  if (!d || isNaN(d.getTime())) return "";
  return d.toISOString().slice(0, 10);
}

// Riconosce il centro (CIBO/FRITTI/BAR) dalla stringa salvata da CassaPro
function getCentroKey(centro) {
  if (!centro) return "altro";
  const s = String(centro).toUpperCase();
  if (s.includes("CIBO")) return "cibo";
  if (s.includes("FRITTI")) return "fritti";
  if (s.includes("BAR")) return "bar";
  return "altro";
}

function CassaView({ db }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedDate, setSelectedDate] = useState("today"); // "today" | "ALL" | "YYYY-MM-DD"
  const [expandedReceipt, setExpandedReceipt] = useState(null);

  // Carica gli ordini da Firebase /torneo/orders (path di CassaPro)
  useEffect(() => {
    if (!db || !db.current) return;
    const ref = db.current.ref("torneo/orders");
    const cb = (snap) => {
      const v = snap.val() || {};
      const list = Object.keys(v).map(k => Object.assign({}, v[k], { _key: k }));
      // Ordina per data ASC (recenti in fondo)
      list.sort((a, b) => {
        const da = parseCassaProDate(a.date);
        const db_ = parseCassaProDate(b.date);
        if (!da) return 1;
        if (!db_) return -1;
        return da.getTime() - db_.getTime();
      });
      setOrders(list);
      setLoading(false);
    };
    ref.on("value", cb, (err) => { console.warn("orders err:", err); setLoading(false); });
    return () => ref.off("value", cb);
  }, [db]);

  // Data odierna in formato ISO
  const todayISO = useMemo(() => new Date().toISOString().slice(0, 10), []);

  // Date disponibili: unione di TOURNAMENT_DATES + date trovate negli ordini
  const availableDates = useMemo(() => {
    const set = new Set();
    TOURNAMENT_DATES.forEach(d => set.add(d.iso));
    orders.forEach(o => {
      const iso = dateOnlyFromCassa(o.date);
      if (iso) set.add(iso);
    });
    return Array.from(set).sort();
  }, [orders]);

  // Filtra ordini per la data selezionata
  const filteredOrders = useMemo(() => {
    if (selectedDate === "ALL") return orders;
    if (selectedDate === "today") {
      return orders.filter(o => dateOnlyFromCassa(o.date) === todayISO);
    }
    return orders.filter(o => dateOnlyFromCassa(o.date) === selectedDate);
  }, [orders, selectedDate, todayISO]);

  // Aggregazioni
  const totals = useMemo(() => {
    const t = { cibo: 0, fritti: 0, bar: 0, altro: 0, totale: 0, scontrini: 0 };
    filteredOrders.forEach(o => {
      const total = parseFloat(o.total) || 0;
      const key = getCentroKey(o.centro);
      t[key] = (t[key] || 0) + total;
      t.totale += total;
      t.scontrini++;
    });
    return t;
  }, [filteredOrders]);

  // Top prodotti
  const topProducts = useMemo(() => {
    const map = {};
    filteredOrders.forEach(o => {
      (o.items || []).forEach(it => {
        const key = (it.name || "?").trim();
        if (!map[key]) {
          map[key] = { name: key, cat: it.cat || "", qty: 0, revenue: 0 };
        }
        const qty = parseFloat(it.qty) || 0;
        const price = parseFloat(it.price) || 0;
        map[key].qty += qty;
        map[key].revenue += qty * price;
      });
    });
    return Object.values(map).sort((a, b) => b.qty - a.qty).slice(0, 15);
  }, [filteredOrders]);

  // Vendite per ora (00-23)
  const hourlyData = useMemo(() => {
    const buckets = Array(24).fill(0);
    filteredOrders.forEach(o => {
      const d = parseCassaProDate(o.date);
      if (d) buckets[d.getHours()] += parseFloat(o.total) || 0;
    });
    // Trova prima e ultima ora con dati per non mostrare l'intero arco
    let firstHour = 18, lastHour = 23;
    for (let h = 0; h < 24; h++) if (buckets[h] > 0) { firstHour = Math.min(firstHour, h); lastHour = Math.max(lastHour, h); }
    firstHour = Math.max(0, Math.min(firstHour, 17)); // mostra almeno da 17 in poi
    lastHour = Math.max(lastHour, 23);
    const visible = [];
    for (let h = firstHour; h <= lastHour; h++) visible.push({ hour: h, value: buckets[h] });
    return visible;
  }, [filteredOrders]);

  const maxHourly = Math.max(1, ...hourlyData.map(h => h.value));

  // Funzioni helper per visualizzare le date
  const isoToLabel = (iso) => {
    const td = TOURNAMENT_DATES.find(d => d.iso === iso);
    if (td) return td.label;
    const d = new Date(iso);
    const giorni = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
    const mesi = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
    return giorni[d.getDay()] + " " + d.getDate() + " " + mesi[d.getMonth()];
  };

  const tornamentoLabel = (iso) => {
    const td = TOURNAMENT_DATES.find(d => d.iso === iso);
    return td ? td.phase : "";
  };

  // Gruppo per data per il selettore se non è "today" o "ALL"
  const reverseFilteredOrders = filteredOrders.slice().reverse();

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Cassa</h1>
          <div className="subtitle">Report di CassaPro · {orders.length} scontrini totali</div>
        </div>
      </div>

      {loading && (
        <div className="cassa-empty">
          <div className="empty-icon">⏳</div>
          <h3>Caricamento dati cassa...</h3>
        </div>
      )}

      {!loading && orders.length === 0 && (
        <div className="cassa-empty">
          <div className="empty-icon">💰</div>
          <h3>Nessuno scontrino registrato</h3>
          <p>Verifica che CassaPro sia configurato sullo stesso Firebase (cassapro-tdp) e abbia generato almeno uno scontrino.</p>
        </div>
      )}

      {!loading && orders.length > 0 && (
        <>
          {/* SELETTORE SERATA */}
          <div className="cassa-selector">
            <button
              className={"cassa-day-btn live " + (selectedDate === "today" ? "active" : "")}
              onClick={() => setSelectedDate("today")}
            >
              <span className="day-label">OGGI</span>
              <span className="day-sub">{isoToLabel(todayISO)}</span>
            </button>
            <button
              className={"cassa-day-btn " + (selectedDate === "ALL" ? "active" : "")}
              onClick={() => setSelectedDate("ALL")}
            >
              <span className="day-label">TUTTE</span>
              <span className="day-sub">{orders.length} SCONTRINI</span>
            </button>
            {availableDates.map(iso => {
              const phase = tornamentoLabel(iso);
              return (
                <button
                  key={iso}
                  className={"cassa-day-btn " + (selectedDate === iso ? "active" : "")}
                  onClick={() => setSelectedDate(iso)}
                >
                  <span className="day-label">{isoToLabel(iso)}</span>
                  <span className="day-sub">{phase || ""}</span>
                </button>
              );
            })}
          </div>

          {/* KPI */}
          <div className="cassa-kpi-grid">
            <div className="cassa-kpi total">
              <div className="cassa-kpi-label">Incasso totale</div>
              <div className="cassa-kpi-value">{totals.totale.toFixed(0)}€</div>
              <div className="cassa-kpi-sub">{totals.scontrini} scontrini</div>
            </div>
            <div className="cassa-kpi cibo">
              <div className="cassa-kpi-label">🍕 CIBO</div>
              <div className="cassa-kpi-value">{totals.cibo.toFixed(0)}€</div>
              <div className="cassa-kpi-sub">{totals.totale > 0 ? Math.round(totals.cibo / totals.totale * 100) + "%" : "—"}</div>
            </div>
            <div className="cassa-kpi fritti">
              <div className="cassa-kpi-label">🍟 FRITTI</div>
              <div className="cassa-kpi-value">{totals.fritti.toFixed(0)}€</div>
              <div className="cassa-kpi-sub">{totals.totale > 0 ? Math.round(totals.fritti / totals.totale * 100) + "%" : "—"}</div>
            </div>
            <div className="cassa-kpi bar">
              <div className="cassa-kpi-label">🍺 BAR</div>
              <div className="cassa-kpi-value">{totals.bar.toFixed(0)}€</div>
              <div className="cassa-kpi-sub">{totals.totale > 0 ? Math.round(totals.bar / totals.totale * 100) + "%" : "—"}</div>
            </div>
          </div>

          {filteredOrders.length === 0 && (
            <div className="cassa-empty">
              <div className="empty-icon">🌙</div>
              <h3>Nessuno scontrino per questa serata</h3>
              <p>Selezione: {selectedDate === "today" ? isoToLabel(todayISO) : selectedDate === "ALL" ? "Tutte le serate" : isoToLabel(selectedDate)}</p>
            </div>
          )}

          {filteredOrders.length > 0 && (
            <>
              {/* GRAFICO ORARIO */}
              <div className="cassa-section">
                <div className="cassa-section-head">
                  <span>Vendite per ora</span>
                </div>
                <div className="cassa-section-body">
                  <div className="hourly-chart">
                    <div className="hourly-bars">
                      {hourlyData.map(h => (
                        <div
                          key={h.hour}

                          style={{ height: ((h.value / maxHourly) * 100) + "%" }}
