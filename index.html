<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TdP Manager — Torneo del Prete</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0d2818; --green-field: #1a5d3a; --green-bright: #2d8f5a; --green-line: #3aa56e;
    --cream: #f4ead5; --cream-soft: #ebe0c7;
    --terracotta: #c8553d; --terracotta-dark: #9e3d2a;
    --gold: #e8b948; --gold-deep: #b8870f;
    --ink: #161a18; --ink-soft: #2a312e; --paper: #faf5e7;
    --shadow: rgba(13, 40, 24, 0.18); --grain: rgba(13, 40, 24, 0.03);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); font-family: 'Fraunces', Georgia, serif; font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  body { background: radial-gradient(ellipse at top right, rgba(232, 185, 72, 0.08), transparent 50%), radial-gradient(ellipse at bottom left, rgba(45, 143, 90, 0.06), transparent 50%), var(--paper); background-attachment: fixed; }
  body::before { content: ''; position: fixed; inset: 0; background-image: repeating-linear-gradient(45deg, var(--grain) 0 1px, transparent 1px 3px); pointer-events: none; z-index: 1; opacity: 0.6; }
  #root { position: relative; z-index: 2; }
  .display { font-family: 'Bebas Neue', 'Impact', sans-serif; letter-spacing: 0.02em; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  #error-display { display: none; padding: 40px; max-width: 800px; margin: 40px auto; background: #fff; border: 2px solid var(--terracotta-dark); border-radius: 4px; box-shadow: 4px 4px 0 var(--terracotta-dark); }
  #error-display.show { display: block; }
  #error-display h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--terracotta-dark); margin-bottom: 12px; }
  #error-display pre { background: #f8f8f8; padding: 16px; border-radius: 2px; font-size: 12px; overflow-x: auto; margin-top: 16px; white-space: pre-wrap; }

  #loading { position: fixed; inset: 0; display: grid; place-items: center; background: var(--paper); z-index: 1000; font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.1em; color: var(--green-deep); }
  #loading::after { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-left: 12px; animation: pulse 1.2s infinite; }

  .header { background: var(--green-deep); color: var(--cream); padding: 28px 32px 24px; position: relative; overflow: hidden; border-bottom: 3px solid var(--gold); }
  .header::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent 0 80px, rgba(255,255,255,0.02) 80px 81px); pointer-events: none; }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; position: relative; }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand-mark { font-family: 'Bebas Neue', sans-serif; font-size: 44px; line-height: 0.85; color: var(--gold); letter-spacing: 0.04em; }
  .brand-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 0.9; letter-spacing: 0.06em; }
  .brand-sub { display: block; font-family: 'Fraunces', serif; font-style: italic; font-size: 13px; color: var(--cream-soft); opacity: 0.75; margin-top: 2px; }
  .role-pill { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 12px; border: 1px solid var(--gold); color: var(--gold); border-radius: 2px; background: rgba(232, 185, 72, 0.08); cursor: pointer; transition: all 0.2s; }
  .role-pill:hover { background: var(--gold); color: var(--green-deep); }

  .tabs { background: var(--green-field); padding: 0 32px; display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid rgba(232, 185, 72, 0.3); position: sticky; top: 0; z-index: 50; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.08em; color: var(--cream-soft); background: transparent; border: none; padding: 18px 22px; cursor: pointer; position: relative; transition: color 0.2s; white-space: nowrap; }
  .tab:hover { color: var(--cream); }
  .tab.active { color: var(--gold); }
  .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 3px; background: var(--gold); }

  main { max-width: 1280px; margin: 0 auto; padding: 40px 32px 80px; }

  .section-head { margin-bottom: 32px; border-bottom: 2px solid var(--ink); padding-bottom: 12px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .section-head h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 0.02em; color: var(--ink); }
  .section-head .subtitle { font-style: italic; color: var(--ink-soft); font-size: 15px; }

  .hero { background: linear-gradient(135deg, var(--green-field) 0%, var(--green-deep) 100%); color: var(--cream); padding: 56px 48px; border-radius: 4px; position: relative; overflow: hidden; margin-bottom: 40px; box-shadow: 0 20px 40px -20px var(--shadow); }
  .hero::before { content: ''; position: absolute; top: -60%; right: -10%; width: 500px; height: 500px; border-radius: 50%; border: 2px solid rgba(232, 185, 72, 0.15); }
  .hero::after { content: ''; position: absolute; top: -40%; right: 0; width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(232, 185, 72, 0.1); }
  .hero-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 16px; }
  .hero h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(56px, 8vw, 96px); line-height: 0.9; letter-spacing: 0.01em; margin-bottom: 16px; position: relative; }
  .hero h2 em { font-family: 'Fraunces', serif; font-style: italic; font-weight: 400; color: var(--gold); font-size: 0.85em; }
  .hero p { max-width: 540px; font-size: 18px; line-height: 1.55; color: var(--cream-soft); position: relative; }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1px; background: var(--ink); border: 2px solid var(--ink); margin-bottom: 40px; }
  .stat { background: var(--paper); padding: 24px 20px; }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 56px; line-height: 1; color: var(--green-field); }
  .stat-unit { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--ink-soft); margin-left: 6px; }

  .card { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; padding: 24px; box-shadow: 4px 4px 0 var(--ink); transition: transform 0.15s, box-shadow 0.15s; }
  .card:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--ink); }
  .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

  .btn { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.1em; padding: 10px 20px; border: 1.5px solid var(--ink); background: var(--paper); color: var(--ink); cursor: pointer; border-radius: 2px; transition: all 0.15s; text-transform: uppercase; }
  .btn:hover { background: var(--ink); color: var(--cream); }
  .btn-primary { background: var(--terracotta); color: var(--cream); border-color: var(--terracotta-dark); }
  .btn-primary:hover { background: var(--terracotta-dark); color: var(--cream); }
  .btn-gold { background: var(--gold); color: var(--ink); border-color: var(--gold-deep); }
  .btn-gold:hover { background: var(--gold-deep); color: var(--cream); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--ink); color: var(--cream); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-danger { color: var(--terracotta-dark); border-color: var(--terracotta-dark); }
  .btn-danger:hover { background: var(--terracotta-dark); color: var(--cream); }

  input, select, textarea { font-family: 'Fraunces', serif; font-size: 15px; padding: 10px 12px; border: 1.5px solid var(--ink); border-radius: 2px; background: var(--paper); color: var(--ink); width: 100%; }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  input.invalid { border-color: var(--terracotta-dark); }
  label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
  label .req { color: var(--terracotta-dark); margin-left: 3px; }
  .form-row { display: grid; gap: 14px; margin-bottom: 14px; }

  .standings { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; overflow: hidden; margin-bottom: 28px; box-shadow: 4px 4px 0 var(--ink); }
  .standings-head { background: var(--green-deep); color: var(--gold); padding: 14px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.08em; display: flex; align-items: center; justify-content: space-between; }
  .standings-head .girone-letter { font-size: 38px; color: var(--gold); line-height: 0.8; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th { background: var(--cream-soft); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); padding: 10px 8px; border-bottom: 1.5px solid var(--ink); text-align: center; }
  thead th:first-child, tbody td:first-child { text-align: left; padding-left: 16px; }
  tbody td { padding: 12px 8px; border-bottom: 1px solid rgba(22, 26, 24, 0.12); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  tbody tr:last-child td { border-bottom: none; }
  tbody td.team-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; text-align: left; }
  tbody tr.qualified { background: rgba(232, 185, 72, 0.12); }
  tbody td.pts { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--green-field); }
  .pos { display: inline-block; width: 24px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--ink-soft); margin-right: 8px; }
  tbody tr.qualified .pos { color: var(--gold-deep); }

  .match { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; box-shadow: 3px 3px 0 var(--ink); transition: transform 0.15s; }
  .match.played { background: linear-gradient(180deg, var(--paper) 0%, var(--cream-soft) 100%); }
  .match-team { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; }
  .match-team.home { text-align: right; }
  .match-team.away { text-align: left; }
  .match-score { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; color: var(--green-deep); text-align: center; padding: 4px 16px; border-left: 2px solid var(--ink); border-right: 2px solid var(--ink); min-width: 100px; }
  .match-score.pending { color: var(--ink-soft); opacity: 0.4; font-size: 24px; padding-top: 10px; }
  .match-meta { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.08em; text-transform: uppercase; padding-top: 8px; margin-top: 4px; border-top: 1px dashed rgba(22, 26, 24, 0.2); }
  .match-girone { background: var(--green-deep); color: var(--gold); padding: 2px 8px; border-radius: 2px; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.12em; }

  .team-card { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; padding: 20px; box-shadow: 3px 3px 0 var(--ink); position: relative; transition: transform 0.15s; }
  .team-card:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .team-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .team-badge { width: 44px; height: 44px; border-radius: 50%; background: var(--green-field); color: var(--cream); display: grid; place-items: center; font-family: 'Bebas Neue', sans-serif; font-size: 22px; border: 2px solid var(--ink); flex-shrink: 0; }
  .team-card h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1; letter-spacing: 0.04em; }
  .team-card .girone-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: var(--gold-deep); margin-top: 4px; }
  .player-list { list-style: none; margin-top: 12px; border-top: 1px dashed var(--ink); padding-top: 10px; max-height: 220px; overflow-y: auto; }
  .player-list li { padding: 6px 0; font-size: 13px; display: flex; flex-direction: column; gap: 2px; border-bottom: 1px dotted rgba(22,26,24,0.1); }
  .player-list li:last-child { border-bottom: none; }
  .player-list li .pname { font-weight: 600; }
  .player-list li .pmeta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-soft); letter-spacing: 0.04em; }
  .player-list li.captain .pname::before { content: '★ '; color: var(--gold-deep); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(13, 40, 24, 0.6); display: grid; place-items: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
  .modal { background: var(--paper); border: 2px solid var(--ink); border-radius: 4px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 8px 8px 0 var(--ink); }
  .modal.wide { max-width: 920px; }
  .modal-head { border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 20px; }
  .modal-head h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; letter-spacing: 0.04em; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--ink); flex-wrap: wrap; }

  .players-editor { border: 1.5px solid var(--ink); border-radius: 4px; margin-top: 8px; background: var(--cream-soft); }
  .players-editor-head { padding: 10px 14px; background: var(--green-deep); color: var(--gold); display: flex; justify-content: space-between; align-items: center; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.08em; flex-wrap: wrap; gap: 8px; }
  .players-editor-body { padding: 14px; max-height: 380px; overflow-y: auto; }
  .player-row { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 3px; padding: 12px; margin-bottom: 10px; }
  .player-row:last-child { margin-bottom: 0; }
  .player-row-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .player-row-head .num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green-field); }
  .player-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .player-row-grid input { font-size: 13px; padding: 7px 10px; }
  .player-row-grid label { font-size: 9px; margin-bottom: 3px; }

  .empty { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
  .empty-icon { font-size: 60px; margin-bottom: 16px; opacity: 0.3; }
  .empty h3 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; margin-bottom: 8px; }
  .empty p { font-style: italic; margin-bottom: 24px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); padding: 12px 22px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.08em; z-index: 200; border: 1px solid var(--gold); box-shadow: 0 8px 20px var(--shadow); animation: toast-in 0.25s ease-out; max-width: 90vw; text-align: center; }
  @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .sync-status { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--cream-soft); opacity: 0.7; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-line); box-shadow: 0 0 6px var(--green-line); animation: pulse 2s infinite; }
  .sync-dot.offline { background: var(--terracotta); box-shadow: 0 0 6px var(--terracotta); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .import-preview { background: var(--cream-soft); border: 1.5px solid var(--ink); border-radius: 4px; padding: 14px; max-height: 360px; overflow-y: auto; margin: 14px 0; }
  .import-team-block { background: var(--paper); border-left: 3px solid var(--green-field); padding: 10px 14px; margin-bottom: 10px; border-radius: 0 3px 3px 0; }
  .import-team-block h4 { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; }
  .import-team-block .count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); letter-spacing: 0.1em; }
  .import-team-block ul { list-style: none; margin-top: 6px; }
  .import-team-block ul li { font-size: 13px; padding: 2px 0; font-family: 'JetBrains Mono', monospace; }

  /* === TURNI / SHIFTS === */
  .shifts-panel { background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; padding: 18px; margin-bottom: 24px; box-shadow: 3px 3px 0 var(--ink); }
  .shifts-panel-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px dashed var(--ink); flex-wrap: wrap; }
  .shifts-panel-head h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.04em; }

  .staff-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .staff-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--cream-soft); border: 1.5px solid var(--ink); border-radius: 20px; font-size: 14px; }
  .staff-chip .name { font-weight: 600; }
  .staff-chip .phone { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); }
  .staff-chip button { background: none; border: none; cursor: pointer; color: var(--ink-soft); font-size: 14px; padding: 0 0 0 4px; line-height: 1; opacity: 0.5; transition: opacity 0.15s, color 0.15s; }
  .staff-chip button:hover { color: var(--green-field); opacity: 1; }
  .staff-chip { cursor: default; transition: background 0.15s; }
  .staff-chip:hover { background: var(--paper); }

  .positions-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .position-chip { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 3px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.08em; color: var(--cream); }
  .position-chip button { background: rgba(255,255,255,0.2); border: none; cursor: pointer; color: var(--cream); font-size: 12px; padding: 0 4px; line-height: 1; border-radius: 2px; }
  .position-chip button:hover { background: rgba(255,255,255,0.4); }

  .shifts-matrix-wrap { overflow-x: auto; border: 1.5px solid var(--ink); border-radius: 4px; box-shadow: 4px 4px 0 var(--ink); background: var(--paper); }
  .shifts-matrix { width: 100%; border-collapse: collapse; min-width: 700px; }
  .shifts-matrix th, .shifts-matrix td { border: 1px solid rgba(22,26,24,0.15); padding: 0; }
  .shifts-matrix thead th { background: var(--green-deep); color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 0.08em; padding: 12px 10px; text-align: center; position: sticky; top: 0; z-index: 5; }
  .shifts-matrix thead th.date-col { background: var(--ink); color: var(--gold); text-align: left; padding-left: 14px; min-width: 160px; position: sticky; left: 0; z-index: 6; }
  .shifts-matrix tbody td.date-cell { background: var(--cream-soft); padding: 12px 14px; font-family: 'Fraunces', serif; font-weight: 600; vertical-align: middle; min-width: 160px; position: sticky; left: 0; z-index: 3; border-right: 2px solid var(--ink); }
  .shifts-matrix tbody td.date-cell .date-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.04em; line-height: 1; }
  .shifts-matrix tbody td.date-cell .date-note { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-soft); letter-spacing: 0.04em; margin-top: 4px; }
  .shifts-matrix tbody td.date-cell .date-phase { display: inline-block; margin-top: 4px; padding: 1px 6px; background: var(--gold); color: var(--ink); border-radius: 2px; font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 0.1em; }
  .shifts-matrix tbody td.date-cell .date-phase.finali { background: var(--terracotta); color: var(--cream); }
  .shifts-matrix tbody td.shift-cell { padding: 8px; text-align: center; vertical-align: middle; }
  .shifts-matrix tbody td.shift-cell select { font-size: 13px; padding: 6px 8px; min-width: 110px; background: var(--paper); }
  .shifts-matrix tbody td.shift-cell.assigned { background: rgba(45,143,90,0.08); }
  .shifts-matrix tbody td.shift-cell.empty { background: repeating-linear-gradient(45deg, transparent 0 6px, rgba(22,26,24,0.04) 6px 12px); }
  .shift-assigned-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--green-field); color: var(--cream); border-radius: 3px; font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px; }

  /* Stack assegnazioni dentro la cella */
  .assigned-stack { display: flex; flex-direction: column; gap: 4px; align-items: stretch; padding: 2px; min-height: 36px; }

const { useState, useEffect, useMemo, useRef } = React;

function useFirebase() {
  const [online, setOnline] = useState(false);
  const dbRef = useRef(null);
  useEffect(() => {
    try {
      if (typeof firebase === 'undefined') return;
      const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
      dbRef.current = app.database();
      dbRef.current.ref(".info/connected").on("value", (snap) => setOnline(!!snap.val()));
    } catch (e) { console.warn("Firebase non disponibile:", e.message); }
  }, []);
  return { online, db: dbRef };
}

function useFirebaseValue(db, path, fallback) {
  const fullPath = ROOT_PATH + "/" + path;
  const [value, setValue] = useState(() => {
    try {
      const raw = localStorage.getItem("tdp." + path);
      return raw ? JSON.parse(raw) : fallback;
    } catch { return fallback; }
  });
  useEffect(() => {
    if (!db.current) return;
    const r = db.current.ref(fullPath);
    const cb = (snap) => {
      const v = snap.val();
      if (v != null) {
        setValue(v);
        try { localStorage.setItem("tdp." + path, JSON.stringify(v)); } catch {}
      }
    };
    r.on("value", cb, (err) => console.warn("read err", path, err));
    return () => r.off("value", cb);
  }, [db, fullPath]);
  const write = (newValue) => {
    setValue(newValue);
    try { localStorage.setItem("tdp." + path, JSON.stringify(newValue)); } catch {}
    if (db.current) db.current.ref(fullPath).set(newValue).catch(e => console.warn("write err", path, e));
  };
  return [value, write];
}

const uid = () => Math.random().toString(36).slice(2, 10);

const POINTS_DRAW = 1;

];

});

function validatePlayer(p) {
  const missing = [];
  if (!p.name || !p.name.trim()) missing.push("Nome");
  if (!p.birthDate) missing.push("Data nascita");
  return missing;
}

function formatDate(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString("it-IT");
  } catch { return iso; }
}

function parseDateToISO(val) {
  if (!val) return "";
  if (val instanceof Date && !isNaN(val.getTime())) {
    return val.toISOString().slice(0, 10);
  }
  if (typeof val === "number") {
    const excelEpoch = new Date(Date.UTC(1899, 11, 30));
    const d = new Date(excelEpoch.getTime() + val * 86400000);
    return d.toISOString().slice(0, 10);
  }
  if (typeof val === "string") {
    const s = val.trim();
    if (s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0, 10);
    const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m) {
      let dd = m[1], mm = m[2], yy = m[3];
      if (yy.length === 2) yy = (parseInt(yy) > 30 ? "19" : "20") + yy;
      return yy + "-" + mm.padStart(2,"0") + "-" + dd.padStart(2,"0");
    }
    const dGeneric = new Date(s);
    if (!isNaN(dGeneric.getTime())) return dGeneric.toISOString().slice(0,10);
  }
  return "";
}

function generateRoundRobin(teamIds) {
  if (teamIds.length < 2) return [];
  const matches = [];
  for (let i = 0; i < teamIds.length; i++) {
    for (let j = i + 1; j < teamIds.length; j++) {
      matches.push({
        id: uid(), home: teamIds[i], away: teamIds[j],
        homeScore: null, awayScore: null, played: false,
        date: null, field: null,
      });
    }
  }
  return matches;
}

function computeStandings(teams, matches) {
  const stats = {};
  teams.forEach(t => {
    stats[t.id] = { teamId: t.id, name: t.name, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, gs: 0, gd: 0, pts: 0 };
  });
  matches.forEach(m => {
    if (!m.played || m.homeScore == null || m.awayScore == null) return;
    const h = stats[m.home], a = stats[m.away];
    if (!h || !a) return;
    h.played++; a.played++;
    h.gf += m.homeScore; h.gs += m.awayScore;
    a.gf += m.awayScore; a.gs += m.homeScore;
    if (m.homeScore > m.awayScore) { h.won++; h.pts += POINTS_WIN; a.lost++; }
    else if (m.homeScore < m.awayScore) { a.won++; a.pts += POINTS_WIN; h.lost++; }
    else { h.drawn++; a.drawn++; h.pts += POINTS_DRAW; a.pts += POINTS_DRAW; }
  });
  Object.values(stats).forEach(s => { s.gd = s.gf - s.gs; });
  return Object.values(stats).sort((x, y) =>
    y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || x.name.localeCompare(y.name)
  );
}

// Excel parser - identifica le squadre tramite il COLORE arancione (FFE699) della cella B
// che è l'unico discriminante affidabile nel foglio "GIOCATORI 2026" del torneo.
// Se non si specifica sheetName, cerca prima "GIOCATORI <anno>", poi "TUTTI I GIOCATORI".
function parseTuttiIGiocatori(workbook, sheetName) {
  if (!sheetName) {
    sheetName = workbook.SheetNames.find(n => /giocatori.*\d{4}/i.test(n));
    if (!sheetName) sheetName = workbook.SheetNames.find(n => /tutti.*giocator/i.test(n));
    if (!sheetName) sheetName = workbook.SheetNames[0];
  }

  const sheet = workbook.Sheets[sheetName];
  if (!sheet) return [];

  // Estraggo le righe come array di array (header:1, raw:true)
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });

  // Determino la riga Excel di partenza (sheet potrebbe avere righe vuote in cima)
  // sheet['!ref'] è tipo "A2:G226" → la prima riga popolata è 2
  let startRow = 1;
  if (sheet["!ref"]) {
    const m = sheet["!ref"].match(/^[A-Z]+(\d+)/);
    if (m) startRow = parseInt(m[1], 10);
  }

  // Funzione helper: ottiene il colore di sfondo della cella B (colonna 2) per la riga r (1-indexed Excel)
  // SheetJS espone gli stili in sheet[cellRef].s se la lettura è stata fatta con cellStyles: true
  const isTeamRowColor = (rowIdx1based) => {
    const cellRef = "B" + rowIdx1based;
    const cell = sheet[cellRef];
    if (!cell || !cell.s) return false;
    const fg = cell.s.fgColor;
    if (!fg || !fg.rgb) return false;
    // Normalizzo: rimuovo prefisso alpha 'FF' o '00' se a 8 caratteri
    let rgb = String(fg.rgb).toUpperCase();
    if (rgb.length === 8) rgb = rgb.slice(2); // FFFFE699 -> FFE699
    // Colore arancione chiaro standard del file TdP: FFE699
    if (rgb === "FFE699") return true;
    if (rgb === "FFFF00") return false; // giallo evidenziatore — NON è una squadra
    // Range arancione/pesca chiaro: FFE6xx, FFD9xx, FFCCxx
    if (/^FF[ED][069]/.test(rgb)) return true;
    return false;
  };

  // Verifico se il foglio ha almeno una cella con colore arancione (cioè se gli stili sono leggibili)
  let hasColorInfo = false;
  for (let i = 0; i < rows.length; i++) {
    if (isTeamRowColor(startRow + i)) { hasColorInfo = true; break; }
  }

  const teams = [];
  let current = null;

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i] || [];
    const rowNum = startRow + i; // riga Excel reale (1-indexed)
    const cB = row[1], cC = row[2], cD = row[3], cE = row[4], cF = row[5], cG = row[6];

    if (cB == null || cB === "") continue;
    const sB = String(cB).trim();
    if (!sB) continue;
    if (/^GIOCATORE$/i.test(sB)) continue;
    if (/^\d+$/.test(sB)) continue;

    const hasBirth = cC != null && cC !== "" && parseDateToISO(cC) !== "";

    // === Riconoscimento riga-squadra ===
    let isTeamRow = false;
    if (hasColorInfo) {
      // Modalità COLORE: l'unico segnale è il colore arancione della cella B
      isTeamRow = isTeamRowColor(rowNum) && !hasBirth;
    } else {
      // Fallback (file senza stili): MAIUSCOLO e nessuna data di nascita
      const isUppercase = sB === sB.toUpperCase() && sB.length > 1;
      isTeamRow = !hasBirth && isUppercase;
    }

    if (isTeamRow) {
      current = {
        id: uid(), name: sB, captain: "", contact: "",
        color: "#1a5d3a", girone: "", players: []
      };
      teams.push(current);
      continue;
    }

    if (!current) continue;
    if (hasBirth) {
      current.players.push({
        id: uid(), name: sB,
        birthDate: parseDateToISO(cC),
        birthPlace: cD ? String(cD).trim() : "",
        address: cE ? String(cE).trim() : "",
        idCard: cF ? String(cF).trim() : "",
        fiscalCode: cG ? String(cG).trim().toUpperCase() : "",
        isCaptain: false
      });
    }
  }

  // Filtra squadre senza giocatori
  return teams.filter(t => t.players.length > 0);
}

function App() {
  const fb = useFirebase();
  const [view, setView] = useState("home");
  const [role, setRole] = useState(() => localStorage.getItem("tdp.role") || "public");
  const [toast, setToast] = useState(null);

  const [teams, setTeams] = useFirebaseValue(fb.db, "teams", []);
  const [matches, setMatches] = useFirebaseValue(fb.db, "matches", []);
  const [config, setConfig] = useFirebaseValue(fb.db, "config", { tournamentName: "Torneo del Prete 2026", initialized: false });
  const [staff, setStaff] = useFirebaseValue(fb.db, "staff", []);
  const [positions, setPositions] = useFirebaseValue(fb.db, "positions", DEFAULT_POSITIONS);
  // shifts: { "YYYY-MM-DD::positionId": staffId | null }
  const [shifts, setShifts] = useFirebaseValue(fb.db, "shifts", {});
  const [inventory, setInventory] = useFirebaseValue(fb.db, "inventory", []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };
  const setRolePersistent = (r) => { setRole(r); localStorage.setItem("tdp.role", r); };

  const regenerateSchedule = () => {
    const teamsWithGirone = teams.filter(t => t.girone);
    if (teamsWithGirone.length === 0) {
      alert("Nessuna squadra è ancora assegnata a un girone. Assegna prima i gironi nella sezione Squadre.");
      return;
    }
    if (!confirm("Genero il calendario dei gironi? I risultati esistenti verranno persi.")) return;
    const newMatches = [];
    GIRONE_NAMES.forEach(g => {
      const inGirone = teams.filter(t => t.girone === g).map(t => t.id);
      generateRoundRobin(inGirone).forEach(m => newMatches.push(Object.assign({}, m, { girone: g })));
    });
    setMatches(newMatches);
    showToast("Calendario rigenerato (" + newMatches.length + " partite)");
  };

  const canEdit = role === "staff";

  return (
    <>
      <Header role={role} onRoleChange={setRolePersistent} online={fb.online} config={config} />
      <Tabs view={view} onChange={setView} canEdit={canEdit} />
      <main>
        {view === "home" && <Home teams={teams} matches={matches} config={config} />}
        {view === "squadre" && <TeamsView teams={teams} setTeams={setTeams} canEdit={canEdit} showToast={showToast} />}
        {view === "gironi" && <GironiView teams={teams} matches={matches} />}
        {view === "calendario" && <CalendarView teams={teams} matches={matches} setMatches={setMatches} canEdit={canEdit} showToast={showToast} />}
        {view === "statistiche" && <StatsView teams={teams} matches={matches} />}
        {view === "turni" && canEdit && <ShiftsView staff={staff} setStaff={setStaff} positions={positions} setPositions={setPositions} shifts={shifts} setShifts={setShifts} showToast={showToast} />}
        {view === "turni" && !canEdit && (
          <div className="empty">
            <div className="empty-icon">🔒</div>
            <h3>Accesso staff richiesto</h3>
            <p>Clicca sulla pillola "Pubblico" in alto a destra per autenticarti.</p>
          </div>
        )}
        {view === "inventario" && canEdit && <InventoryView inventory={inventory} setInventory={setInventory} showToast={showToast} />}
        {view === "inventario" && !canEdit && (
          <div className="empty">
            <div className="empty-icon">🔒</div>
            <h3>Accesso staff richiesto</h3>
            <p>Clicca sulla pillola "Pubblico" in alto a destra per autenticarti.</p>
          </div>
        )}
        {view === "admin" && canEdit && <AdminView config={config} setConfig={setConfig} teams={teams} setTeams={setTeams} matches={matches} setMatches={setMatches} onRegenerate={regenerateSchedule} showToast={showToast} />}
        {view === "admin" && !canEdit && (
          <div className="empty">
            <div className="empty-icon">🔒</div>
            <h3>Accesso staff richiesto</h3>
            <p>Clicca sulla pillola "Pubblico" in alto a destra per autenticarti.</p>
          </div>
        )}
      </main>
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function Header({ role, onRoleChange, online, config }) {
  const cycleRole = () => {
    if (role === "public") {
      const pw = prompt("Password staff:");
      if (pw === STAFF_PASSWORD) onRoleChange("staff");
      else if (pw != null) alert("Password errata");
    } else {
      if (confirm("Disconnettersi dall'area staff?")) onRoleChange("public");
    }
  };
  return (
    <header className="header">
      <div className="header-inner">
        <div className="brand">
          <div className="brand-mark">TdP</div>
          <div>
            <div className="brand-title">Torneo del Prete</div>
            <span className="brand-sub">{config.tournamentName || "Edizione 2026"} · Calcio a 5</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <span className="sync-status">
            <span className={"sync-dot " + (online ? "" : "offline")} />
            {online ? "Live sync" : "Solo locale"}
          </span>
          <button className="role-pill" onClick={cycleRole}>{role === "staff" ? "★ Staff" : "Pubblico"}</button>

  );
}

function Tabs({ view, onChange, canEdit }) {
  const items = [
    { id: "home", label: "Home" },
    { id: "squadre", label: "Squadre" },
    { id: "gironi", label: "Gironi" },
    { id: "calendario", label: "Calendario" },
    { id: "statistiche", label: "Statistiche" },
    { id: "turni", label: "Turni", staffOnly: true },
    { id: "inventario", label: "Inventario", staffOnly: true },
    { id: "admin", label: "Admin", staffOnly: true },
  ];
  return (
    <nav className="tabs">
      {items.filter(it => !it.staffOnly || canEdit).map(it => (
        <button key={it.id} className={"tab " + (view === it.id ? "active" : "")} onClick={() => onChange(it.id)}>
          {it.label}
        </button>
      ))}

function Home({ teams, matches, config }) {
  const playedMatches = matches.filter(m => m.played).length;
  const totalGoals = matches.reduce((acc, m) => acc + (m.homeScore||0) + (m.awayScore||0), 0);
  const totalPlayers = teams.reduce((acc, t) => acc + (t.players ? t.players.length : 0), 0);
  const upcoming = matches.filter(m => !m.played).slice(0, 4);
  const recent = matches.filter(m => m.played).slice(-4).reverse();
  const assignedTeams = teams.filter(t => t.girone).length;

  return (
    <>
      <section className="hero">
        <div className="hero-eyebrow">Edizione 2026 · Calcio a 5</div>
        <h2>{config.tournamentName || "Torneo del Prete"}</h2>
        <p>La piattaforma interna per gestire il torneo: anagrafica squadre, giocatori, gironi, calendario, classifiche e tabellone finale.</p>
      </section>

      <div className="stats-grid">
        <div className="stat">
          <div className="stat-label">Squadre iscritte</div>
          <div className="stat-value">{teams.length}<span className="stat-unit">/16</span></div>
        </div>
        <div className="stat">
          <div className="stat-label">Giocatori totali</div>
          <div className="stat-value">{totalPlayers}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Gironi assegnati</div>
          <div className="stat-value">{assignedTeams}<span className="stat-unit">/{teams.length || "—"}</span></div>
        </div>
        <div className="stat">
          <div className="stat-label">Partite giocate</div>
          <div className="stat-value">{playedMatches}<span className="stat-unit">/{matches.length || "—"}</span></div>
        </div>
        <div className="stat">
          <div className="stat-label">Gol totali</div>
          <div className="stat-value">{totalGoals}</div>
        </div>
        <div className="stat">
          <div className="stat-label">Media gol/partita</div>
          <div className="stat-value">{playedMatches ? (totalGoals/playedMatches).toFixed(1) : "—"}</div>
        </div>
      </div>

      {teams.length === 0 && (
        <div className="empty">
          <div className="empty-icon">⚽</div>
          <h3>Nessuna squadra ancora</h3>
          <p>Vai nella sezione <strong>Squadre</strong> per importare il file Excel o aggiungerle a mano.</p>
        </div>
      )}

      {(upcoming.length > 0 || recent.length > 0) && (
        <div className="grid-2" style={{marginTop: 32}}>
          {upcoming.length > 0 && (
            <div>
              <h3 className="display" style={{fontSize:28, marginBottom:14, letterSpacing:"0.04em"}}>Prossime partite</h3>
              {upcoming.map(m => <MatchRow key={m.id} match={m} teams={teams} readOnly />)}
            </div>
          )}
          {recent.length > 0 && (
            <div>
              <h3 className="display" style={{fontSize:28, marginBottom:14, letterSpacing:"0.04em"}}>Ultimi risultati</h3>
              {recent.map(m => <MatchRow key={m.id} match={m} teams={teams} readOnly />)}
            </div>
          )}
        </div>
      )}
    </>
  );
}

function TeamsView({ teams, setTeams, canEdit, showToast }) {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("ALL");
  const [importOpen, setImportOpen] = useState(false);

  let filtered = teams;
  if (filter === "UNASSIGNED") filtered = teams.filter(t => !t.girone);
  else if (filter !== "ALL") filtered = teams.filter(t => t.girone === filter);

  const saveTeam = (team) => {
    if (team.id && teams.find(t => t.id === team.id)) {
      setTeams(teams.map(t => t.id === team.id ? team : t));
      showToast("Squadra aggiornata");
    } else {
      setTeams([...teams, Object.assign({}, team, { id: uid() })]);
      showToast("Squadra aggiunta");
    }
    setEditing(null);
  };

  const deleteTeam = (id) => {
    if (!confirm("Eliminare questa squadra (e tutti i suoi giocatori)?")) return;
    setTeams(teams.filter(t => t.id !== id));
    showToast("Squadra eliminata");
  };

  const importTeams = (parsedTeams, mode) => {
    if (mode === "replace") setTeams(parsedTeams);
    else setTeams([...teams, ...parsedTeams]);
    setImportOpen(false);
    const totalPlayers = parsedTeams.reduce((a, t) => a + t.players.length, 0);
    showToast("Importate " + parsedTeams.length + " squadre, " + totalPlayers + " giocatori");
  };

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Le Squadre</h1>
          <div className="subtitle">{teams.length} squadre · {teams.reduce((a,t)=>a+(t.players?t.players.length:0),0)} giocatori totali</div>
        </div>
        {canEdit && (
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
            <button className="btn btn-primary" onClick={() => setEditing({ id: null, name: "", captain: "", contact: "", girone: "", color: "#1a5d3a", players: [] })}>
              + Nuova squadra
            </button>
          </div>
        )}
      </div>

      <div style={{display:"flex", gap:8, marginBottom: 24, flexWrap:"wrap"}}>
        <button className={"btn btn-sm " + (filter==="ALL"?"btn-gold":"")} onClick={()=>setFilter("ALL")}>Tutte ({teams.length})</button>
        <button className={"btn btn-sm " + (filter==="UNASSIGNED"?"btn-gold":"")} onClick={()=>setFilter("UNASSIGNED")}>Senza girone ({teams.filter(t=>!t.girone).length})</button>
        {GIRONE_NAMES.map(g => {
          const n = teams.filter(t=>t.girone===g).length;
          return (
            <button key={g} className={"btn btn-sm " + (filter===g?"btn-gold":"")} onClick={()=>setFilter(g)}>
              Girone {g} ({n})
            </button>
          );
        })}
      </div>

      {teams.length === 0 && (
        <div className="empty">
          <div className="empty-icon">🏟️</div>
          <h3>Nessuna squadra ancora</h3>
          <p>Importa il file Excel del torneo o inseriscile a mano.</p>
          {canEdit && (
            <div style={{display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap"}}>
              <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
              <button className="btn btn-primary" onClick={() => setEditing({ id: null, name: "", captain: "", contact: "", girone: "", color: "#1a5d3a", players: [] })}>+ Nuova squadra</button>
            </div>
          )}
        </div>
      )}

      {teams.length > 0 && filtered.length === 0 && (
        <div className="empty">
          <div className="empty-icon">🔍</div>
          <h3>Nessuna squadra in questo filtro</h3>
        </div>
      )}

      <div className="grid-2">
        {filtered.map(team => (
          <TeamCard key={team.id} team={team} canEdit={canEdit} onEdit={()=>setEditing(team)} onDelete={()=>deleteTeam(team.id)} />
        ))}
      </div>

      {editing && <TeamEditor team={editing} onSave={saveTeam} onCancel={()=>setEditing(null)} />}
      {importOpen && <ImportExcelModal onImport={importTeams} onCancel={()=>setImportOpen(false)} existingTeamCount={teams.length} />}
    </>
  );
}

function TeamCard({ team, canEdit, onEdit, onDelete }) {
  const initials = team.name.split(/\s+/).slice(0,2).map(w => w[0]).join("").toUpperCase();
  const captainPlayer = (team.players || []).find(p => p.isCaptain);
  return (
    <div className="team-card">
      <div className="team-card-header">
        <div className="team-badge" style={{background: team.color || "var(--green-field)"}}>{initials}</div>
        <div style={{flex:1, minWidth:0}}>
          <h3 style={{wordBreak:"break-word"}}>{team.name}</h3>
          <div className="girone-tag">
            {team.girone ? "GIRONE " + team.girone : "NESSUN GIRONE"}
            {captainPlayer ? " · CAP. " + captainPlayer.name.toUpperCase() : ""}
            {(team.players && team.players.length) ? " · " + team.players.length + " GIOC." : ""}
          </div>
        </div>
        {canEdit && (
          <div style={{display:"flex", gap:4}}>
            <button className="btn btn-sm btn-ghost" onClick={onEdit} title="Modifica">✎</button>
            <button className="btn btn-sm btn-danger" onClick={onDelete} title="Elimina">✕</button>
          </div>
        )}
      </div>
      {team.players && team.players.length > 0 && (
        <ul className="player-list">
          {team.players.map((p, i) => (
            <li key={p.id || i} className={p.isCaptain ? "captain" : ""}>
              <span className="pname">{p.name}</span>
              <span className="pmeta">
                {p.birthDate ? formatDate(p.birthDate) : ""}
                {p.birthPlace ? " · " + p.birthPlace : ""}
                {p.fiscalCode ? " · " + p.fiscalCode : ""}
              </span>
            </li>
          ))}
        </ul>
      )}
    </div>
  );
}

function TeamEditor({ team, onSave, onCancel }) {
  const [name, setName] = useState(team.name || "");
  const [contact, setContact] = useState(team.contact || "");
  const [color, setColor] = useState(team.color || "#1a5d3a");
  const [girone, setGirone] = useState(team.girone || "");
  const [players, setPlayers] = useState(() => (team.players && team.players.length) ? team.players.map(p => Object.assign({ id: uid() }, p)) : [emptyPlayer()]);

  const updatePlayer = (idx, field, value) => {
    setPlayers(players.map((p, i) => i === idx ? Object.assign({}, p, { [field]: value }) : p));
  };
  const setCaptain = (idx) => {
    setPlayers(players.map((p, i) => Object.assign({}, p, { isCaptain: i === idx })));
  };
  const addPlayer = () => setPlayers([...players, emptyPlayer()]);
  const removePlayer = (idx) => {
    if (players.length === 1) { setPlayers([emptyPlayer()]); return; }
    setPlayers(players.filter((_, i) => i !== idx));
  };

  const handleSave = () => {
    if (!name.trim()) { alert("Inserisci il nome della squadra"); return; }
    const nonEmpty = players.filter(p => p.name && p.name.trim());
    if (nonEmpty.length === 0) {
      alert("Aggiungi almeno un giocatore prima di salvare la squadra.");
      return;
    }
    const incomplete = nonEmpty.filter(p => validatePlayer(p).length > 0);
    if (incomplete.length > 0) {
      const list = incomplete.map(p => "• " + (p.name || "(senza nome)") + ": manca " + validatePlayer(p).join(", ")).join("\n");
      alert("⛔ Non puoi salvare: tutti i giocatori devono avere l'anagrafica completa.\n\nGiocatori incompleti:\n\n" + list);
      return;
    }
    const captain = nonEmpty.find(p => p.isCaptain);
    onSave(Object.assign({}, team, {
      name: name.trim(),
      captain: captain ? captain.name : "",
      contact: contact.trim(),
      color, girone, players: nonEmpty
    }));
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>{team.id ? "Modifica squadra" : "Nuova squadra"}</h2>
        </div>

        <div className="form-row" style={{gridTemplateColumns:"2fr 1fr 1fr"}}>
          <div>
            <label>Nome squadra <span className="req">*</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Es. AGENZIA IMMOBILIARE METRO QUADRO" />
          </div>
          <div>
            <label>Girone</label>
            <select value={girone} onChange={e=>setGirone(e.target.value)}>
              <option value="">— Non assegnato —</option>
              {GIRONE_NAMES.map(g => <option key={g} value={g}>Girone {g}</option>)}
            </select>
          </div>
          <div>
            <label>Colore</label>
            <input type="color" value={color} onChange={e=>setColor(e.target.value)} style={{height:42, padding:4}} />
          </div>
        </div>

        <div className="form-row">
          <div>
            <label>Contatto squadra (responsabile, telefono, email)</label>
            <input value={contact} onChange={e=>setContact(e.target.value)} placeholder="Es. Marco Rossi - 333 1234567" />
          </div>
        </div>

        <div className="players-editor">
          <div className="players-editor-head">
            <span>Giocatori ({players.filter(p => p.name && p.name.trim()).length})</span>
            <button className="btn btn-sm btn-gold" onClick={addPlayer}>+ Aggiungi</button>
          </div>
          <div className="players-editor-body">
            {players.map((p, idx) => (
              <PlayerRow
                key={p.id || idx}
                player={p} index={idx}
                onChange={(field, value) => updatePlayer(idx, field, value)}
                onSetCaptain={() => setCaptain(idx)}
                onRemove={() => removePlayer(idx)}
              />
            ))}
          </div>
        </div>

        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>Salva squadra</button>
        </div>

function ImportExcelModal({ onImport, onCancel, existingTeamCount }) {
  const [workbook, setWorkbook] = useState(null);
  const [sheetName, setSheetName] = useState("");
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const fileInputRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true);
    setError("");
    setParsed(null);
    setWorkbook(null);
    setSheetName("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true, cellStyles: true });
        // Default suggerito: GIOCATORI <anno>, poi TUTTI I GIOCATORI, poi primo
        let suggested = wb.SheetNames.find(n => /giocatori.*\d{4}/i.test(n));
        if (!suggested) suggested = wb.SheetNames.find(n => /tutti.*giocator/i.test(n));
        if (!suggested) suggested = wb.SheetNames[0];
        setWorkbook(wb);
        setSheetName(suggested);
        // Esegui parse iniziale sul foglio suggerito
        const teams = parseTuttiIGiocatori(wb, suggested);
        if (teams.length === 0) {
          setError("Nessuna squadra trovata nel foglio '" + suggested + "'. Prova a selezionare un altro foglio.");
        } else {
          setParsed(teams);
        }
      } catch (err) {
        setError("Errore lettura file: " + err.message);
      } finally {
        setLoading(false);
      }
    };
    reader.onerror = () => { setError("Impossibile leggere il file"); setLoading(false); };
    reader.readAsArrayBuffer(file);
  };

  // Quando l'utente cambia foglio: ri-parsare
  const changeSheet = (newSheet) => {
    setSheetName(newSheet);
    setError("");
    if (!workbook) return;
    try {
      const teams = parseTuttiIGiocatori(workbook, newSheet);
      if (teams.length === 0) {
        setParsed(null);
        setError("Nessuna squadra trovata nel foglio '" + newSheet + "'. Prova un altro foglio.");
      } else {
        setParsed(teams);
      }
    } catch (err) {
      setError("Errore lettura foglio: " + err.message);
      setParsed(null);
    }
  };

  const resetFile = () => {
    setWorkbook(null);
    setSheetName("");
    setParsed(null);
    setError("");
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Importa da Excel</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
            Carica il file e scegli il foglio da importare.
          </div>
        </div>

        {/* STEP 1: SELEZIONE FILE */}
        {!workbook && !loading && (
          <>
            <div style={{padding:"24px", background:"var(--cream-soft)", border:"1.5px dashed var(--ink)", borderRadius:4, textAlign:"center", marginBottom: 14}}>
              <div style={{fontSize:48, marginBottom:8}}>📊</div>
              <p style={{marginBottom:14, fontStyle:"italic"}}>Seleziona il file .xlsx con squadre e giocatori</p>
              <input ref={fileInputRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}} />
              <button className="btn btn-primary" onClick={() => fileInputRef.current && fileInputRef.current.click()}>
                Scegli file Excel
              </button>
            </div>
            <div style={{fontSize:12, color:"var(--ink-soft)", fontStyle:"italic"}}>
              <strong>Formato standard:</strong> foglio "GIOCATORI 2026" (o "TUTTI I GIOCATORI") con blocchi-squadra (nome in MAIUSCOLO) seguiti dalle righe giocatori con colonne GIOCATORE, DATA DI NASCITA, LUOGO DI NASCITA, INDIRIZZO, N. CARTA DI IDENTITÀ, CODICE FISCALE.
            </div>
          </>
        )}

        {loading && <div style={{textAlign:"center", padding:30}}>Lettura file in corso...</div>}

        {/* STEP 2: SELETTORE FOGLIO + PREVIEW */}
        {workbook && (
          <>
            <div style={{display:"grid", gridTemplateColumns:"1fr auto", gap:12, alignItems:"end", marginBottom:14, padding:"12px 14px", background:"var(--cream-soft)", border:"1.5px solid var(--ink)", borderRadius:3}}>
              <div>
                <label>Foglio da importare</label>
                <select value={sheetName} onChange={e => changeSheet(e.target.value)}>
                  {workbook.SheetNames.map(n => (
                    <option key={n} value={n}>{n}</option>
                  ))}
                </select>
              </div>
              <button className="btn btn-sm" onClick={resetFile} title="Cambia file">⤺ Altro file</button>
            </div>

            {error && (
              <div style={{padding:14, background:"#fff", border:"1.5px solid var(--terracotta-dark)", borderRadius:3, color:"var(--terracotta-dark)", marginBottom:14}}>
                ⚠ {error}
              </div>
            )}

            {parsed && (
              <>
                <div style={{padding:12, background:"rgba(45,143,90,0.1)", border:"1.5px solid var(--green-field)", borderRadius:3, marginBottom:14}}>
                  ✓ Foglio "<strong>{sheetName}</strong>": <strong>{parsed.length} squadre</strong> con <strong>{parsed.reduce((a,t)=>a+t.players.length,0)} giocatori</strong>.
                </div>
                <div className="import-preview">
                  {parsed.map((t) => (
                    <div key={t.id} className="import-team-block">
                      <h4>{t.name}</h4>
                      <div className="count">{t.players.length} giocatori</div>
                      <ul>
                        {t.players.slice(0, 6).map((p, j) => (
                          <li key={j}>{p.name} · {formatDate(p.birthDate)}{p.birthPlace ? " · " + p.birthPlace : ""}</li>
                        ))}
                        {t.players.length > 6 && <li style={{fontStyle:"italic", opacity:0.7}}>...e altri {t.players.length - 6}</li>}
                      </ul>
                    </div>
                  ))}
                </div>
                <div className="modal-actions">
                  <button className="btn" onClick={onCancel}>Annulla</button>
                  {existingTeamCount > 0 && (
                    <button className="btn" onClick={() => onImport(parsed, "append")}>
                      Aggiungi a esistenti ({existingTeamCount})
                    </button>
                  )}
                  <button className="btn btn-primary" onClick={() => {
                    if (existingTeamCount > 0 && !confirm("Vuoi SOSTITUIRE le " + existingTeamCount + " squadre esistenti?")) return;
                    onImport(parsed, "replace");
                  }}>
                    {existingTeamCount > 0 ? "Sostituisci tutto" : "Importa"}
                  </button>
                </div>
              </>
            )}

            {!parsed && !error && (
              <div className="modal-actions">
                <button className="btn" onClick={onCancel}>Chiudi</button>
              </div>
            )}

            {!parsed && error && (
              <div className="modal-actions">
                <button className="btn" onClick={onCancel}>Chiudi</button>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function CalendarView({ teams, matches, setMatches, canEdit, showToast }) {
  const [filter, setFilter] = useState("ALL");
  const [editing, setEditing] = useState(null);
  const filtered = filter === "ALL" ? matches : matches.filter(m => m.girone === filter);
  const grouped = useMemo(() => {
    const byG = {};
    filtered.forEach(m => {
      if (!byG[m.girone]) byG[m.girone] = [];
      byG[m.girone].push(m);
    });
    return byG;
  }, [filtered]);

  const saveMatch = (updated) => {
    setMatches(matches.map(m => m.id === updated.id ? updated : m));
    setEditing(null);
    showToast("Risultato salvato");
  };

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Calendario</h1>
          <div className="subtitle">{matches.filter(m=>m.played).length} su {matches.length} partite giocate</div>
        </div>
      </div>

      <div style={{display:"flex", gap:8, marginBottom: 24, flexWrap:"wrap"}}>
        <button className={"btn btn-sm " + (filter==="ALL"?"btn-gold":"")} onClick={()=>setFilter("ALL")}>Tutte</button>
        {GIRONE_NAMES.map(g => (
          <button key={g} className={"btn btn-sm " + (filter===g?"btn-gold":"")} onClick={()=>setFilter(g)}>Girone {g}</button>
        ))}
      </div>

      {matches.length === 0 && (
        <div className="empty">
          <div className="empty-icon">📅</div>
          <h3>Calendario non generato</h3>
          <p>Assegna le squadre ai gironi e poi vai in Admin per generarlo.</p>
        </div>
      )}

      {Object.entries(grouped).map(([g, ms]) => (
        <div key={g} style={{marginBottom: 32}}>
          <h3 className="display" style={{fontSize:26, marginBottom:14, letterSpacing:"0.06em", color:"var(--green-deep)"}}>⚽ Girone {g}</h3>
          {ms.map(m => (
            <MatchRow key={m.id} match={m} teams={teams} onClick={canEdit ? () => setEditing(m) : null} />
          ))}
        </div>
      ))}

      {editing && <MatchEditor match={editing} teams={teams} onSave={saveMatch} onCancel={()=>setEditing(null)} />}
    </>
  );
}

function MatchEditor({ match, teams, onSave, onCancel }) {
  const homeT = teams.find(t => t.id === match.home);
  const awayT = teams.find(t => t.id === match.away);
  const [homeScore, setHomeScore] = useState(match.homeScore != null ? match.homeScore : "");
  const [awayScore, setAwayScore] = useState(match.awayScore != null ? match.awayScore : "");
  const [date, setDate] = useState(match.date || "");
  const [field, setField] = useState(match.field || "");
  // events: [{ id, playerId, playerName, teamId, type: "goal"|"yellow"|"red", note?: "autogol" }]
  const [events, setEvents] = useState(() => (match.events || []).map(e => ({...e})));

  // Form per aggiungere un evento
  const [newEventTeam, setNewEventTeam] = useState(match.home);
  const [newEventPlayer, setNewEventPlayer] = useState("");
  const [newEventType, setNewEventType] = useState("goal");
  const [newEventNote, setNewEventNote] = useState("");

  const homePlayers = (homeT && homeT.players) || [];
  const awayPlayers = (awayT && awayT.players) || [];
  const eventTeamPlayers = newEventTeam === match.home ? homePlayers : awayPlayers;

  // Conteggi rapidi
  const homeGoals = events.filter(e => e.type === "goal" && e.teamId === match.home).length;
  const awayGoals = events.filter(e => e.type === "goal" && e.teamId === match.away).length;
  const homeYellows = events.filter(e => e.type === "yellow" && e.teamId === match.home).length;
  const awayYellows = events.filter(e => e.type === "yellow" && e.teamId === match.away).length;
  const homeReds = events.filter(e => e.type === "red" && e.teamId === match.home).length;
  const awayReds = events.filter(e => e.type === "red" && e.teamId === match.away).length;

  const addEvent = () => {
    if (!newEventPlayer) { alert("Seleziona un giocatore"); return; }
    const player = eventTeamPlayers.find(p => p.id === newEventPlayer);
    if (!player) return;
    const newEvent = {
      id: uid(),
      playerId: player.id,
      playerName: player.name,
      teamId: newEventTeam,
      type: newEventType,
      note: newEventNote.trim() || ""
    };
    setEvents([...events, newEvent]);
    setNewEventPlayer("");
    setNewEventNote("");
  };

  const removeEvent = (eventId) => {
    setEvents(events.filter(e => e.id !== eventId));
  };

  // Auto-aggiornamento punteggio da gol (se non già modificato manualmente diversamente)
  const syncScoreFromGoals = () => {
    setHomeScore(homeGoals);
    setAwayScore(awayGoals);
  };

  const handleSave = (asPlayed) => {
    // Se il punteggio è vuoto ma ci sono gol negli eventi, uso il conteggio gol
    let hs = homeScore === "" ? null : parseInt(homeScore, 10);
    let as = awayScore === "" ? null : parseInt(awayScore, 10);
    if (hs == null && events.some(e => e.type === "goal")) hs = homeGoals;
    if (as == null && events.some(e => e.type === "goal")) as = awayGoals;

    if (asPlayed && (hs == null || as == null || isNaN(hs) || isNaN(as))) {
      alert("Inserisci entrambi i punteggi (o registra almeno i gol come eventi)"); return;
    }

    // Avviso se il punteggio non corrisponde ai gol registrati
    if (asPlayed && events.some(e => e.type === "goal")) {
      if (hs !== homeGoals || as !== awayGoals) {
        const msg = `Attenzione: il risultato (${hs}-${as}) non corrisponde ai gol registrati (${homeGoals}-${awayGoals}).\n\nVuoi salvare comunque?`;
        if (!confirm(msg)) return;
      }
    }

    onSave(Object.assign({}, match, {
      homeScore: hs, awayScore: as,
      played: asPlayed && hs != null && as != null,
      date: date || null, field: field || null,
      events: events,
    }));
  };

  const reset = () => {
    if (!confirm("Cancellare il risultato di questa partita (compresi gol e cartellini)?")) return;
    onSave(Object.assign({}, match, { homeScore: null, awayScore: null, played: false, events: [] }));
  };

  const eventTypeMeta = {
    goal:   { label: "⚽ Gol",        color: "var(--green-field)", text: "var(--cream)" },
    yellow: { label: "🟨 Ammonizione", color: "#e8b948",            text: "var(--ink)" },
    red:    { label: "🟥 Espulsione",  color: "var(--terracotta-dark)", text: "var(--cream)" },
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Partita</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>Girone {match.girone}</div>
        </div>

        {/* SQUADRE + PUNTEGGIO */}
        <div style={{display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:12, marginBottom:14}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:18}}>{homeT && homeT.name}</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--ink-soft)", marginTop:2, letterSpacing:"0.06em"}}>
              {homeGoals}⚽ · {homeYellows}🟨 · {homeReds}🟥
            </div>
          </div>
          <div style={{display:"flex", gap:6, alignItems:"center"}}>
            <input type="number" min="0" value={homeScore} onChange={e=>setHomeScore(e.target.value)} style={{width:60, textAlign:"center", fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}} />
            <span style={{fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}}>–</span>
            <input type="number" min="0" value={awayScore} onChange={e=>setAwayScore(e.target.value)} style={{width:60, textAlign:"center", fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}} />
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:18}}>{awayT && awayT.name}</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--ink-soft)", marginTop:2, letterSpacing:"0.06em"}}>
              {awayGoals}⚽ · {awayYellows}🟨 · {awayReds}🟥
            </div>
          </div>
        </div>

        {events.some(e => e.type === "goal") && (homeScore !== homeGoals || awayScore !== awayGoals) && (
          <div style={{padding:"8px 12px", background:"rgba(232,185,72,0.18)", border:"1px solid var(--gold-deep)", borderRadius:3, fontSize:12, marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center", gap:8}}>
            <span>⚠ Punteggio ({homeScore || 0}-{awayScore || 0}) diverso dai gol registrati ({homeGoals}-{awayGoals})</span>
            <button className="btn btn-sm btn-gold" onClick={syncScoreFromGoals}>Allinea</button>
          </div>
        )}

        <div className="form-row" style={{gridTemplateColumns:"1fr 1fr", marginBottom:18}}>
          <div>
            <label>Data / Orario</label>
            <input value={date} onChange={e=>setDate(e.target.value)} placeholder="Es. Sab 20/06 · 20:00" />
          </div>
          <div>
            <label>Campo</label>
            <input value={field} onChange={e=>setField(e.target.value)} placeholder="Es. Campo 1" />
          </div>
        </div>

        {/* SEZIONE EVENTI */}
        <div className="events-section">
          <div className="events-section-head">
            <span>Gol, ammonizioni, espulsioni ({events.length})</span>
          </div>

          {/* FORM AGGIUNGI EVENTO */}
          <div className="event-add-form">
            <div>
              <label>Squadra</label>
              <select value={newEventTeam} onChange={e=>{ setNewEventTeam(e.target.value); setNewEventPlayer(""); }}>
                <option value={match.home}>{homeT && homeT.name}</option>
                <option value={match.away}>{awayT && awayT.name}</option>
              </select>
            </div>
            <div>
              <label>Giocatore</label>
              <select value={newEventPlayer} onChange={e=>setNewEventPlayer(e.target.value)}>
                <option value="">— Seleziona —</option>
                {eventTeamPlayers.map(p => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            </div>
            <div>
              <label>Tipo</label>
              <select value={newEventType} onChange={e=>setNewEventType(e.target.value)}>
                <option value="goal">⚽ Gol</option>
                <option value="yellow">🟨 Ammonizione</option>
                <option value="red">🟥 Espulsione</option>
              </select>
            </div>
            <div>
              <label>Nota (facolt.)</label>
              <input value={newEventNote} onChange={e=>setNewEventNote(e.target.value)} placeholder="autogol, doppio giallo..." />
            </div>
            <button className="btn btn-gold" onClick={addEvent} disabled={!newEventPlayer}>+ Aggiungi</button>
          </div>

          {/* LISTA EVENTI */}
          {events.length === 0 ? (
            <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"14px 0", fontSize:13}}>
              Nessun evento registrato per questa partita.
            </p>
          ) : (
            <div className="event-list">
              {/* Home team events */}
              <div className="event-team-column">
                <div className="event-team-header">{homeT && homeT.name}</div>
                {events.filter(e => e.teamId === match.home).length === 0 && (
                  <div className="event-empty">—</div>
                )}
                {events.filter(e => e.teamId === match.home).map(e => {
                  const meta = eventTypeMeta[e.type];
                  return (
                    <div key={e.id} className="event-item" style={{background: meta.color, color: meta.text}}>
                      <span className="event-icon">{e.type === "goal" ? "⚽" : e.type === "yellow" ? "🟨" : "🟥"}</span>
                      <span className="event-player">{e.playerName}</span>
                      {e.note && <span className="event-note">{e.note}</span>}

                    </div>
                  );
                })}
              </div>
              {/* Away team events */}
              <div className="event-team-column">
                <div className="event-team-header">{awayT && awayT.name}</div>
                {events.filter(e => e.teamId === match.away).length === 0 && (
                  <div className="event-empty">—</div>
                )}
                {events.filter(e => e.teamId === match.away).map(e => {
                  const meta = eventTypeMeta[e.type];
                  return (
                    <div key={e.id} className="event-item" style={{background: meta.color, color: meta.text}}>
                      <span className="event-icon">{e.type === "goal" ? "⚽" : e.type === "yellow" ? "🟨" : "🟥"}</span>
                      <span className="event-player">{e.playerName}</span>
                      {e.note && <span className="event-note">{e.note}</span>}
                      <button onClick={() => removeEvent(e.id)} title="Rimuovi">✕</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div className="modal-actions">
          {match.played && <button className="btn btn-danger" onClick={reset}>Reset partita</button>}
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn" onClick={()=>handleSave(false)}>Salva bozza</button>
          <button className="btn btn-primary" onClick={()=>handleSave(true)}>Salva risultato</button>
        </div>
      </div>
    </div>
  );
}

function StatsView({ teams, matches }) {
  const [tab, setTab] = useState("scorers"); // "scorers" | "cards"

  // Mappa squadra per id
  const teamById = useMemo(() => {
    const m = {};
    teams.forEach(t => { m[t.id] = t; });
    return m;
  }, [teams]);

  // Aggrego tutti gli eventi per giocatore
  // Per ogni giocatore: { playerId, playerName, teamId, teamName, girone, goals, yellows, reds }
  const playerStats = useMemo(() => {
    const stats = {};
    matches.forEach(match => {
      (match.events || []).forEach(e => {
        if (!e.playerId) return;
        if (!stats[e.playerId]) {
          const team = teamById[e.teamId];
          stats[e.playerId] = {
            playerId: e.playerId,
            playerName: e.playerName,
            teamId: e.teamId,
            teamName: team ? team.name : "?",
            girone: team ? team.girone : "",
            goals: 0, yellows: 0, reds: 0,
          };
        }
        if (e.type === "goal") stats[e.playerId].goals++;
        else if (e.type === "yellow") stats[e.playerId].yellows++;
        else if (e.type === "red") stats[e.playerId].reds++;
      });
    });
    return Object.values(stats);
  }, [matches, teamById]);

  // Classifica marcatori (solo chi ha almeno 1 gol)
  const scorers = useMemo(() =>
    playerStats
      .filter(p => p.goals > 0)
      .sort((a, b) => b.goals - a.goals || a.playerName.localeCompare(b.playerName))
  , [playerStats]);

  const scorersByGirone = useMemo(() => {
    const map = {};
    GIRONE_NAMES.forEach(g => { map[g] = []; });
    scorers.forEach(p => {
      if (p.girone && map[p.girone]) map[p.girone].push(p);
    });
    return map;
  }, [scorers]);

  // Classifica cartellini (solo chi ha almeno 1 cartellino)
  const cards = useMemo(() =>
    playerStats
      .filter(p => p.yellows + p.reds > 0)
      .sort((a, b) =>
        (b.reds - a.reds) ||
        (b.yellows - a.yellows) ||
        a.playerName.localeCompare(b.playerName)
      )
  , [playerStats]);

  const cardsByGirone = useMemo(() => {
    const map = {};
    GIRONE_NAMES.forEach(g => { map[g] = []; });
    cards.forEach(p => {
      if (p.girone && map[p.girone]) map[p.girone].push(p);
    });
    return map;
  }, [cards]);

  // Totali
  const totalGoals = scorers.reduce((a, p) => a + p.goals, 0);
  const totalYellows = cards.reduce((a, p) => a + p.yellows, 0);
  const totalReds = cards.reduce((a, p) => a + p.reds, 0);

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Statistiche</h1>
          <div className="subtitle">
            {totalGoals} gol · {totalYellows} ammonizioni · {totalReds} espulsioni
          </div>
        </div>
      </div>

      <div className="stats-tabs">
        <button className={"stats-tab " + (tab === "scorers" ? "active" : "")} onClick={() => setTab("scorers")}>
          ⚽ Marcatori
        </button>
        <button className={"stats-tab " + (tab === "cards" ? "active" : "")} onClick={() => setTab("cards")}>
          🟨🟥 Cartellini
        </button>
      </div>

      {tab === "scorers" && (
        <ScorersTab scorers={scorers} scorersByGirone={scorersByGirone} />
      )}

      {tab === "cards" && (
        <CardsTab cards={cards} cardsByGirone={cardsByGirone} />
      )}
    </>
  );
}
