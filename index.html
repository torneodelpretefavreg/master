        </div>
      )}
    </>
  );
}

function StaffEditModal({ person, positions, turniCount, onSave, onDelete, onCancel }) {
  const [name, setName] = useState(person.name || "");
  const [preferred, setPreferred] = useState(person.preferredPosition || "");
  const [note, setNote] = useState(person.note || "");

  const handleSave = () => {
    if (!name.trim()) { alert("Il nome non può essere vuoto"); return; }
    onSave(Object.assign({}, person, {
      name: name.trim(),
      preferredPosition: preferred,
      note: note.trim()
    }));
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 500}}>
        <div className="modal-head">
          <h2>Modifica persona</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
            Assegnata a {turniCount} {turniCount === 1 ? "turno" : "turni"}
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Nome <span className="req">*</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} autoFocus />
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Posizione desiderata</label>
            <select value={preferred} onChange={e=>setPreferred(e.target.value)}>
              <option value="">— Nessuna preferenza —</option>
              {positions.map(p => (
                <option key={p.id} value={p.id}>{p.name}</option>
              ))}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div>
            <label>Note</label>
            <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Disponibile solo dopo le 21" />
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn btn-danger" onClick={onDelete} style={{marginRight:"auto"}}>🗑 Elimina</button>
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>Salva</button>
        </div>
      </div>
    </div>
  );
}

function PagamentiCard({ quoteConfig, setQuoteConfig, teams, payments, accountingOnline, showToast }) {
  const [iscDraft, setIscDraft] = useState(String(quoteConfig.quotaIscrizione || QUOTA_ISCRIZIONE_DEFAULT));
  const [assDraft, setAssDraft] = useState(String(quoteConfig.quotaPerGiocatore || QUOTA_ASSICURAZIONE_PER_GIOCATORE_DEFAULT));

  // Sincronizza i draft quando quoteConfig cambia (es. all'inizio quando arriva da Firebase)
  useEffect(() => {
    setIscDraft(String(quoteConfig.quotaIscrizione || QUOTA_ISCRIZIONE_DEFAULT));
    setAssDraft(String(quoteConfig.quotaPerGiocatore || QUOTA_ASSICURAZIONE_PER_GIOCATORE_DEFAULT));
  }, [quoteConfig.quotaIscrizione, quoteConfig.quotaPerGiocatore]);

  const totalePagato = teams.reduce((acc, t) => {
    const p = payments && payments[t.id];
    return acc + (p && p.importoPagato ? parseFloat(p.importoPagato) : 0);
  }, 0);
  const totaleDovuto = teams.reduce((acc, t) => {
    const numG = (t.players || []).length;
    return acc + (parseFloat(iscDraft) || 0) + numG * (parseFloat(assDraft) || 0);
  }, 0);
  const pagateCount = teams.filter(t => {
    const p = payments && payments[t.id];
    const numG = (t.players || []).length;
    const totale = (parseFloat(iscDraft) || 0) + numG * (parseFloat(assDraft) || 0);
    return p && (p.completato || (p.importoPagato && p.importoPagato >= totale));
  }).length;

  const handleSave = () => {
    const isc = parseFloat(iscDraft);
    const ass = parseFloat(assDraft);
    if (isNaN(isc) || isNaN(ass) || isc < 0 || ass < 0) {
      alert("Inserisci importi validi (numeri positivi)");
      return;
    }
    setQuoteConfig(Object.assign({}, quoteConfig, {
      quotaIscrizione: isc,
      quotaPerGiocatore: ass,
    }));
    showToast("Quote aggiornate");
  };

  const toggleSync = () => {
    setQuoteConfig(Object.assign({}, quoteConfig, {
      syncEnabled: !(quoteConfig.syncEnabled !== false),
    }));
  };

  const syncOn = quoteConfig.syncEnabled !== false;

  return (
    <div className="card">
      <h3 className="display" style={{fontSize:22, marginBottom:8, letterSpacing:"0.04em"}}>Pagamenti & Contabilità</h3>

      <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:14, fontFamily:"'JetBrains Mono', monospace", fontSize:11, letterSpacing:"0.08em"}}>
        <span style={{
          width:8, height:8, borderRadius:"50%",
          background: (syncOn && accountingOnline) ? "var(--green-line)" : "var(--terracotta-dark)",
          boxShadow: "0 0 6px " + ((syncOn && accountingOnline) ? "var(--green-line)" : "var(--terracotta-dark)")
        }} />
        <span style={{color:"var(--ink-soft)"}}>
          {syncOn
            ? (accountingOnline ? "SYNC ATTIVA · COLLEGATA A CONTABILITÀ" : "SYNC ATTIVA · OFFLINE")
            : "SYNC DISATTIVATA"}
        </span>
      </div>

      <div className="form-row" style={{gridTemplateColumns:"1fr 1fr"}}>
        <div>
          <label>Quota iscrizione (€)</label>
          <input type="number" min="0" step="0.01" value={iscDraft} onChange={e=>setIscDraft(e.target.value)} />
        </div>
        <div>
          <label>Assicurazione per giocatore (€)</label>
          <input type="number" min="0" step="0.01" value={assDraft} onChange={e=>setAssDraft(e.target.value)} />
        </div>
      </div>

      <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:14}}>
        <button className="btn btn-primary" onClick={handleSave}>Salva quote</button>
        <button className="btn" onClick={toggleSync}>{syncOn ? "Disattiva sync" : "Attiva sync"}</button>
      </div>

      <div style={{padding:"12px", background:"var(--cream-soft)", border:"1.5px solid var(--ink)", borderRadius:3, fontSize:13}}>
        <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
          <span>Totale dovuto:</span>
          <strong style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:20}}>{totaleDovuto.toFixed(0)}€</strong>
        </div>
        <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
          <span>Totale incassato:</span>
          <strong style={{fontFamily:"'Bebas Neue', sans-serif", fontSize:20, color:"var(--green-field)"}}>{totalePagato.toFixed(0)}€</strong>
        </div>
        <div style={{display:"flex", justifyContent:"space-between", paddingTop:8, borderTop:"1px dashed var(--ink)"}}>
          <span>Squadre saldate:</span>
          <strong>{pagateCount} / {teams.length}</strong>
        </div>
      </div>

      <p style={{fontSize:11, color:"var(--ink-soft)", fontStyle:"italic", marginTop:12, lineHeight:1.5}}>
        Le iscrizioni vengono pubblicate in tempo reale sul progetto Firebase della contabilità.
        Quando un pagamento viene registrato lì, lo stato si aggiorna automaticamente qui.
      </p>
    </div>
  );
}

function AdminView({ config, setConfig, teams, setTeams, matches, setMatches, onRegenerate, showToast, quoteConfig, setQuoteConfig, payments, accountingOnline }) {
  const [nameDraft, setNameDraft] = useState(config.tournamentName || "");

  const exportJSON = () => {
    const data = { config, teams, matches, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "tdp-backup-" + Date.now() + ".json";
    a.click();
    URL.revokeObjectURL(url);
    showToast("Backup esportato");
  };

  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm("Importare i dati? Sovrascriverà tutto.")) return;
        if (data.config) setConfig(data.config);
        if (data.teams) setTeams(data.teams);
        if (data.matches) setMatches(data.matches);
        showToast("Dati importati");
      } catch (err) { alert("File non valido"); }
    };
    reader.readAsText(file);
  };

  const exportExcel = () => {
    try {
      const wb = XLSX.utils.book_new();
      const playersRows = [["", "GIOCATORE", "DATA DI NASCITA", "LUOGO DI NASCITA", "INDIRIZZO", "N. CARTA DI IDENTITÀ", "CODICE FISCALE"]];
      teams.forEach((t) => {
        // Flag True in colonna A per la riga del nome squadra (formato GIOCATORI 2026)
        playersRows.push([true, t.name, null, null, null, null, null]);
        (t.players || []).forEach(p => {
          playersRows.push(["", p.name, p.birthDate || "", p.birthPlace || "", p.address || "", p.idCard || "", p.fiscalCode || ""]);
        });
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(playersRows), "GIOCATORI 2026");

      const teamRows = [["Squadra", "Girone", "Capitano", "Contatto", "N. Giocatori"]];
      teams.forEach(t => {
        const cap = (t.players || []).find(p => p.isCaptain);
        teamRows.push([t.name, t.girone || "", cap ? cap.name : "", t.contact || "", (t.players||[]).length]);
      });
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(teamRows), "SQUADRE");

      if (matches.length > 0) {
        const matchRows = [["Girone", "Casa", "Trasferta", "Pt Casa", "Pt Trasf", "Giocata", "Data", "Campo"]];
        matches.forEach(m => {
          const h = teams.find(t => t.id === m.home);
          const a = teams.find(t => t.id === m.away);
          matchRows.push([m.girone, h ? h.name : "", a ? a.name : "", m.homeScore != null ? m.homeScore : "", m.awayScore != null ? m.awayScore : "", m.played ? "SI" : "NO", m.date || "", m.field || ""]);
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(matchRows), "PARTITE");
      }
      XLSX.writeFile(wb, "TdP-export-" + new Date().toISOString().slice(0,10) + ".xlsx");
      showToast("Excel esportato");
    } catch (e) {
      alert("Errore export: " + e.message);
    }
  };

  const wipeAll = () => {
    if (!confirm("ATTENZIONE: cancellare TUTTI i dati? L'azione è irreversibile.")) return;
    if (!confirm("Sei davvero sicuro?")) return;
    setTeams([]); setMatches([]);
    setConfig({ tournamentName: "Torneo del Prete 2026", initialized: false });
    showToast("Dati cancellati");
  };

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Pannello Admin</h1>
          <div className="subtitle">Solo per lo staff.</div>
        </div>
      </div>

      <div className="grid-2">
        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Configurazione</h3>
          <div className="form-row">
            <div>
              <label>Nome del torneo</label>
              <input value={nameDraft} onChange={e=>setNameDraft(e.target.value)} />
            </div>
          </div>
          <button className="btn btn-primary" onClick={()=>{ setConfig(Object.assign({}, config, {tournamentName: nameDraft})); showToast("Salvato"); }}>Salva nome</button>
        </div>

        <PagamentiCard
          quoteConfig={quoteConfig}
          setQuoteConfig={setQuoteConfig}
          teams={teams}
          payments={payments}
          accountingOnline={accountingOnline}
          showToast={showToast}
        />

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Calendario gironi</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>
            Genera le 24 partite della fase a gironi seguendo lo schema ufficiale del torneo (date e orari dall'Excel).
            L'<strong>ordine di creazione</strong> delle squadre in ogni girone determina chi è A1/A2/A3/A4: la prima squadra messa nel girone A diventa A1, la seconda A2, ecc.
          </p>
          <div style={{padding:"10px 12px", background:"var(--cream-soft)", border:"1.5px solid var(--ink)", borderRadius:3, marginBottom:14, fontSize:13, fontFamily:"'JetBrains Mono', monospace"}}>
            {GIRONE_NAMES.map(g => {
              const inG = teams.filter(t => t.girone === g);
              const isOk = inG.length === 4;
              return (
                <div key={g} style={{display:"flex", justifyContent:"space-between", padding:"4px 0", color: isOk ? "var(--green-field)" : "var(--terracotta-dark)"}}>
                  <span>GIRONE {g}:</span>
                  <span>{inG.length}/4 squadre {isOk ? "✓" : "⚠"}</span>
                </div>
              );
            })}
          </div>
          <p style={{fontSize:12, color:"var(--ink-soft)", fontStyle:"italic", marginBottom:14}}>
            ⚠ La generazione sovrascrive il calendario attuale (risultati inclusi). Le finali non vengono create — saranno aggiunte in seguito.
          </p>
          <button className="btn btn-primary" onClick={onRegenerate}>Genera calendario gironi</button>
        </div>

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Export Excel</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Esporta squadre, giocatori e partite in .xlsx.</p>
          <button className="btn btn-gold" onClick={exportExcel}>📊 Esporta Excel</button>
        </div>

        <div className="card">
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em"}}>Backup JSON</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Backup completo dei dati in JSON.</p>
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            <button className="btn" onClick={exportJSON}>Esporta</button>
            <label className="btn" style={{cursor:"pointer"}}>
              Importa
              <input type="file" accept=".json" onChange={importJSON} style={{display:"none"}} />
            </label>
          </div>
        </div>

        <div className="card" style={{borderColor:"var(--terracotta-dark)", boxShadow:"4px 4px 0 var(--terracotta-dark)"}}>
          <h3 className="display" style={{fontSize:22, marginBottom:12, letterSpacing:"0.04em", color:"var(--terracotta-dark)"}}>Zona pericolo</h3>
          <p style={{fontSize:14, marginBottom:14, color:"var(--ink-soft)"}}>Cancella tutti i dati.</p>
          <button className="btn btn-danger" onClick={wipeAll}>Cancella tutto</button>
        </div>
      </div>
    </>
  );
}

document.getElementById("loading").style.display = "none";
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
