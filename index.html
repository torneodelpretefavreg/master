  <script>
    // ⬇️ INCOLLA QUI LA TUA CONFIG FIREBASE (vedi sezione Impostazioni nel menu)
    const FIREBASE_CONFIG = {
      apiKey: localStorage.getItem("fb_apiKey") || "",
      authDomain: localStorage.getItem("fb_authDomain") || "",
      databaseURL: localStorage.getItem("fb_databaseURL") || "",
      projectId: localStorage.getItem("fb_projectId") || "",
      storageBucket: localStorage.getItem("fb_storageBucket") || "",
      messagingSenderId: localStorage.getItem("fb_messagingSenderId") || "",
      appId: localStorage.getItem("fb_appId") || ""
    };
    let db = null;
    try {
      if (FIREBASE_CONFIG.databaseURL) {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.database();
      }
    } catch(e) { console.warn("Firebase non configurato:", e); }
  </script>

    /* Bottoni quantità +/- nel carrello (background #334155 → grigio chiaro, testo scuro) */

    /* Bottoni pagamento non selezionati */

    /* Ombre più morbide in light */

    @page { margin: 0mm 2mm; size: 76mm auto; }

      body * { visibility: hidden !important; }
      #receipt-print, #receipt-print * { visibility: visible !important; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DEFAULT_MENU = [
  { id:1,  name:"Panino Salsiccia",         price:6.00,  cat:"🥪 Panini", variants:["Cipolla + Peperoni","Solo Cipolla","Solo Peperoni","Solo Salsiccia"] },

  { id:18, name:"Vodka Tonic/Lemon",         price:5.00,  cat:"🍺 Alcolici" },
  { id:19, name:"Gin Malfy",                 price:7.00,  cat:"🍺 Alcolici" },
  { id:20, name:"Gin Hendricks",             price:8.00,  cat:"🍺 Alcolici" },
  { id:21, name:"Gin Mare",                  price:10.00, cat:"🍺 Alcolici" },
  { id:22, name:"Jager-Bomb",                price:5.00,  cat:"🍺 Alcolici" },
  { id:23, name:"4 Bianchi Maracuja",        price:5.00,  cat:"🍺 Alcolici" },
  { id:24, name:"Negroni",                   price:5.00,  cat:"🍺 Alcolici" },
  { id:25, name:"Rum e Pera",                price:3.00,  cat:"🥃 Shot" },
  { id:26, name:"Tequila S.L.",              price:3.00,  cat:"🥃 Shot" },
  { id:27, name:"Montenegro",                price:3.00,  cat:"🥃 Shot" },
  { id:28, name:"Jagermeister",              price:3.00,  cat:"🥃 Shot" },
];

const CIBO_CATEGORIES   = ["🥪 Panini","🍕 Extra"];
const FRITTI_CATEGORIES = ["🍟 Fritti"];
const BAR_CATEGORIES    = ["🥤 Analc.","🍺 Alcolici","🥃 Shot"];
const ALL_CATEGORIES    = ["🥪 Panini","🍟 Fritti","🍕 Extra","🥤 Analc.","🍺 Alcolici","🥃 Shot"];
const fmt = n => "€" + n.toFixed(2);
let rcptN = parseInt(localStorage.getItem("rcpt_n") || "1");

/* ── LOGIN ── */
function Login({ onLogin }) {
  const [pwd, setPwd] = useState("");
  const [err, setErr] = useState(false);
  const check = () => {
    if (pwd === "Torneo2026") { onLogin(); }
    else { setErr(true); setPwd(""); setTimeout(() => setErr(false), 1500); }
  };
  return (
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",padding:20}}>
      <div style={{background:"#1e293b",border:"1px solid #334155",borderRadius:20,padding:"40px 28px",textAlign:"center",width:"100%",maxWidth:340}}>
        <div style={{fontSize:56,marginBottom:10}}>⚽</div>
        <div style={{fontSize:24,fontWeight:800,color:"#f8fafc",marginBottom:6,letterSpacing:"-0.5px"}}>Torneo del Prete</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:28}}>Inserisci la password</div>
        <input type="password" value={pwd}
          onChange={e=>{setPwd(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&check()}
          placeholder="Password" autoFocus
          style={{width:"100%",background:err?"#3b0d0d":"#0f172a",border:`2px solid ${err?"#dc2626":"#334155"}`,color:err?"#f87171":"#e2e8f0",padding:"14px 16px",borderRadius:10,fontSize:18,fontFamily:"inherit",outline:"none",textAlign:"center",letterSpacing:6,marginBottom:10,transition:"all 0.2s"}}
        />
        {err && <div style={{color:"#f87171",fontSize:13,marginBottom:8}}>❌ Password errata</div>}
        <button onClick={check} style={{width:"100%",background:"#dc2626",border:"none",color:"#fff",padding:16,borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:17,fontWeight:900,marginTop:6,letterSpacing:1}}>
          ENTRA →
        </button>
      </div>
    </div>
  );
}

/* ── POS ── */
function POS({ theme, toggleTheme }) {
  const [cart, setCart]     = useState([]);
  const [view, setView]     = useState("cassa"); // cassa | carrello | scontrino | report | impostazioni
  const [cat, setCat]       = useState("Tutti");
  const [orders, setOrders] = useState(() => { try { return JSON.parse(localStorage.getItem("orders")||"[]"); } catch{return[];} });
  const [lastR, setLastR]   = useState(null);
  const [rcptIdx, setRcptIdx] = useState(0);
  const [autoPrint, setAutoPrint] = useState(false);

  useEffect(() => {
    if (autoPrint && view === "scontrino" && lastR) {
      const t = setTimeout(() => { window.print(); setAutoPrint(false); }, 500);
      return () => clearTimeout(t);
    }
  }, [autoPrint, view, lastR, rcptIdx]);
  const [synced, setSynced] = useState(false);
  const [syncStatus, setSyncStatus] = useState("local"); // local | connected | error
  const [processing, setProcessing] = useState(false); // blocca doppio incasso

  // Firebase sync
  useEffect(() => {
    if (!db) { setSyncStatus("local"); return; }
    setSyncStatus("connecting");
    const ref = db.ref("torneo/orders");
    const handler = snap => {
      const val = snap.val();
      if (val) {
        const arr = Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.id-b.id);
        setOrders(arr);
        localStorage.setItem("orders", JSON.stringify(arr));
        // Tiene il contatore locale sempre avanti rispetto al massimo id già su Firebase
        if (arr.length) { const maxId = arr[arr.length-1].id || 0; if (maxId + 1 > rcptN) rcptN = maxId + 1; }
      } else {
        setOrders([]);
      }
      setSynced(true);
      setSyncStatus("connected");
    };
    ref.on("value", handler, () => setSyncStatus("error"));
    return () => ref.off("value", handler);
  }, []);

  // Comande (cucina)
  const [comande, setComande] = useState([]);
  useEffect(() => {
    if (!db) return;
    const ref = db.ref("torneo/comande");
    const handler = snap => {
      const val = snap.val();
      if (val) {
        const arr = Object.entries(val).map(([k,v])=>({...v,_key:k})).sort((a,b)=>a.id-b.id);
        setComande(arr);
      } else {
        setComande([]);
      }
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  // Menu state (editabile + sincronizzato)
  const [menu, setMenu] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("menu")||"null");
      return (saved && saved.length) ? saved : DEFAULT_MENU;
    } catch { return DEFAULT_MENU; }
  });

  // Firebase sync per il menu
  useEffect(() => {
    if (!db) return;
    const ref = db.ref("torneo/menu");
    const handler = snap => {
      const val = snap.val();
      if (val && Array.isArray(val) && val.length) {
        setMenu(val);
        localStorage.setItem("menu", JSON.stringify(val));
      }
    };
    ref.on("value", handler);
    return () => ref.off("value", handler);
  }, []);

  const saveMenu = (newMenu) => {
    setMenu(newMenu);
    localStorage.setItem("menu", JSON.stringify(newMenu));
    if (db) db.ref("torneo/menu").set(newMenu);
  };

  const [search, setSearch] = useState("");
  const [pay, setPay]       = useState("contanti");
  const [disc, setDisc]     = useState(0);
  const [table, setTable]   = useState("");
  const [flash, setFlash]   = useState(null);
  const [variantPick, setVariantPick] = useState(null); // {item} - item con varianti da scegliere
  const [variantSel, setVariantSel] = useState([]);      // opzioni selezionate nel picker (multi-scelta)
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  const subtotal = cart.reduce((s,i)=>s+i.price*i.qty,0);
  const discAmt  = subtotal*(disc/100);
  const total    = subtotal-discAmt;
  const cartCount = cart.reduce((s,i)=>s+i.qty,0);

  const _pushToCart = (it) => {
    setCart(p=>{const e=p.find(i=>i.id===it.id);return e?p.map(i=>i.id===it.id?{...i,qty:i.qty+1}:i):[...p,{...it,qty:1}];});
    setFlash("+1 "+it.name);
    setTimeout(()=>setFlash(null),900);
  };

  const addItem = item => {
    // Se è già un item dal carrello (con qty/variant già definiti), aggiungi direttamente
    if (item.qty !== undefined || item.variant !== undefined) { _pushToCart(item); return; }
    // Se ha varianti, apri il picker (multi-scelta)
    if (item.variants && item.variants.length) { setVariantSel([]); setVariantPick(item); return; }
    _pushToCart(item);
  };

  // Attiva/disattiva una singola opzione nel picker
  const toggleVariant = (v) => setVariantSel(p => p.includes(v) ? p.filter(x=>x!==v) : [...p, v]);

  // Conferma la selezione (può essere multipla) e aggiunge al carrello
  const confirmVariants = () => {
    const item = variantPick;
    if (!item) return;
    // Nessuna opzione scelta → aggiunge l'articolo base
    if (variantSel.length === 0) {
      _pushToCart({ id:item.id, name:item.name, price:item.price, cat:item.cat });
      setVariantPick(null); setVariantSel([]); return;
    }
    // Ordina le opzioni secondo l'ordine originale (id coerente a parità di combinazione)
    const ordered = item.variants.filter(v => variantSel.includes(v));
    // id univoco per combinazione tramite bitmask degli indici scelti
    let mask = 0;
    ordered.forEach(v => { mask += Math.pow(2, item.variants.indexOf(v)); });
    const label = ordered.join(", ");
    const variantItem = {
      id: item.id * 1000000 + mask,
      name: item.name + " (" + label + ")",
      price: item.price,
      cat: item.cat,
      variant: label,
    };
    _pushToCart(variantItem);
    setVariantPick(null); setVariantSel([]);
  };
  const remItem = id => setCart(p=>{const e=p.find(i=>i.id===id);return e.qty===1?p.filter(i=>i.id!==id):p.map(i=>i.id===id?{...i,qty:i.qty-1}:i);});
  const clearCart = ()=>{setCart([]);setDisc(0);setTable("");};


  // Stampa automatica in sequenza di tutti gli scontrini dell'ultimo ordine.
  // window.print() è bloccante in modalità finestra di dialogo: dopo che torna,
  // passiamo allo scontrino successivo. In modalità chiosco (stampa silenziosa)
  // i lavori vengono accodati con un piccolo intervallo tra l'uno e l'altro.
  const printAllReceipts = (total) => {
    if (!total || total < 1) return;
    const step = (k) => {
      setRcptIdx(k);
      setTimeout(() => {
        try { window.print(); } catch (e) {}
        if (k + 1 < total) setTimeout(() => step(k + 1), 400);
      }, 500); // attende il render del nuovo scontrino
    };
    step(0);
  };

  const checkout = () => {
    if (!cart.length) return;
    if (!table.trim()) {
      alert("Inserisci il nome del cliente prima di incassare.");
      return;
    }
    if (processing) return;          // evita doppio tap / doppio incasso
    setProcessing(true);

    const now = new Date().toLocaleString("it-IT");
    const nomeBase = table.trim();
    const escNome = nomeBase.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    // Cerca comande non evase con lo stesso nome (o con suffisso "Nome N")
    const attive = comande.filter(c => !c.evasa);
    const regex = new RegExp("^" + escNome + "( \\d+)?$", "i");
    const conflitti = attive.filter(c => c.cliente && regex.test(c.cliente));
    let clienteFinale = nomeBase;
    if (conflitti.length > 0) {
      let maxN = 1;
      conflitti.forEach(c => {
        const match = c.cliente.match(new RegExp("^" + escNome + " (\\d+)$", "i"));
        if (match) { const n = parseInt(match[1]); if (n > maxN) maxN = n; }
      });
      clienteFinale = nomeBase + " " + (maxN + 1);
    }

    const ciboItems   = cart.filter(i => CIBO_CATEGORIES.includes(i.cat));
    const frittiItems = cart.filter(i => FRITTI_CATEGORIES.includes(i.cat));
    const barItems    = cart.filter(i => BAR_CATEGORIES.includes(i.cat));
    const nReceipts = (ciboItems.length?1:0) + (frittiItems.length?1:0) + (barItems.length?1:0);
    if (!nReceipts) { setProcessing(false); return; }

    // Costruisce e salva gli scontrini a partire dal primo numero assegnato
    const finishCheckout = (firstId) => {
      let n = firstId;
      const receipts = [];
      const makeReceipt = (items, centro) => {
        const sub  = items.reduce((s,i)=>s+i.price*i.qty,0);
        const dAmt = sub*(disc/100);
        return { id: n++, date: now, items, subtotal: sub, disc, discAmt: dAmt, total: sub - dAmt, pay, table: clienteFinale, centro };
      };
      if (ciboItems.length)   receipts.push(makeReceipt(ciboItems,   "🍕 CIBO"));
      if (frittiItems.length) receipts.push(makeReceipt(frittiItems, "🍟 FRITTI"));
      if (barItems.length)    receipts.push(makeReceipt(barItems,    "🍺 BAR"));

      // COMANDA per la cucina (tutti gli articoli food: cibo + fritti)
      const foodItems = [...ciboItems, ...frittiItems];
      if (foodItems.length && db) {
        const foodReceipt = receipts.find(r => r.centro === "🍕 CIBO" || r.centro === "🍟 FRITTI");
        const comanda = {
          id: foodReceipt ? foodReceipt.id : firstId,
          date: now,
          cliente: clienteFinale,
          items: foodItems.map((it, idx) => ({ uid: idx, name: it.name, variant: it.variant || null, qty: it.qty, done: false })),
          stato: "attesa",
          evasa: false,
        };
        db.ref("torneo/comande").push(comanda);
      }

      rcptN = n;
      localStorage.setItem("rcpt_n", rcptN);

      receipts.forEach(r => {
        if (db) {
          db.ref("torneo/orders").push(r).catch(()=>{
            const no=[...orders,...receipts];
            setOrders(no);
            localStorage.setItem("orders",JSON.stringify(no));
          });
        } else {
          const no=[...orders,...receipts];
          setOrders(no);
          localStorage.setItem("orders",JSON.stringify(no));
        }
      });

      setLastR(receipts);
      setRcptIdx(0);
      clearCart();
      setView("scontrino");
      setProcessing(false);
      printAllReceipts(receipts.length);
    };

    if (db) {
      // Numerazione globale e atomica: riserva nReceipts numeri sul contatore condiviso
      const maxExisting = orders.reduce((m,o)=>Math.max(m, o.id||0), 0);
      let done = false;
      const fallbackTimer = setTimeout(() => {
        if (done) return; done = true;
        finishCheckout(Math.max(rcptN, maxExisting + 1));
      }, 2500);
      db.ref("torneo/counter").transaction(cur => {
        const base = (typeof cur === "number" && cur >= maxExisting) ? cur : maxExisting;
        return base + nReceipts;
      }).then(res => {
        if (done) return; done = true; clearTimeout(fallbackTimer);
        const committed = (res && res.snapshot) ? res.snapshot.val() : null;
        const firstId = (typeof committed === "number") ? (committed - nReceipts + 1) : Math.max(rcptN, maxExisting + 1);
        finishCheckout(firstId);
      }).catch(() => {
        if (done) return; done = true; clearTimeout(fallbackTimer);
        finishCheckout(Math.max(rcptN, maxExisting + 1));
      });
    } else {
      finishCheckout(rcptN);
    }
  };

  // === FUNZIONI COMANDE (Cucina) ===
  const toggleComandaItem = (comanda, itemUid) => {
    const newItems = comanda.items.map(it =>
      it.uid === itemUid ? {...it, done: !it.done} : it
    );
    const allDone = newItems.every(it => it.done);
    const update = { items: newItems, evasa: allDone };
    if (allDone) update.stato = "evasa";
    else if (comanda.stato === "evasa") update.stato = "lavorazione";
    if (db && comanda._key) db.ref("torneo/comande/" + comanda._key).update(update);
  };

  const consegnaScontrino = (comanda) => {
    if (db && comanda._key) db.ref("torneo/comande/" + comanda._key).update({ stato: "lavorazione" });
  };

  const evadiComanda = (comanda) => {
    const newItems = comanda.items.map(it => ({...it, done: true}));
    if (db && comanda._key) db.ref("torneo/comande/" + comanda._key).update({ items: newItems, evasa: true, stato: "evasa" });
  };

  const svuotaStorico = () => {
    const evase = comande.filter(c => c.evasa || c.stato === "evasa");
    if (!evase.length) { alert("Lo storico è già vuoto."); return; }
    if (!window.confirm("Eliminare tutte le " + evase.length + " comande evase dallo storico? Non si può annullare.")) return;
    if (db) evase.forEach(c => { if (c._key) db.ref("torneo/comande/" + c._key).remove(); });
  };

  const deleteComanda = (comanda) => {
    if (!window.confirm("Eliminare definitivamente la comanda di " + comanda.cliente + "?")) return;
    if (db && comanda._key) db.ref("torneo/comande/" + comanda._key).remove();
  };

  // Sposta una comanda (da attesa o lavorazione) direttamente nello storico
  const archiviaComanda = (comanda) => {
    if (!window.confirm("Spostare la comanda di " + comanda.cliente + " nello storico?")) return;
    if (db && comanda._key) db.ref("torneo/comande/" + comanda._key).update({ stato: "evasa", evasa: true });
  };

  // Riporta una comanda dallo storico allo stato "in attesa" (azzera le spunte)
  const riportaInAttesa = (comanda) => {
    if (db && comanda._key) {
      const resetItems = (comanda.items || []).map(it => ({ ...it, done: false }));
      db.ref("torneo/comande/" + comanda._key).update({ stato: "attesa", evasa: false, items: resetItems });
    }
  };

  const deleteAllOrders = () => {
    if (!window.confirm("Eliminare tutti i dati? Non si può annullare.")) return;
    if (db) { db.ref("torneo/orders").remove(); }
    setOrders([]);
    localStorage.removeItem("orders");
  };

  const deleteOrder = (order) => {
    if (!window.confirm("Annullare lo scontrino N." + String(order.id).padStart(4,"0") + "?")) return;
    if (db && order._key) {
      db.ref("torneo/orders/" + order._key).remove();
    } else {
      const no = orders.filter(o => o.id !== order.id);
      setOrders(no);
      localStorage.setItem("orders", JSON.stringify(no));
    }
  };

  const editOrder = (order) => {
    if (!window.confirm("Modificare lo scontrino N." + String(order.id).padStart(4,"0") + "? Verrà riaperto nel carrello e lo scontrino originale sarà eliminato.")) return;

    setCart(order.items.map(i => ({...i})));
    setDisc(order.disc || 0);
    setTable(order.table || "");
    setPay(order.pay || "contanti");
    // Delete original
    if (db && order._key) {
      db.ref("torneo/orders/" + order._key).remove();
    } else {
      const no = orders.filter(o => o.id !== order.id);
      setOrders(no);
      localStorage.setItem("orders", JSON.stringify(no));

  const CATS = ["Tutti", ...ALL_CATEGORIES.filter(c => menu.some(i => i.cat === c))];

  const today    = new Date().toLocaleDateString("it-IT");
  const todayO   = orders.filter(o=>o.date.startsWith(today));
  const todayRev = todayO.reduce((s,o)=>s+o.total,0);
  const totalRev = orders.reduce((s,o)=>s+o.total,0);
  const payBreak = orders.reduce((a,o)=>{a[o.pay]=(a[o.pay]||0)+o.total;return a;},{});
  const topItems = Object.entries(orders.flatMap(o=>o.items).reduce((a,i)=>{a[i.name]=(a[i.name]||0)+i.qty;return a;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const exportExcel = () => {

      ["Incasso Oggi (€)",    Number(todayRev.toFixed(2))],
      ["Incasso Totale (€)",  Number(totalRev.toFixed(2))],
      ["Scontrini Oggi",      todayO.length],
      ["Scontrini Totali",    orders.length],
      ["Scontrino Medio (€)", orders.length ? Number((totalRev/orders.length).toFixed(2)) : 0],
      [],
      ["METODI DI PAGAMENTO"],
      ["Metodo", "Totale (€)"],
      ...Object.entries(payBreak).map(([m,v]) => [m, Number(v.toFixed(2))]),

    [...orders].reverse().forEach(o => {

        o.table || "-",
        o.centro || "-",
        o.items.map(i => i.name + " x" + i.qty).join(" | "),

    // --- Foglio 3: Articoli per scontrino ---

          o.centro || "-",

          Number(i.price.toFixed(2)),
          i.qty,
          Number((i.price*i.qty).toFixed(2)),

    const ws3 = XLSX.utils.aoa_to_sheet(articoli);
    ws3["!cols"] = [{wch:14},{wch:20},{wch:12},{wch:30},{wch:14},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws3, "Articoli");

    // Download .xlsx
    const dateStr = today.replace(/\//g, "-");

                    <button onClick={()=>remItem(item.id)} style={{background:"#334155",border:"none",color:"#e2e8f0",width:32,height:32,borderRadius:8,cursor:"pointer",fontSize:18,fontFamily:"inherit"}}>−</button>

                  </div>
                  {disc>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#94a3b8",marginBottom:4}}><span>Subtotale</span><span>{fmt(subtotal)}</span></div>}
                  {disc>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#f87171",marginBottom:4}}><span>Sconto -{disc}%</span><span>−{fmt(discAmt)}</span></div>}

                    {[["contanti","💵"],["carta","💳"],["pos","📱"],["ticket","🎫"]].map(([m,ic])=>(
                      <button key={m} onClick={()=>setPay(m)} style={{background:pay===m?"#991b1b":"#1e293b",border:`2px solid ${pay===m?"#dc2626":"#334155"}`,color:pay===m?"#fff":"#94a3b8",padding:"10px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,textTransform:"capitalize"}}>

                  {/* Actions */}
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={clearCart} style={{flex:1,background:"#7f1d1d",border:"none",color:"#fca5a5",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>

                    </button>

        <div style={{flex:1,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",alignItems:"center"}}>

            <div style={{borderTop:"1px dashed #000",margin:"8px 0"}}/>

                </div>

            <div style={{borderTop:"1px dashed #000",margin:"8px 0"}}/>
            {r.disc>0&&<>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span>Subtotale</span><span>{fmt(r.subtotal)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span>Sconto {r.disc}%</span><span>-{fmt(r.discAmt)}</span></div>
            </>}
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:900,fontSize:16,borderTop:"2px solid #111",marginTop:4,paddingTop:4}}>
              <span>TOTALE</span><span>{fmt(r.total)}</span>
            </div>
            <div style={{textAlign:"center",fontSize:11,marginTop:4}}>{r.pay.toUpperCase()}</div>
            <div style={{borderTop:"1px dashed #000",margin:"8px 0"}}/>
            <div style={{textAlign:"center",fontSize:11}}>Grazie per la visita! 😊</div>
            <div style={{textAlign:"center",fontSize:11}}>--- Arrivederci ---</div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:16,width:"100%",maxWidth:320}}>

          </div>
        </div>

                <div style={{fontSize:22,fontWeight:900,color:"#4ade80"}}>{v}</div>
                <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s}</div>
              </div>
            ))}
          </div>
          {/* Top prodotti */}
          <div style={{background:"#1e293b",borderRadius:10,padding:"14px",border:"1px solid #334155",marginBottom:10}}>
            <div style={{fontSize:14,fontWeight:700,color:"#f8fafc",marginBottom:10}}>🏆 Top Prodotti</div>

                    <div style={{fontSize:12,color:"#e2e8f0"}}>{o.date}</div>
                    <div style={{fontSize:11,color:"#64748b",textTransform:"capitalize"}}>{o.pay} {o.table?"· "+o.table:""}</div>

                  <span style={{fontWeight:900,color:"#4ade80",fontSize:14}}>{fmt(o.total)}</span>

                  <button onClick={()=>editOrder(o)} style={{flex:1,background:"#1d4ed8",border:"none",color:"#fff",padding:"6px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>✏️ Modifica</button>

      {view==="articoli" && (

                <span style={{fontSize:12,color:"#cbd5e1",lineHeight:1.5}}>{t}</span>
              </div>

          </div>
          <button onClick={()=>setView("scontrino")} style={{width:"100%",background:"#1d4ed8",border:"1px solid #3b82f6",color:"#fff",padding:14,borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>

  /* ── DESKTOP LAYOUT (invariato) ── */

            <div style={{fontSize:18,fontWeight:800,color:"#f8fafc",marginBottom:6,letterSpacing:"-0.3px"}}>{variantPick.name}</div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {variantPick.variants.map(v => {
                const on = variantSel.includes(v);
                return (
                  <button key={v} onClick={()=>toggleVariant(v)} style={{background:on?"#7f1d1d":"#0f172a",border:"1px solid "+(on?"#dc2626":"#334155"),color:on?"#fff":"#e2e8f0",padding:"14px 16px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:600,textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
                    <span>{v}</span>
                    <span style={{fontSize:16,opacity:on?1:0.3}}>{on?"\u2713":"\u25cb"}</span>
                  </button>
                );
              })}
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={()=>{setVariantPick(null);setVariantSel([]);}} style={{flex:1,background:"transparent",border:"1px solid #334155",color:"#94a3b8",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>
                Annulla

              <button onClick={confirmVariants} style={{flex:2,background:"#dc2626",border:"none",color:"#fff",padding:"12px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:15,fontWeight:700}}>

            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:8}}>
          {[["cassa","🧾 Cassa"],["cucina","🧑‍🍳 Cucina"],["report","📊 Report"],["articoli","🍔 Articoli"],["impostazioni","⚙️ Stampante"]].map(([v,label])=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#dc2626":"transparent",border:`1px solid ${view===v?"#dc2626":"#334155"}`,color:view===v?"#fff":"#94a3b8",padding:"6px 14px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>

            </button>

            {theme==="dark"?"☀️":"🌙"}
          </button>
        </div>
      </nav>

      {flash&&<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:"#22c55e",color:"#fff",padding:"8px 24px",borderRadius:20,fontWeight:700,zIndex:999,fontSize:14,pointerEvents:"none"}}>{flash}</div>}

      {view==="cassa"&&(
        <div style={{display:"flex",flex:1,height:"calc(100vh - 57px)",overflow:"hidden"}}>
          <div style={{flex:1,display:"flex",flexDirection:"column",padding:16,overflow:"hidden",borderRight:"1px solid #1e293b",gap:10}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Cerca prodotto..." style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",padding:"8px 14px",borderRadius:8,fontSize:14,fontFamily:"inherit",outline:"none"}} />

              {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?"#dc2626":"#1e293b",border:`1px solid ${cat===c?"#dc2626":"#334155"}`,color:cat===c?"#fff":"#94a3b8",padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{c}</button>)}

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,overflowY:"auto",flex:1}}>

              <input value={table} onChange={e=>setTable(e.target.value)} placeholder="Nome cliente (obbligatorio)" style={{width:"100%",background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",padding:"6px 10px",borderRadius:6,fontSize:13,fontFamily:"inherit",outline:"none",marginTop:8}} />
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
              {!cart.length&&<div style={{textAlign:"center",color:"#475569",padding:"40px 0",fontSize:15}}>Nessun articolo<br/><span style={{fontSize:32}}>🛒</span></div>}

                <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #1e293b"}}>

                    <span style={{width:22,textAlign:"center",fontWeight:700,fontSize:14}}>{item.qty}</span>
                    <button onClick={()=>addItem(item)} style={{background:"#334155",border:"none",color:"#e2e8f0",width:26,height:26,borderRadius:6,cursor:"pointer",fontSize:16,fontFamily:"inherit"}}>+</button>
                  </div>
                  <div style={{fontSize:14,fontWeight:700,color:"#f87171",minWidth:60,textAlign:"right"}}>{fmt(item.price*item.qty)}</div>
                </div>
              ))}

            <div style={{padding:"12px 14px",borderTop:"1px solid #1e293b"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"#94a3b8"}}>Sconto %</span>
                <input type="number" min="0" max="100" value={disc} onChange={e=>setDisc(Math.min(100,Math.max(0,+e.target.value)))} style={{background:"#1e293b",border:"1px solid #334155",color:"#e2e8f0",padding:"4px 8px",borderRadius:6,width:60,textAlign:"center",fontSize:14,fontFamily:"inherit",outline:"none"}} />
              </div>
              {disc>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:14}}><span style={{color:"#94a3b8"}}>Subtotale</span><span>{fmt(subtotal)}</span></div>}
              {disc>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:14}}><span style={{color:"#f87171"}}>Sconto -{disc}%</span><span style={{color:"#f87171"}}>−{fmt(discAmt)}</span></div>}
              <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:22,fontWeight:900,color:"#4ade80",margin:"8px 0"}}><span>TOTALE</span><span>{fmt(total)}</span></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,margin:"10px 0"}}>
                {[["contanti","💵"],["carta","💳"],["pos","📱"],["ticket","🎫"]].map(([m,ic])=>(
                  <button key={m} onClick={()=>setPay(m)} style={{background:pay===m?"#991b1b":"#1e293b",border:`1px solid ${pay===m?"#dc2626":"#334155"}`,color:pay===m?"#fff":"#94a3b8",padding:"7px 4px",borderRadius:8,cursor:"pointer",fontSize:12,fontFamily:"inherit",textTransform:"capitalize"}}>{ic} {m}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={clearCart} style={{flex:1,background:"#7f1d1d",border:"none",color:"#fca5a5",padding:"10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>🗑 Cancella</button>
                <button onClick={checkout} disabled={!cart.length || processing} style={{flex:2,background:processing?"#166534":"#15803d",border:"none",color:"#fff",padding:"10px",borderRadius:8,cursor:processing?"wait":"pointer",opacity:processing?0.6:1,fontFamily:"inherit",fontSize:13,fontWeight:700}}>{processing ? "⏳ Attendi…" : <>✅ Incassa {fmt(total)}</>}</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {view==="scontrino"&&lastR&&(()=>{
        const receipts = Array.isArray(lastR) ? lastR : [lastR];
        const r = receipts[rcptIdx];
        const isLast = rcptIdx >= receipts.length - 1;
        const hasMultiple = receipts.length > 1;
        return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:32}}>
          {hasMultiple && (
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {receipts.map((rec,i)=>(
                <button key={i} onClick={()=>setRcptIdx(i)} style={{padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700,background:rcptIdx===i?"#dc2626":"#334155",color:"#fff"}}>
                  {rec.centro}
                </button>
              ))}
            </div>
          )}
          <div id="receipt-print" style={{background:"#fff",color:"#000",width:280,padding:20,borderRadius:4,fontFamily:"'JetBrains Mono','Courier New',monospace",boxShadow:"0 8px 40px rgba(0,0,0,0.5)",fontSize:12,fontWeight:700}}>
            <div style={{textAlign:"center",fontSize:16,fontWeight:900}}>TORNEO DEL PRETE</div>
            {r.centro && <div style={{textAlign:"center",fontSize:13,fontWeight:900,letterSpacing:2,marginTop:2}}>{r.centro}</div>}
            <div style={{textAlign:"center",fontSize:11}}>Comune di Fabbrico</div>
            <div style={{borderTop:"1px dashed #000",margin:"8px 0"}}/>
            <div style={{textAlign:"center",fontSize:11}}>N. {String(r.id).padStart(4,"0")} — {r.date}</div>
            {r.table&&<div style={{textAlign:"center",fontSize:11}}>Tavolo: {r.table}</div>}
            <div style={{borderTop:"1px dashed #000",margin:"8px 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",borderBottom:"1px solid #eee",paddingBottom:4,marginBottom:4,fontSize:11}}><span>Descrizione</span><span>Qt</span><span>Imp.</span></div>
            {r.items.map((i,idx)=>{
              const baseName = i.variant ? i.name.replace(" ("+i.variant+")","") : i.name;
              const name = baseName.length>18 ? baseName.substring(0,17)+"." : baseName.padEnd(18," ");
              return (

function CucinaView({ comande, toggleComandaItem, evadiComanda, consegnaScontrino, deleteComanda, archiviaComanda, riportaInAttesa, svuotaStorico, isMobile }) {
  const [tab, setTab] = React.useState("attesa"); // attesa | lavorazione | storico

  // Le comande nuove senza il campo stato sono considerate "attesa"
  const getStato = c => c.evasa ? "evasa" : (c.stato || "attesa");

  const attesa     = comande.filter(c => getStato(c) === "attesa");
  const lavoraz    = comande.filter(c => getStato(c) === "lavorazione");
  const storico    = comande.filter(c => getStato(c) === "evasa").reverse();

  const C = {
    bg:"#1e293b", border:"#334155", input:"#0f172a",
    text:"#e2e8f0", muted:"#94a3b8", price:"#f87171",
    success:"#15803d", successBg:"#14532d", warning:"#fbbf24",
  };

  const ComandaCard = ({ c }) => {
    const stato = getStato(c);
    const evasa = stato === "evasa";
    const isAttesa = stato === "attesa";

    const borderColor = isAttesa ? "#fbbf24" : (evasa ? C.border : "#dc2626");
    const badgeColor  = isAttesa ? {bg:"#713f12",text:"#fbbf24",icon:"⏳",label:"IN ATTESA"}
                       : (evasa ? {bg:C.successBg,text:"#4ade80",icon:"✅",label:"EVASA"}
                                : {bg:"#991b1b",text:"#fff",icon:"🔥",label:"IN LAVORAZ."});

    return (
      <div style={{background:C.bg, borderRadius:12, padding:14, border:"2px solid "+borderColor, marginBottom:10, opacity:evasa?0.6:1}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, gap:8}}>
          <div>
            <div style={{fontSize:17, fontWeight:800, color:"#f8fafc", letterSpacing:"-0.3px"}}>
              👤 {c.cliente}
            </div>
            <div style={{fontSize:11, color:C.muted, marginTop:2}}>
              #{String(c.id).padStart(4,"0")} · {c.date}
            </div>
          </div>
          <span style={{fontSize:11, padding:"4px 10px", borderRadius:20, background:badgeColor.bg, color:badgeColor.text, fontWeight:700, whiteSpace:"nowrap"}}>
            {badgeColor.icon} {badgeColor.label}
          </span>
        </div>

        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          {c.items.map(it => (
            <div key={it.uid} onClick={()=>!evasa && !isAttesa && toggleComandaItem(c, it.uid)}
              style={{
                display:"flex", alignItems:"center", gap:10,
                padding:"10px 12px",
                background: it.done ? "#0a1e0f" : C.input,
                border:"1px solid "+(it.done?"#15803d":C.border),
                borderRadius:8,
                cursor: (evasa || isAttesa) ? "default" : "pointer",
              }}>
              <div style={{
                width:22, height:22, borderRadius:6,
                background: it.done ? "#15803d" : "transparent",
                border:"2px solid "+(it.done?"#15803d":C.muted),
                display:"flex", alignItems:"center", justifyContent:"center",
                flexShrink:0, fontSize:14, color:"#fff", fontWeight:900,
              }}>
                {it.done ? "✓" : ""}
              </div>
              <div style={{flex:1}}>
                <div style={{
                  fontSize:14, fontWeight:700,
                  color: it.done ? C.muted : "#f8fafc",
                  textDecoration: it.done ? "line-through" : "none",
                }}>
                  {it.qty}× {it.name}
                </div>
                {it.variant && (
                  <div style={{
                    fontSize:12, color: it.done ? C.muted : C.warning,
                    fontStyle:"italic", marginTop:2,
                    textDecoration: it.done ? "line-through" : "none",
                  }}>
                    ↳ {it.variant}
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        {/* AZIONI */}
        {isAttesa && (
          <div style={{display:"flex", gap:8, marginTop:12}}>
            <button onClick={()=>consegnaScontrino(c)} style={{flex:2, background:"#dc2626", border:"none", color:"#fff", padding:"11px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:14, fontWeight:700}}>
              🔥 Scontrino consegnato
            </button>
            <button onClick={()=>archiviaComanda(c)} style={{flex:1, background:"#3f2d12", border:"1px solid #b45309", color:"#fbbf24", padding:"11px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:700}}>
              📜 Storico
            </button>
          </div>
        )}
        {!isAttesa && !evasa && (
          <div style={{display:"flex", gap:8, marginTop:12}}>
            <button onClick={()=>evadiComanda(c)} style={{flex:2, background:C.success, border:"none", color:"#fff", padding:"10px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:13, fontWeight:700}}>
              ✅ Evadi tutto
            </button>
            <button onClick={()=>archiviaComanda(c)} style={{flex:1, background:"#3f2d12", border:"1px solid #b45309", color:"#fbbf24", padding:"10px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:700}}>
              📜 Storico
            </button>
          </div>
        )}
        {evasa && (
          <div style={{display:"flex", gap:8, marginTop:12}}>
            <button onClick={()=>riportaInAttesa(c)} style={{flex:1, background:"#1e3a5f", border:"1px solid #2563eb", color:"#93c5fd", padding:"9px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:700}}>
              ↩️ Rimetti in attesa
            </button>
            <button onClick={()=>deleteComanda(c)} style={{flex:1, background:"#7f1d1d", border:"none", color:"#fca5a5", padding:"9px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:12}}>
              🗑 Elimina
            </button>
          </div>
        )}
      </div>
    );
  };

  const tabs = [
    {key:"attesa",      label:"⏳ In Attesa",      count:attesa.length,    active:"#b45309",  inactive:C.border},
    {key:"lavorazione", label:"🔥 In Lavorazione", count:lavoraz.length,   active:"#dc2626",  inactive:C.border},
    {key:"storico",     label:"📜 Storico",        count:storico.length,   active:"#15803d",  inactive:C.border},
  ];

  const list = tab === "attesa" ? attesa : tab === "lavorazione" ? lavoraz : storico;
  const emptyMsg = tab === "attesa" ? "Nessuna comanda in attesa" : tab === "lavorazione" ? "Nessuna comanda in lavorazione" : "Lo storico è vuoto";
  const emptyEmoji = tab === "attesa" ? "📋" : tab === "lavorazione" ? "😌" : "📭";

  return (
    <div>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:10}}>
        <h2 style={{fontSize:isMobile?18:24, fontWeight:800, color:"#f8fafc", letterSpacing:"-0.4px"}}>
          🧑‍🍳 Cucina
        </h2>
      </div>

      {/* Tab switcher */}
      <div style={{display:"flex", gap:6, marginBottom:14, overflowX:"auto"}}>
        {tabs.map(t => (
          <button key={t.key} onClick={()=>setTab(t.key)}
            style={{
              background: tab===t.key ? t.active : "transparent",
              border:"1px solid "+(tab===t.key ? t.active : t.inactive),
              color: tab===t.key ? "#fff" : C.muted,
              padding:"8px 14px", borderRadius:8, cursor:"pointer",
              fontFamily:"inherit", fontSize:13, fontWeight:700, whiteSpace:"nowrap", flexShrink:0,
            }}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      {tab === "storico" && storico.length > 0 && (
        <div style={{textAlign:"right", marginBottom:10}}>
          <button onClick={svuotaStorico} style={{background:"#7f1d1d", border:"1px solid #991b1b", color:"#fca5a5", padding:"7px 14px", borderRadius:8, cursor:"pointer", fontFamily:"inherit", fontSize:12, fontWeight:600}}>
            🗑 Svuota storico ({storico.length})
          </button>
        </div>
      )}

      {list.length === 0 && (
        <div style={{background:C.bg, borderRadius:12, padding:30, border:"1px solid "+C.border, textAlign:"center", color:C.muted}}>
          <div style={{fontSize:40, marginBottom:8}}>{emptyEmoji}</div>
          <div style={{fontSize:14}}>{emptyMsg}</div>
        </div>
      )}

      {list.map(c => <ComandaCard key={c._key||c.id} c={c} />)}
    </div>
  );
}

function ArticoliManager({ menu, saveMenu, isMobile }) {
  const [editing, setEditing] = React.useState(null); // id in modifica
  const [draft, setDraft] = React.useState({ name:"", price:"", cat:"🥪 Panini", variants:"" });
  const [adding, setAdding] = React.useState(false);

  const startAdd = () => {
    setAdding(true);
    setEditing(null);
    setDraft({ name:"", price:"", cat:"🥪 Panini", variants:"" });
  };
  const startEdit = (item) => {
    setEditing(item.id);
    setAdding(false);
    setDraft({
      name:item.name,
      price:String(item.price),
      cat:item.cat,
      variants: (item.variants || []).join("\n"),
    });
  };
  const cancel = () => { setEditing(null); setAdding(false); };

  // Esporta il menu corrente (con prezzi aggiornati) in un file Excel
  const exportMenuExcel = () => {
    const rows = [["Categoria", "Tipo", "Articolo", "Prezzo (€)", "Opzioni"]];
    ALL_CATEGORIES.forEach(cat => {
      menu.filter(i => i.cat === cat).forEach(item => {
        rows.push([
          cat,
          FRITTI_CATEGORIES.includes(cat) ? "FRITTI" : CIBO_CATEGORIES.includes(cat) ? "CIBO" : "BAR",
          item.name,
          Number(item.price.toFixed(2)),
          (item.variants && item.variants.length) ? item.variants.join(" | ") : "",
        ]);
      });
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws["!cols"] = [{wch:14},{wch:7},{wch:32},{wch:11},{wch:40}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Menu");
    const d = new Date();
    const dateStr = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    XLSX.writeFile(wb, "menu_torneo_" + dateStr + ".xlsx");
  };

  const saveItem = () => {
    const price = parseFloat(String(draft.price).replace(",","."));
    if (!draft.name.trim() || isNaN(price) || price < 0) {
      alert("Inserisci un nome valido e un prezzo corretto.");
      return;
    }
    // Parsing varianti: split per a capo, trim, scarta vuote
    const variants = draft.variants
      .split("\n")
      .map(v => v.trim())
      .filter(v => v.length > 0);

    const baseItem = { name:draft.name.trim(), price, cat:draft.cat };
    if (variants.length > 0) baseItem.variants = variants;

    if (adding) {
      const newId = Math.max(0, ...menu.map(i=>i.id)) + 1;
      saveMenu([...menu, { id:newId, ...baseItem }]);
    } else {
      saveMenu(menu.map(i => {
        if (i.id !== editing) return i;
        // Se non ci sono varianti, rimuovi il campo
        const updated = {...i, ...baseItem};
        if (variants.length === 0) delete updated.variants;
        return updated;
      }));
    }
    cancel();
  };

  const deleteItem = (item) => {
    if (!window.confirm("Eliminare \"" + item.name + "\" dal menu?")) return;
    saveMenu(menu.filter(i => i.id !== item.id));
  };

  const C = {
    bg:"#1e293b", border:"#334155", input:"#0f172a",
    text:"#e2e8f0", muted:"#94a3b8", price:"#f87171",
  };

  const inputStyle = { background:C.input, border:"1px solid "+C.border, color:C.text, padding:"10px 12px", borderRadius:8, fontSize:14, fontFamily:"inherit", outline:"none", width:"100%", boxSizing:"border-box" };

  const formJSX = (
    <div style={{background:C.input, borderRadius:10, padding:14, marginBottom:12, border:"1px solid "+C.border}}>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Nome prodotto</div>
          <input value={draft.name} onChange={e=>setDraft({...draft,name:e.target.value})} placeholder="Es. Panino Salsiccia" style={inputStyle} autoFocus />
        </div>
        <div style={{display:"flex",gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Prezzo €</div>
            <input value={draft.price} onChange={e=>setDraft({...draft,price:e.target.value})} placeholder="0.00" inputMode="decimal" style={inputStyle} />
          </div>
          <div style={{flex:2}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Categoria</div>
            <select value={draft.cat} onChange={e=>setDraft({...draft,cat:e.target.value})} style={{...inputStyle, cursor:"pointer"}}>
              <optgroup label="🍕 CIBO">
                {CIBO_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
              <optgroup label="🍟 FRITTI">
                {FRITTI_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
              <optgroup label="🍺 BAR">
                {BAR_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
              </optgroup>
            </select>
          </div>
        </div>
        <div>
          <div style={{fontSize:11,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>
            Opzioni / Varianti (una per riga, opzionale)
          </div>
          <textarea
            value={draft.variants}
            onChange={e=>setDraft({...draft,variants:e.target.value})}
            placeholder={"Es:\nCipolla + Peperoni\nSolo Cipolla\nSolo Peperoni\nSolo Salsiccia"}
            rows={4}
            style={{...inputStyle, resize:"vertical", fontFamily:"inherit", minHeight:80}}
          />
          <div style={{fontSize:10,color:C.muted,marginTop:4,fontStyle:"italic"}}>
            Se inserisci varianti, al click sull'articolo si aprirà un menu per scegliere l'opzione
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={saveItem} style={{flex:2,background:"#15803d",border:"none",color:"#fff",padding:"11px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>
            ✅ Salva
          </button>
          <button onClick={cancel} style={{flex:1,background:"#334155",border:"none",color:C.text,padding:"11px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:14}}>
            Annulla
          </button>
        </div>
      </div>
    </div>
  );

  // Raggruppa per categoria
  const byCat = {};
  ALL_CATEGORIES.forEach(c => { byCat[c] = menu.filter(i => i.cat === c); });

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:isMobile?18:24,fontWeight:800,color:"#f8fafc",letterSpacing:"-0.4px"}}>🍔 Gestione Articoli</h2>
        {!adding && !editing && (
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            <button onClick={exportMenuExcel} title="Scarica il menu in Excel" style={{background:"#15803d",border:"none",color:"#fff",padding:"10px 18px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>
              📥 Scarica Menu Excel
            </button>
            <button onClick={startAdd} style={{background:"#dc2626",border:"none",color:"#fff",padding:"10px 18px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>
              ➕ Nuovo Articolo
            </button>
          </div>
        )}
      </div>

      {adding && formJSX}

      {ALL_CATEGORIES.map(catName => (
        byCat[catName].length > 0 || true ? (
          <div key={catName} style={{background:C.bg,borderRadius:12,padding:16,border:"1px solid "+C.border,marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700,color:"#f8fafc",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
              {catName}
              <span style={{fontSize:11,color:C.muted,fontWeight:400}}>
                ({FRITTI_CATEGORIES.includes(catName) ? "FRITTI" : CIBO_CATEGORIES.includes(catName) ? "CIBO" : "BAR"})
              </span>
            </div>
            {byCat[catName].length === 0 && (
              <div style={{color:"#64748b",fontSize:13,padding:"6px 0"}}>Nessun articolo</div>
            )}
            {byCat[catName].map(item => (
              <div key={item.id}>
                {editing === item.id ? formJSX : (
                  <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid "+C.border}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,color:C.text,fontWeight:600}}>{item.name}</div>
                      <div style={{fontSize:13,color:C.price,fontWeight:700,marginTop:2}}>{fmt(item.price)}</div>
                      {item.variants && item.variants.length > 0 && (
                        <div style={{fontSize:11,color:C.muted,marginTop:3,fontStyle:"italic"}}>
                          🎛 {item.variants.length} opzioni: {item.variants.join(", ")}
                        </div>
                      )}
                    </div>
                    <button onClick={()=>startEdit(item)} title="Modifica" style={{background:"#1d4ed8",border:"none",color:"#fff",padding:"7px 12px",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600}}>✏️</button>
                    <button onClick={()=>deleteItem(item)} title="Elimina" style={{background:"#7f1d1d",border:"none",color:"#fca5a5",padding:"7px 12px",borderRadius:7,cursor:"pointer",fontSize:13}}>🗑</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        ) : null
      ))}

      <div style={{textAlign:"center",marginTop:8,marginBottom:20}}>
        <button onClick={()=>{ if(window.confirm("Ripristinare il menu originale del Torneo? Tutte le modifiche andranno perse.")) saveMenu(DEFAULT_MENU); }}
          style={{background:"transparent",border:"1px solid "+C.border,color:C.muted,padding:"8px 16px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
          ↺ Ripristina menu originale
        </button>
      </div>
    </div>
  );
}

function FirebaseConfig({ syncStatus }) {
  const fields = [
    ["apiKey","API Key"],
    ["authDomain","Auth Domain"],
    ["databaseURL","Database URL"],
    ["projectId","Project ID"],
    ["storageBucket","Storage Bucket"],
    ["messagingSenderId","Messaging Sender ID"],
    ["appId","App ID"],
  ];
  const [vals, setVals] = React.useState(() => {
    const obj = {};
    fields.forEach(([k])=>{ obj[k]=localStorage.getItem("fb_"+k)||""; });
    return obj;
  });
  const [saved, setSaved] = React.useState(false);

  const save = () => {
    fields.forEach(([k])=>{ localStorage.setItem("fb_"+k, vals[k]); });
    setSaved(true);
    setTimeout(()=>{ window.location.reload(); }, 800);
  };
  const reset = () => {
    fields.forEach(([k])=>{ localStorage.removeItem("fb_"+k); });
    window.location.reload();
  };

  const isConfigured = !!vals.databaseURL;

  return (
    <div style={{background:"#1e293b",borderRadius:12,padding:20,border:"1px solid #334155",marginTop:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <h3 style={{fontSize:15,fontWeight:700,color:"#f8fafc"}}>☁️ Sincronizzazione Firebase</h3>
        <span style={{fontSize:12,padding:"4px 10px",borderRadius:20,fontWeight:700,
          background:syncStatus==="connected"?"#14532d":syncStatus==="connecting"?"#713f12":"#1e293b",
          color:syncStatus==="connected"?"#4ade80":syncStatus==="connecting"?"#fbbf24":"#64748b",
          border:"1px solid currentColor"}}>
          {syncStatus==="connected"?"🟢 Connesso":syncStatus==="connecting"?"🟡 Connessione...":syncStatus==="error"?"🔴 Errore":"⚫ Non configurato"}
        </span>
      </div>
      {!isConfigured && (
        <div style={{background:"#0f172a",borderRadius:8,padding:12,marginBottom:14,fontSize:12,color:"#94a3b8",lineHeight:1.7}}>
          <strong style={{color:"#f8fafc"}}>Come configurare (gratis):</strong><br/>
          1. Vai su <strong style={{color:"#38bdf8"}}>console.firebase.google.com</strong><br/>
          2. Crea progetto → aggiungi app Web<br/>
          3. Vai su <em>Realtime Database</em> → Crea database (modalità test)<br/>
          4. Copia la configurazione e incollala qui sotto<br/>
          5. Salva → il sito si ricarica e sincronizza su tutti i dispositivi 🎉
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {fields.map(([k,label])=>(
          <div key={k}>
            <div style={{fontSize:11,color:"#64748b",marginBottom:3,textTransform:"uppercase",letterSpacing:0.5}}>{label}</div>
            <input value={vals[k]} onChange={e=>setVals(p=>({...p,[k]:e.target.value}))}
              placeholder={label+"..."}
              style={{width:"100%",background:"#0f172a",border:"1px solid #334155",color:"#e2e8f0",padding:"8px 12px",borderRadius:6,fontSize:12,fontFamily:"inherit",outline:"none"}} />
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={save} style={{flex:2,background:saved?"#14532d":"#1d4ed8",border:"none",color:"#fff",padding:"10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>
          {saved?"✅ Salvato! Ricarico...":"💾 Salva e Connetti"}
        </button>
        {isConfigured && <button onClick={reset} style={{flex:1,background:"#7f1d1d",border:"none",color:"#fca5a5",padding:"10px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontSize:13}}>
          🔌 Disconnetti
        </button>}
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(()=>sessionStorage.getItem("tdp_auth")==="1");
  const [theme, setTheme] = useState(()=>localStorage.getItem("tdp_theme") || "dark");

  useEffect(()=>{
    document.documentElement.className = theme === "light" ? "light" : "";
    localStorage.setItem("tdp_theme", theme);
  }, [theme]);

  const toggleTheme = ()=>setTheme(t=>t==="dark"?"light":"dark");
  const login = ()=>{sessionStorage.setItem("tdp_auth","1");setAuthed(true);};
  return authed ? <POS theme={theme} toggleTheme={toggleTheme}/> : <Login onLogin={login}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
