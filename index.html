                if (existingTeamCount > 0 && !confirm("Vuoi SOSTITUIRE le " + existingTeamCount + " squadre esistenti?")) return;
                onImport(finalTeams, "replace");
              }}>
                {existingTeamCount > 0 ? "Sostituisci tutto" : "Importa"}

            </div>

        )}

        {error && (
          <div style={{padding:14, background:"#fff", border:"1.5px solid var(--terracotta-dark)", borderRadius:3, color:"var(--terracotta-dark)", marginBottom:14}}>
            ⚠ {error}
          </div>
        )}
      </div>
    </div>
  );
}

function LiberatorieView({ teams, liberatorie, setLiberatorie, showToast }) {
  const lib = liberatorie || {};
  const libFileRef = useRef(null);
  const [libPreview, setLibPreview] = useState(null);
  const players = useMemo(() => {
    const list = [];
    (teams || []).forEach(t => (t.players || []).forEach(p => { if ((p.name || "").trim()) list.push(Object.assign({}, p, { team: t.name })); }));
    return list.sort((a, b) => (a.team || "").localeCompare(b.team || "") || (a.name || "").localeCompare(b.name || ""));
  }, [teams]);

  const byTeam = useMemo(() => {
    const map = {}; const order = [];
    players.forEach(p => { const k = p.team || "—"; if (!map[k]) { map[k] = []; order.push(k); } map[k].push(p); });
    return order.map(k => ({ team: k, list: map[k] }));
  }, [players]);

  // valore base dal giocatore + eventuale override salvato in "liberatorie"
  const FIELDS = ["dataNascita", "luogoNascita", "residenza", "prov", "via", "civico", "telefono", "email"];
  const baseVal = (p, f) => f === "dataNascita" ? (p.birthDate || "") : f === "luogoNascita" ? (p.birthPlace || "") : f === "via" ? (p.address || "") : "";
  const getVal = (p, f) => { const r = lib[p.id] || {}; return r[f] !== undefined ? r[f] : baseVal(p, f); };
  const updateField = (pid, f, v) => setLiberatorie(Object.assign({}, lib, { [pid]: Object.assign({}, lib[pid] || {}, { [f]: v }) }));
  const mergedFor = (p) => ({ name: p.name || "", team: p.team || "", dataNascita: getVal(p, "dataNascita"), luogoNascita: getVal(p, "luogoNascita"), residenza: getVal(p, "residenza"), prov: getVal(p, "prov"), via: getVal(p, "via"), civico: getVal(p, "civico"), telefono: getVal(p, "telefono"), email: getVal(p, "email") });

  // ===== Import foglio "Dati giocatori per liberatorie" =====
  const libToISO = (v) => {
    if (v instanceof Date && !isNaN(v.getTime())) return v.getFullYear() + "-" + String(v.getMonth() + 1).padStart(2, "0") + "-" + String(v.getDate()).padStart(2, "0");
    const s = String(v == null ? "" : v).trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if (m) return m[1] + "-" + m[2].padStart(2, "0") + "-" + m[3].padStart(2, "0");
    m = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/); if (m) { let y = m[3]; if (y.length === 2) y = "20" + y; return y + "-" + m[2].padStart(2, "0") + "-" + m[1].padStart(2, "0"); }
    return "";
  };

  const handleLibFile = (e) => {
    const file = e.target.files[0]; e.target.value = ""; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /liberator/i.test(n)) || wb.SheetNames.find(n => /giocator/i.test(n)) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, raw: true, defval: null });
        let hIdx = -1, C = {};
        for (let i = 0; i < rows.length; i++) {
          const r = rows[i] || [];
          const gi = r.findIndex(c => typeof c === "string" && /^\s*giocatore\s*$/i.test(c));
          if (gi >= 0) {
            const find = (re) => { for (let j = 0; j < r.length; j++) { if (typeof r[j] === "string" && re.test(r[j].trim())) return j; } return -1; };
            C = { name: gi, dataNascita: find(/data di nascita/i), luogoNascita: find(/luogo di nascita/i), via: find(/via.*residenz/i), indirizzo: find(/indirizzo/i), civico: find(/civico/i), comune: find(/comune/i), prov: find(/^prov/i), telefono: find(/telefono/i), email: find(/e.?mail/i) };
            hIdx = i; break;
          }
        }
        if (hIdx < 0) { alert('Non ho trovato l\'intestazione "GIOCATORE" nel foglio "' + sn + '".'); return; }
        const parsed = [];
        for (let i = hIdx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const nm = C.name >= 0 && r[C.name] != null ? String(r[C.name]).trim() : "";
          if (!nm) continue;
          if (/^totale/i.test(nm)) continue;
          const iso = C.dataNascita >= 0 ? libToISO(r[C.dataNascita]) : "";
          if (!iso) continue; // salta le righe-squadra (senza data di nascita)
          const get = (j) => j >= 0 && r[j] != null ? String(r[j]).trim() : "";
          parsed.push({
            name: nm, dataNascita: iso, luogoNascita: get(C.luogoNascita),
            residenza: get(C.comune), prov: get(C.prov).toUpperCase(),
            via: get(C.via) || get(C.indirizzo), civico: get(C.civico),
            telefono: get(C.telefono), email: get(C.email),
          });
        }
        if (!parsed.length) { alert("Nessun giocatore trovato nel foglio."); return; }
        const idx = {}; players.forEach(p => { idx[(p.name || "").trim().toLowerCase()] = p; });
        const matched = []; const unmatched = [];
        parsed.forEach(row => { const p = idx[row.name.toLowerCase()]; if (p) matched.push(Object.assign({ playerId: p.id }, row)); else unmatched.push(row.name); });
        setLibPreview({ sheet: sn, matched, unmatched, total: parsed.length });
      } catch (err) { alert("Errore lettura file: " + err.message); }
    };
    reader.onerror = () => alert("Impossibile leggere il file");
    reader.readAsArrayBuffer(file);
  };

  const clearLib = () => {
    if (!confirm("Svuotare tutti i dati delle liberatorie? Tutte le celle (data/luogo nascita, residenza, via, n°, prov., telefono, e-mail) verranno azzerate. I giocatori restano nelle squadre.")) return;
    const blank = {};
    players.forEach(p => { blank[p.id] = { dataNascita: "", luogoNascita: "", residenza: "", prov: "", via: "", civico: "", telefono: "", email: "" }; });
    setLiberatorie(blank);
    showToast("Dati liberatorie svuotati");
  };

  const applyLibImport = () => {
    if (!libPreview) return;
    const next = Object.assign({}, lib);
    libPreview.matched.forEach(m => {
      const cur = next[m.playerId] || {};
      next[m.playerId] = Object.assign({}, cur, {
        dataNascita: m.dataNascita || cur.dataNascita,
        luogoNascita: m.luogoNascita || cur.luogoNascita,
        residenza: m.residenza || cur.residenza,
        prov: m.prov || cur.prov,
        via: m.via || cur.via,
        civico: m.civico || cur.civico,
        telefono: m.telefono || cur.telefono,
        email: m.email || cur.email,
      });
    });
    setLiberatorie(next);
    setLibPreview(null);
    showToast(libPreview.matched.length + " giocatori aggiornati");
  };

  const buildOne = (doc, d) => {
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();
    const margin = 16;
    const contentW = pageW - margin * 2;
    let y = margin;
    const ensure = (h) => { if (y + h > pageH - margin) { doc.addPage(); y = margin; } };
    const para = (text, opt) => {
      opt = opt || {};
      const size = opt.size || 10, style = opt.style || "normal", gap = opt.gap == null ? 2.4 : opt.gap, lh = opt.lh || 4.7, indent = opt.indent || 0;
      doc.setFontSize(size); doc.setFont("helvetica", style); if (opt.color) doc.setTextColor(opt.color[0], opt.color[1], opt.color[2]);
      const lines = doc.splitTextToSize(text, contentW - indent);
      lines.forEach(ln => { ensure(lh); if (opt.align === "center") doc.text(ln, pageW / 2, y, { align: "center" }); else doc.text(ln, margin + indent, y); y += lh; });
      y += gap; doc.setTextColor(0, 0, 0);
    };
    const bullet = (text) => {
      doc.setFontSize(9.3); doc.setFont("helvetica", "normal");
      const lines = doc.splitTextToSize(text, contentW - 6);
      lines.forEach((ln, i) => { ensure(4.3); doc.text((i === 0 ? "•  " : "    ") + ln, margin, y); y += 4.3; });
      y += 1.8;
    };
    const consent = (text) => {
      doc.setFontSize(9.3); doc.setFont("helvetica", "normal");
      const lines = doc.splitTextToSize(text, contentW - 8);
      ensure(4.6); doc.setDrawColor(0); doc.rect(margin, y - 3.1, 3.4, 3.4);
      lines.forEach((ln, i) => { if (i > 0) ensure(4.3); doc.text(ln, margin + 6, y); y += 4.3; });
      y += 1.8;
    };
    const rule = () => { ensure(5); doc.setDrawColor(190); doc.line(margin, y, pageW - margin, y); y += 5; doc.setDrawColor(0); };
    const U = (n) => "_".repeat(n);
    const fill = (v, n) => (v && String(v).trim()) ? String(v).trim() : U(n);
    const nm = fill(d.name, 34);
    const bp = fill(d.luogoNascita, 22);
    const bd = d.dataNascita ? fmtDateIT(d.dataNascita) : U(12);
    const via = fill(d.via, 24);
    const resid = fill(d.residenza, 16);
    const prov = fill(d.prov, 4);
    const civ = fill(d.civico, 5);
    const tel = fill(d.telefono, 15);
    const eml = fill(d.email, 26);

    doc.setFontSize(13.5); doc.setFont("helvetica", "bold");

function CalendarView({ teams, matches, setMatches, canEdit, showToast }) {
  const [filter, setFilter] = useState("ALL"); // ALL | gironi | quarti | semi | finali | "YYYY-MM-DD"
  const [editing, setEditing] = useState(null);
  const calFileRef = useRef(null);
  const [calPreview, setCalPreview] = useState(null);

  const toISODate = (v) => {
    if (v == null || v === "") return "";
    if (v instanceof Date && !isNaN(v.getTime())) return v.getFullYear() + "-" + String(v.getMonth() + 1).padStart(2, "0") + "-" + String(v.getDate()).padStart(2, "0");
    if (typeof v === "number" && isFinite(v)) { const d = new Date(Math.round((v - 25569) * 86400 * 1000)); if (!isNaN(d.getTime())) return d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0") + "-" + String(d.getUTCDate()).padStart(2, "0"); }
    const s = String(v).trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if (m) return m[1] + "-" + m[2].padStart(2, "0") + "-" + m[3].padStart(2, "0");
    m = s.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{2,4})/); if (m) { let y = m[3]; if (y.length === 2) y = "20" + y; return y + "-" + m[2].padStart(2, "0") + "-" + m[1].padStart(2, "0"); }
    return s;
  };
  const toTime = (v) => {
    if (v == null || v === "") return "";
    if (v instanceof Date && !isNaN(v.getTime())) return String(v.getHours()).padStart(2, "0") + ":" + String(v.getMinutes()).padStart(2, "0");
    if (typeof v === "number" && isFinite(v) && v < 1) { const mins = Math.round(v * 24 * 60); return String(Math.floor(mins / 60)).padStart(2, "0") + ":" + String(mins % 60).padStart(2, "0"); }
    return String(v).trim();
  };
  const normPhase = (v) => {
    const x = (v == null ? "" : String(v)).trim().toLowerCase();
    if (/quart/.test(x)) return "quarti";
    if (/semi/.test(x)) return "semi";
    if (/finalina|3.{0,3}4|terzo/.test(x)) return "finalina";
    if (/under/.test(x)) return "finale_under";
    if (/final/.test(x)) return "finale";
    return "gironi";
  };

  const handleCalendarFile = (e) => {
    const file = e.target.files[0]; e.target.value = ""; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /calendar|partite|gironi/i.test(n)) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, raw: true, defval: null });
        const want = { data: /^data|giorno/i, time: /orario|ora/i, phase: /fase/i, girone: /girone/i, home: /casa/i, away: /trasferta|ospite/i, gh: /gol casa|casa gol|^gh$/i, ga: /gol trasferta|trasferta gol|^ga$/i, field: /campo/i };
        let hIdx = -1, cols = {};
        for (let i = 0; i < rows.length; i++) {
          const r = rows[i] || []; const c = {};
          Object.entries(want).forEach(([k, re]) => { for (let j = 0; j < r.length; j++) { if (typeof r[j] === "string" && re.test(r[j].trim()) && c[k] == null) c[k] = j; } });
          if (c.home != null && c.away != null) { hIdx = i; cols = c; break; }
        }
        if (hIdx < 0) { alert('Non ho trovato le colonne "Casa" e "Trasferta" nel foglio "' + sn + '".'); return; }
        const byName = {}; teams.forEach(t => { byName[(t.name || "").trim().toLowerCase()] = t; });
        const parsed = []; const unmatched = new Set();
        for (let i = hIdx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const cell = (k) => cols[k] != null ? r[cols[k]] : null;
          const homeName = cell("home") != null ? String(cell("home")).trim() : "";
          const awayName = cell("away") != null ? String(cell("away")).trim() : "";
          if (!homeName && !awayName) continue;
          if (/^totale/i.test(homeName)) break;
          const ht = byName[homeName.toLowerCase()]; const at = byName[awayName.toLowerCase()];
          if (homeName && !ht) unmatched.add(homeName);
          if (awayName && !at) unmatched.add(awayName);
          const phase = normPhase(cell("phase"));
          let girone = cell("girone") != null ? String(cell("girone")).trim().toUpperCase().replace(/[^A-D]/g, "") : "";
          if (!girone && phase === "gironi") girone = (ht && ht.girone) || (at && at.girone) || "";
          const ghv = cell("gh"), gav = cell("ga");
          const gh = ghv != null && ghv !== "" && !isNaN(Number(ghv)) ? Number(ghv) : null;
          const ga = gav != null && gav !== "" && !isNaN(Number(gav)) ? Number(gav) : null;
          parsed.push({ date: toISODate(cell("data")), time: toTime(cell("time")), phase, girone, home: ht ? ht.id : null, away: at ? at.id : null, homeName, awayName, homeScore: gh, awayScore: ga, played: gh != null && ga != null, field: cell("field") != null ? String(cell("field")).trim() : "" });
        }
        if (!parsed.length) { alert("Nessuna partita trovata nel foglio."); return; }
        setCalPreview({ rows: parsed, sheet: sn, unmatched: [...unmatched] });
      } catch (err) { alert("Errore lettura file: " + err.message); }
    };
    reader.onerror = () => alert("Impossibile leggere il file");
    reader.readAsArrayBuffer(file);
  };

  const applyCalendarImport = () => {
    if (!calPreview) return;
    const newMatches = calPreview.rows.map(r => ({
      id: uid(), date: r.date, time: r.time, phase: r.phase, girone: r.girone,
      home: r.home, away: r.away, slotHome: "", slotAway: "",
      homeScore: r.homeScore, awayScore: r.awayScore, played: r.played,
      field: r.field || null, events: [],
    }));
    setMatches(newMatches);
    setCalPreview(null);
    showToast(newMatches.length + " partite importate");
  };

  const downloadTemplate = () => {
    try {
      const aoa = [
        ["Data", "Orario", "Fase", "Girone", "Casa", "Trasferta", "Gol Casa", "Gol Trasferta", "Campo"],
        ["22/06/2026", "20:00", "Gironi", "A", "Bronx", "Favregas", "", "", "Campo 1"],
        ["22/06/2026", "21:00", "Gironi", "B", "Ammond", "Benedetti dal Palo", "", "", "Campo 1"],
        ["24/06/2026", "20:00", "Gironi", "C", "Al Leon d'Oro", "Azul Club", "", "", "Campo 1"],
        ["10/07/2026", "21:00", "Quarti", "", "1° Girone A", "2° Girone B", "", "", "Campo 1"],
      ];
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 12 }, { wch: 8 }, { wch: 10 }, { wch: 8 }, { wch: 22 }, { wch: 22 }, { wch: 9 }, { wch: 13 }, { wch: 12 }];
      XLSX.utils.book_append_sheet(wb, ws, "Calendario");
      XLSX.writeFile(wb, "TdP-Template-Calendario.xlsx");
      showToast("Template scaricato");
    } catch (e) { alert("Errore: " + e.message); }
  };

  // Usa solo le partite reali salvate (generate dall'Admin)
  // matchesFromTemplate è ora un alias di matches per non rompere il resto del codice
  const matchesFromTemplate = matches;

  const filtered = useMemo(() => {

    if (filter === "gironi" || filter === "quarti" || filter === "semi" || filter === "finali") {
      const phaseSet = filter === "finali" ? ["finalina", "finale_under", "finale"] : [filter];
      return matchesFromTemplate.filter(m => phaseSet.includes(m.phase));

  // Raggruppo per data (più intuitivo del raggruppamento per girone)

      byDate[k].push(m);
    });

    Object.values(byDate).forEach(arr => arr.sort((a, b) => (a.time || "").localeCompare(b.time || "")));
    return byDate;
  }, [filtered]);

  // Salvataggio: aggiorno il match nel template-resolvable list
  const saveMatch = (updated) => {
    // Aggiorno l'elenco matches: se esiste già, sostituisco; altrimenti aggiungo

  // Reset di TUTTI gli override → torna alle date/ore originali del template
  // (rimosso resetAllDates: il calendario ora è generato esplicitamente dall'Admin)


  // Helpers per costruire le righe export
  const buildExportRows = () => {
    // Ordina per data + ora
    const ordered = matchesFromTemplate.slice().sort((a, b) => {
      const ad = (a.date || "9999") + " " + (a.time || "99:99");
      const bd = (b.date || "9999") + " " + (b.time || "99:99");
      return ad.localeCompare(bd);
    });
    return ordered.map(m => {
      // Priorità: teamId concreto (home/away), poi slot (fallback)
      const homeT = m.home
        ? teams.find(t => t.id === m.home)
        : (m.slotHome ? resolveSlot(m.slotHome, teams, matchesFromTemplate) : null);
      const awayT = m.away
        ? teams.find(t => t.id === m.away)
        : (m.slotAway ? resolveSlot(m.slotAway, teams, matchesFromTemplate) : null);
      const homeLabel = homeT ? homeT.name : (m.slotHome ? slotLabel(m.slotHome, teams, matchesFromTemplate) : "?");
      const awayLabel = awayT ? awayT.name : (m.slotAway ? slotLabel(m.slotAway, teams, matchesFromTemplate) : "?");
      const td = TOURNAMENT_DATES.find(d => d.iso === m.date);
      const dateLabel = td ? td.label : (m.date || "—");
      const phaseLabel = m.phase === "gironi" ? ("Girone " + (m.girone || "?"))
        : m.phase === "quarti" ? "Quarti"
        : m.phase === "semi" ? "Semifinale"
        : m.phase === "finalina" ? "Finalina"
        : m.phase === "finale_under" ? "Finale Under"
        : m.phase === "finale" ? "FINALE"
        : "";
      const risultato = m.played && m.homeScore != null && m.awayScore != null
        ? (m.homeScore + " – " + m.awayScore)
        : "";
      return {
        date: m.date || "",
        dateLabel,
        time: m.time || "",
        phase: phaseLabel,
        phaseRaw: m.phase || "",
        girone: m.girone || "",
        home: homeLabel,
        away: awayLabel,
        risultato,
        field: m.field || "",
      };
    });
  };

  const exportCalendarExcel = () => {
    try {
      const rows = buildExportRows().filter(r => r.phaseRaw === "gironi");
      if (rows.length === 0) {
        alert("Nessuna partita dei gironi da esportare.");
        return;
      }
      const aoa = [["Data", "Orario", "Girone", "Casa", "Trasferta", "Risultato"]];
      rows.forEach(r => {
        aoa.push([r.dateLabel, r.time, r.girone, r.home, r.away, r.risultato]);
      });
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      // Imposto larghezza colonne
      ws["!cols"] = [{wch:14}, {wch:8}, {wch:8}, {wch:30}, {wch:30}, {wch:10}];
      XLSX.utils.book_append_sheet(wb, ws, "Gironi");
      XLSX.writeFile(wb, "TdP-Calendario-Gironi-" + new Date().toISOString().slice(0,10) + ".xlsx");
      showToast("Excel esportato");
    } catch (e) {
      alert("Errore export Excel: " + e.message);
    }
  };

  const exportCalendarPDF = () => {
    try {
      if (typeof window.jspdf === 'undefined') {
        alert("Libreria PDF non caricata. Ricarica la pagina e riprova.");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      // Header
      doc.setFontSize(18);
      doc.setFont("helvetica", "bold");
      doc.text("Torneo del Prete 2026 — Calendario Gironi", 14, 18);
      doc.setFontSize(10);
      doc.setFont("helvetica", "normal");
      doc.setTextColor(100);
      doc.text("Generato il " + new Date().toLocaleDateString("it-IT") + " · Futsal Fabbrico ASD", 14, 24);
      doc.setTextColor(0);

      // Solo partite della fase a gironi (quarti/semi/finali non ancora determinati)
      const rows = buildExportRows().filter(r => r.phaseRaw === "gironi");
      if (rows.length === 0) {
        alert("Nessuna partita dei gironi da esportare.");
        return;
      }
      // Raggruppo per data
      const grouped = {};
      rows.forEach(r => {
        if (!grouped[r.date]) grouped[r.date] = [];
        grouped[r.date].push(r);
      });

      let currentY = 32;
      Object.keys(grouped).sort().forEach((date) => {
        const dayRows = grouped[date];
        const td = TOURNAMENT_DATES.find(d => d.iso === date);
        const dateLabel = td ? td.label : date;

        // Verifico se serve una nuova pagina (lascio almeno 30mm di spazio)
        if (currentY > 250) {
          doc.addPage();
          currentY = 18;
        }

        // Header giornata (solo data: nella stessa serata giocano gironi diversi)
        doc.setFontSize(13);
        doc.setFont("helvetica", "bold");
        doc.setFillColor(13, 40, 24); // verde scuro
        doc.setTextColor(232, 185, 72); // oro
        doc.rect(14, currentY - 4, 182, 7, "F");
        doc.text(dateLabel, 16, currentY + 1);
        doc.setTextColor(0);
        currentY += 6;

        // Tabella partite del giorno — il girone è indicato per singola partita
        const tableBody = dayRows.map(r => [
          r.girone,
          r.time,
          r.home,
          r.risultato || "vs",
          r.away
        ]);
        doc.autoTable({
          startY: currentY,
          head: [["Gir.", "Ora", "Casa", "", "Trasferta"]],
          body: tableBody,
          theme: "grid",
          styles: { fontSize: 10, cellPadding: 2.5, lineColor: [180,180,180] },
          headStyles: { fillColor: [240, 234, 199], textColor: [50,50,50], fontStyle: "bold" },
          columnStyles: {
            0: { cellWidth: 14, halign: "center", fontStyle: "bold", fillColor: [13, 40, 24], textColor: [232, 185, 72] },
            1: { cellWidth: 16, halign: "center", fontStyle: "bold" },
            2: { cellWidth: 66, halign: "right" },
            3: { cellWidth: 20, halign: "center", fontStyle: "bold", fillColor: [250, 245, 231] },
            4: { cellWidth: 66, halign: "left" },
          },
          margin: { left: 14, right: 14 },
        });
        currentY = doc.lastAutoTable.finalY + 6;
      });

      doc.save("TdP-Calendario-Gironi-" + new Date().toISOString().slice(0,10) + ".pdf");
      showToast("PDF esportato");
    } catch (e) {
      alert("Errore export PDF: " + e.message);
    }
  };

  const playedCount = matchesFromTemplate.filter(m => m.played).length;
  const totalCount = matchesFromTemplate.length;

  const fasiCount = {
    gironi: matchesFromTemplate.filter(m => m.phase === "gironi").length,
    quarti: matchesFromTemplate.filter(m => m.phase === "quarti").length,
    semi: matchesFromTemplate.filter(m => m.phase === "semi").length,
    finali: matchesFromTemplate.filter(m => ["finalina","finale_under","finale"].includes(m.phase)).length,
  };

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Calendario</h1>
          <div className="subtitle">{playedCount} / {totalCount} partite giocate</div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {canEdit && <input ref={calFileRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" onChange={handleCalendarFile} style={{display:"none"}} />}
          {canEdit && <button className="btn btn-sm btn-gold" onClick={() => calFileRef.current && calFileRef.current.click()} title="Importa un calendario già pronto da Excel">📥 Importa calendario</button>}
          {canEdit && <button className="btn btn-sm" onClick={downloadTemplate} title="Scarica il modello Excel da compilare">📋 Template</button>}
          {totalCount > 0 && <button className="btn btn-sm btn-gold" onClick={exportCalendarPDF} title="Esporta calendario in PDF">📄 PDF</button>}
          {totalCount > 0 && <button className="btn btn-sm btn-gold" onClick={exportCalendarExcel} title="Esporta calendario in Excel">📊 Excel</button>}
        </div>
      </div>

      {totalCount === 0 && (
        <div className="empty">
          <div className="empty-icon">📅</div>
          <h3>Calendario non generato</h3>
          <p>Vai in <strong>Admin → Genera calendario gironi</strong> per creare le partite a partire dalle squadre nei gironi.</p>
        </div>
      )}

      {totalCount > 0 && (
        <div style={{display:"flex", gap:8, marginBottom: 24, flexWrap:"wrap"}}>
          <button className={"btn btn-sm " + (filter==="ALL"?"btn-gold":"")} onClick={()=>setFilter("ALL")}>Tutte ({totalCount})</button>
          {fasiCount.gironi > 0 && <button className={"btn btn-sm " + (filter==="gironi"?"btn-gold":"")} onClick={()=>setFilter("gironi")}>Gironi ({fasiCount.gironi})</button>}
          {fasiCount.quarti > 0 && <button className={"btn btn-sm " + (filter==="quarti"?"btn-gold":"")} onClick={()=>setFilter("quarti")}>Quarti ({fasiCount.quarti})</button>}
          {fasiCount.semi > 0 && <button className={"btn btn-sm " + (filter==="semi"?"btn-gold":"")} onClick={()=>setFilter("semi")}>Semifinali ({fasiCount.semi})</button>}
          {fasiCount.finali > 0 && <button className={"btn btn-sm " + (filter==="finali"?"btn-gold":"")} onClick={()=>setFilter("finali")}>Finali ({fasiCount.finali})</button>}
        </div>
      )}

      {Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([date, ms]) => {
        const td = TOURNAMENT_DATES.find(d => d.iso === date);
        const dateLabel = td ? td.label : (date === "no_date" ? "Data da programmare" : date);
        const phase = ms[0] && ms[0].phase;
        return (
          <div key={date} style={{marginBottom: 32}}>
            <h3 className="display" style={{
              fontSize:24, marginBottom:14, letterSpacing:"0.06em",
              color:"var(--green-deep)",
              display:"flex", alignItems:"baseline", gap:12, flexWrap:"wrap"
            }}>
              <span>📅 {dateLabel}</span>
              <span style={{
                fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:"var(--gold-deep)",
                letterSpacing:"0.1em", padding:"2px 8px",
                background: "rgba(232,185,72,0.18)", border:"1px solid var(--gold-deep)", borderRadius:2
              }}>
                {phase === "gironi" ? "FASE GIRONI" : phase === "quarti" ? "QUARTI" : phase === "semi" ? "SEMIFINALI" : "FINALI"}
              </span>
              <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:"var(--ink-soft)", letterSpacing:"0.08em"}}>
                {ms.length} {ms.length === 1 ? "PARTITA" : "PARTITE"}
              </span>
            </h3>
            {ms.map(m => (
              <MatchRow key={m.id || m.tmplKey} match={m} teams={teams} allMatches={matchesFromTemplate} onClick={canEdit ? () => setEditing(m) : null} />
            ))}
          </div>
        );
      })}

      {editing && <MatchEditor match={editing} teams={teams} allMatches={matchesFromTemplate} onSave={saveMatch} onCancel={()=>setEditing(null)} />}

      {calPreview && (
        <div className="modal-overlay" onClick={() => setCalPreview(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:680}}>
            <div className="modal-head">
              <h2>Importa calendario</h2>
              <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
                Foglio “{calPreview.sheet}” · {calPreview.rows.length} partite
              </div>
            </div>
            {calPreview.unmatched.length > 0 && (
              <p style={{fontSize:12.5, color:"var(--terracotta-dark)", marginTop:4, marginBottom:10}}>
                ⚠ Squadre non riconosciute (non presenti tra quelle inserite): <b>{calPreview.unmatched.join(", ")}</b>. Le partite verranno importate lo stesso, ma queste squadre non conteranno nelle classifiche finché i nomi non coincidono. Controlla che i nomi nel file siano identici a quelli in “Squadre”.
              </p>
            )}
            <div style={{maxHeight:330, overflowY:"auto", border:"1.5px solid var(--ink)", borderRadius:3}}>
              <table className="extra-table">
                <thead><tr><th>Data</th><th>Ora</th><th>Fase</th><th>Casa</th><th>Trasferta</th><th className="c">Ris.</th></tr></thead>
                <tbody>
                  {calPreview.rows.map((r, i) => (
                    <tr key={i}>
                      <td style={{whiteSpace:"nowrap"}}>{r.date ? fmtDateIT(r.date) : "—"}</td>
                      <td>{r.time || "—"}</td>
                      <td style={{textTransform:"capitalize"}}>{r.phase}{r.phase === "gironi" && r.girone ? " " + r.girone : ""}</td>
                      <td style={{color: r.home ? "inherit" : "var(--terracotta-dark)"}}>{r.homeName || "—"}</td>
                      <td style={{color: r.away ? "inherit" : "var(--terracotta-dark)"}}>{r.awayName || "—"}</td>
                      <td className="c">{r.played ? (r.homeScore + "–" + r.awayScore) : ""}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:12.5, color:"var(--terracotta-dark)", marginTop:10}}>
              ⚠ L'import <b>sostituisce</b> tutte le partite attuali con quelle del file.
            </p>
            <div className="modal-actions">
              <button className="btn" onClick={() => setCalPreview(null)}>Annulla</button>
              <button className="btn btn-gold" onClick={applyCalendarImport}>Importa {calPreview.rows.length} partite</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function MatchRow({ match, teams, allMatches, onClick, readOnly }) {
  // Priorità: home/away come teamId concreto (nuovo flusso),
  // poi slotHome/slotAway come sigle da risolvere (vecchio fallback per finali e simili)
  let homeT = null, awayT = null;
  let homeLabel = "?", awayLabel = "?";
  if (match.home) {
    homeT = teams.find(t => t.id === match.home);
    homeLabel = homeT ? homeT.name : (match.slotHome ? slotLabel(match.slotHome, teams, allMatches || []) : "?");
  } else if (match.slotHome) {
    homeT = resolveSlot(match.slotHome, teams, allMatches || []);
    homeLabel = homeT ? homeT.name : slotLabel(match.slotHome, teams, allMatches || []);
  }
  if (match.away) {
    awayT = teams.find(t => t.id === match.away);
    awayLabel = awayT ? awayT.name : (match.slotAway ? slotLabel(match.slotAway, teams, allMatches || []) : "?");
  } else if (match.slotAway) {
    awayT = resolveSlot(match.slotAway, teams, allMatches || []);
    awayLabel = awayT ? awayT.name : slotLabel(match.slotAway, teams, allMatches || []);
  }

  // Formatta data + ora
  let dateLabel = "";
  if (match.date) {
    const td = TOURNAMENT_DATES.find(d => d.iso === match.date);
    dateLabel = td ? td.label : match.date;
    if (match.time) dateLabel += " · " + match.time;
  }

  // Tag fase (gironi/quarti/semi/finale)
  const phaseLabel = match.phase === "gironi" ? ("G. " + (match.girone || "?"))
    : match.phase === "quarti" ? "QUARTI"
    : match.phase === "semi" ? "SEMI"
    : match.phase === "finalina" ? "FINALINA"
    : match.phase === "finale_under" ? "FIN. UNDER"
    : match.phase === "finale" ? "FINALE"
    : (match.girone ? "G. " + match.girone : "");

  return (
    <div className={"match " + (match.played ? "played" : "")} onClick={onClick} style={{cursor: onClick ? "pointer" : "default"}}>
      <div className="match-team home">{homeLabel}</div>
      <div className={"match-score " + (match.played ? "" : "pending")}>
        {match.played ? match.homeScore + " – " + match.awayScore : "VS"}
      </div>
      <div className="match-team away">{awayLabel}</div>
      <div className="match-meta">
        <span className="match-girone">{phaseLabel}</span>
        <span>{dateLabel || (match.played ? "GIOCATA" : "DA PROGRAMMARE")}{match.field ? " · " + match.field : ""}</span>
        {onClick && !readOnly && <span style={{color:"var(--terracotta-dark)", fontWeight:600}}>✎ Modifica</span>}
      </div>
    </div>
  );
}

function MatchEditor({ match, teams, allMatches, onSave, onCancel }) {
  // Priorità: home/away come teamId (nuovo flusso), poi slotHome/slotAway (fallback)
  const homeT = match.home
    ? teams.find(t => t.id === match.home)
    : (match.slotHome ? resolveSlot(match.slotHome, teams, allMatches || []) : null);
  const awayT = match.away
    ? teams.find(t => t.id === match.away)
    : (match.slotAway ? resolveSlot(match.slotAway, teams, allMatches || []) : null);
  const homeLabel = homeT ? homeT.name : (match.slotHome ? slotLabel(match.slotHome, teams, allMatches || []) : "?");
  const awayLabel = awayT ? awayT.name : (match.slotAway ? slotLabel(match.slotAway, teams, allMatches || []) : "?");

  const teamsResolved = !!(homeT && awayT);

  const [homeScore, setHomeScore] = useState(match.homeScore != null ? match.homeScore : "");
  const [awayScore, setAwayScore] = useState(match.awayScore != null ? match.awayScore : "");
  const [date, setDate] = useState(match.date || "");
  const [time, setTime] = useState(match.time || "");
  const [field, setField] = useState(match.field || "");
  const [events, setEvents] = useState(() => (match.events || []).map(e => ({...e})));

  // teamId effettivi (risolti) per gli eventi
  const homeId = homeT ? homeT.id : match.home;
  const awayId = awayT ? awayT.id : match.away;

  const [newEventTeam, setNewEventTeam] = useState(homeId || "");
  const [newEventPlayer, setNewEventPlayer] = useState("");
  const [newEventType, setNewEventType] = useState("goal");
  const [newEventNote, setNewEventNote] = useState("");

  const homePlayers = (homeT && homeT.players) || [];
  const awayPlayers = (awayT && awayT.players) || [];
  const eventTeamPlayers = newEventTeam === homeId ? homePlayers : awayPlayers;

  const homeGoals = events.filter(e => e.type === "goal" && e.teamId === homeId).length;
  const awayGoals = events.filter(e => e.type === "goal" && e.teamId === awayId).length;
  const homeYellows = events.filter(e => e.type === "yellow" && e.teamId === homeId).length;
  const awayYellows = events.filter(e => e.type === "yellow" && e.teamId === awayId).length;
  const homeReds = events.filter(e => e.type === "red" && e.teamId === homeId).length;
  const awayReds = events.filter(e => e.type === "red" && e.teamId === awayId).length;

  const addEvent = () => {
    if (!newEventPlayer) { alert("Seleziona un giocatore"); return; }
    const player = eventTeamPlayers.find(p => p.id === newEventPlayer);
    if (!player) return;
    const newEvent = {
      id: uid(),
      playerId: player.id,
      playerName: player.name,
      teamId: newEventTeam,
      type: newEventType,
      note: newEventNote.trim() || ""
    };
    setEvents([...events, newEvent]);
    setNewEventPlayer("");
    setNewEventNote("");
  };

  const removeEvent = (eventId) => {
    setEvents(events.filter(e => e.id !== eventId));
  };

  // Auto-aggiornamento punteggio da gol (se non già modificato manualmente diversamente)
  const syncScoreFromGoals = () => {
    setHomeScore(homeGoals);
    setAwayScore(awayGoals);
  };

  const handleSave = (asPlayed) => {
    // Se il punteggio è vuoto ma ci sono gol negli eventi, uso il conteggio gol
    let hs = homeScore === "" ? null : parseInt(homeScore, 10);
    let as = awayScore === "" ? null : parseInt(awayScore, 10);
    if (hs == null && events.some(e => e.type === "goal")) hs = homeGoals;
    if (as == null && events.some(e => e.type === "goal")) as = awayGoals;

    if (asPlayed && (hs == null || as == null || isNaN(hs) || isNaN(as))) {
      alert("Inserisci entrambi i punteggi (o registra almeno i gol come eventi)"); return;
    }

    // Avviso se il punteggio non corrisponde ai gol registrati
    if (asPlayed && events.some(e => e.type === "goal")) {
      if (hs !== homeGoals || as !== awayGoals) {
        const msg = `Attenzione: il risultato (${hs}-${as}) non corrisponde ai gol registrati (${homeGoals}-${awayGoals}).\n\nVuoi salvare comunque?`;
        if (!confirm(msg)) return;
      }
    }

    onSave(Object.assign({}, match, {
      homeScore: hs, awayScore: as,
      played: asPlayed && hs != null && as != null,
      date: date || null, time: time || null, field: field || null,
      events: events,
    }));
  };

  const reset = () => {
    if (!confirm("Cancellare il risultato di questa partita (compresi gol e cartellini)?")) return;
    onSave(Object.assign({}, match, { homeScore: null, awayScore: null, played: false, events: [] }));
  };

  const eventTypeMeta = {
    goal:   { label: "⚽ Gol",        color: "var(--green-field)", text: "var(--cream)" },
    yellow: { label: "🟨 Ammonizione", color: "#e8b948",            text: "var(--ink)" },
    red:    { label: "🟥 Espulsione",  color: "var(--terracotta-dark)", text: "var(--cream)" },
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Partita</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>Girone {match.girone}</div>
        </div>

        {/* SQUADRE + PUNTEGGIO */}
        <div style={{display:"grid", gridTemplateColumns:"1fr auto 1fr", alignItems:"center", gap:12, marginBottom:14}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:18}}>{homeT && homeT.name}</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--ink-soft)", marginTop:2, letterSpacing:"0.06em"}}>
              {homeGoals}⚽ · {homeYellows}🟨 · {homeReds}🟥
            </div>
          </div>
          <div style={{display:"flex", gap:6, alignItems:"center"}}>
            <input type="number" min="0" value={homeScore} onChange={e=>setHomeScore(e.target.value)} style={{width:60, textAlign:"center", fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}} />
            <span style={{fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}}>–</span>
            <input type="number" min="0" value={awayScore} onChange={e=>setAwayScore(e.target.value)} style={{width:60, textAlign:"center", fontSize:24, fontFamily:"'Bebas Neue', sans-serif"}} />
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:18}}>{awayT && awayT.name}</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--ink-soft)", marginTop:2, letterSpacing:"0.06em"}}>
              {awayGoals}⚽ · {awayYellows}🟨 · {awayReds}🟥
            </div>
          </div>
        </div>

        {events.some(e => e.type === "goal") && (homeScore !== homeGoals || awayScore !== awayGoals) && (
          <div style={{padding:"8px 12px", background:"rgba(232,185,72,0.18)", border:"1px solid var(--gold-deep)", borderRadius:3, fontSize:12, marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center", gap:8}}>
            <span>⚠ Punteggio ({homeScore || 0}-{awayScore || 0}) diverso dai gol registrati ({homeGoals}-{awayGoals})</span>
            <button className="btn btn-sm btn-gold" onClick={syncScoreFromGoals}>Allinea</button>
          </div>
        )}

        <div className="form-row" style={{gridTemplateColumns:"1.5fr 1fr 1fr", marginBottom:18}}>
          <div>
            <label>Data</label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} />
          </div>
          <div>
            <label>Orario</label>
            <input type="time" value={time} onChange={e=>setTime(e.target.value)} />
          </div>
          <div>
            <label>Campo</label>
            <input value={field} onChange={e=>setField(e.target.value)} placeholder="Es. Campo 1" />
          </div>
        </div>

        {/* SEZIONE EVENTI */}
        <div className="events-section">

            <span>Gol, ammonizioni, espulsioni ({events.length})</span>

            <div>
              <label>Squadra</label>

                <option value={match.away}>{awayT && awayT.name}</option>

              <label>Giocatore</label>

              <label>Tipo</label>

                <option value="yellow">🟨 Ammonizione</option>
                <option value="red">🟥 Espulsione</option>

            </div>
            <div>
              <label>Nota (facolt.)</label>
              <input value={newEventNote} onChange={e=>setNewEventNote(e.target.value)} placeholder="autogol, doppio giallo..." />
            </div>

          </div>

          {/* LISTA EVENTI */}
          {events.length === 0 ? (
            <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"14px 0", fontSize:13}}>
              Nessun evento registrato per questa partita.
            </p>
          ) : (
            <div className="event-list">
              {/* Home team events */}
              <div className="event-team-column">
                <div className="event-team-header">{homeT && homeT.name}</div>
                {events.filter(e => e.teamId === match.home).length === 0 && (
                  <div className="event-empty">—</div>
                )}
                {events.filter(e => e.teamId === match.home).map(e => {
                  const meta = eventTypeMeta[e.type];
                  return (
                    <div key={e.id} className="event-item" style={{background: meta.color, color: meta.text}}>
                      <span className="event-icon">{e.type === "goal" ? "⚽" : e.type === "yellow" ? "🟨" : "🟥"}</span>
                      <span className="event-player">{e.playerName}</span>
                      {e.note && <span className="event-note">{e.note}</span>}
                      <button onClick={() => removeEvent(e.id)} title="Rimuovi">✕</button>
                    </div>
                  );
                })}
              </div>
              {/* Away team events */}
              <div className="event-team-column">
                <div className="event-team-header">{awayT && awayT.name}</div>
                {events.filter(e => e.teamId === match.away).length === 0 && (
                  <div className="event-empty">—</div>
                )}
                {events.filter(e => e.teamId === match.away).map(e => {
                  const meta = eventTypeMeta[e.type];
                  return (
                    <div key={e.id} className="event-item" style={{background: meta.color, color: meta.text}}>
                      <span className="event-icon">{e.type === "goal" ? "⚽" : e.type === "yellow" ? "🟨" : "🟥"}</span>
                      <span className="event-player">{e.playerName}</span>
                      {e.note && <span className="event-note">{e.note}</span>}
                      <button onClick={() => removeEvent(e.id)} title="Rimuovi">✕</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>

        <div className="modal-actions">
          {match.played && <button className="btn btn-danger" onClick={reset}>Reset partita</button>}
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn" onClick={()=>handleSave(false)}>Salva bozza</button>
          <button className="btn btn-primary" onClick={()=>handleSave(true)}>Salva risultato</button>
        </div>
      </div>
    </div>
  );
}

function StatsView({ teams, matches }) {
  const [tab, setTab] = useState("scorers"); // "scorers" | "cards"

  // Mappa squadra per id
  const teamById = useMemo(() => {
    const m = {};
    teams.forEach(t => { m[t.id] = t; });
    return m;
  }, [teams]);

  // Aggrego tutti gli eventi per giocatore
  // Per ogni giocatore: { playerId, playerName, teamId, teamName, girone, goals, yellows, reds }
  const playerStats = useMemo(() => {
    const stats = {};
    matches.forEach(match => {
      (match.events || []).forEach(e => {
        if (!e.playerId) return;
        if (!stats[e.playerId]) {
          const team = teamById[e.teamId];
          stats[e.playerId] = {
            playerId: e.playerId,
            playerName: e.playerName,
            teamId: e.teamId,
            teamName: team ? team.name : "?",
            girone: team ? team.girone : "",
            goals: 0, yellows: 0, reds: 0,
          };
        }
        if (e.type === "goal") stats[e.playerId].goals++;
        else if (e.type === "yellow") stats[e.playerId].yellows++;
        else if (e.type === "red") stats[e.playerId].reds++;
      });
    });
    return Object.values(stats);
  }, [matches, teamById]);

  // Classifica marcatori (solo chi ha almeno 1 gol)
  const scorers = useMemo(() =>
    playerStats
      .filter(p => p.goals > 0)
      .sort((a, b) => b.goals - a.goals || a.playerName.localeCompare(b.playerName))
  , [playerStats]);

  const scorersByGirone = useMemo(() => {
    const map = {};
    GIRONE_NAMES.forEach(g => { map[g] = []; });
    scorers.forEach(p => {
      if (p.girone && map[p.girone]) map[p.girone].push(p);
    });
    return map;
  }, [scorers]);

  // Classifica cartellini (solo chi ha almeno 1 cartellino)
  const cards = useMemo(() =>
    playerStats
      .filter(p => p.yellows + p.reds > 0)
      .sort((a, b) =>
        (b.reds - a.reds) ||
        (b.yellows - a.yellows) ||
        a.playerName.localeCompare(b.playerName)
      )
  , [playerStats]);

  const cardsByGirone = useMemo(() => {
    const map = {};
    GIRONE_NAMES.forEach(g => { map[g] = []; });
    cards.forEach(p => {
      if (p.girone && map[p.girone]) map[p.girone].push(p);
    });
    return map;
  }, [cards]);

  // Totali
  const totalGoals = scorers.reduce((a, p) => a + p.goals, 0);
  const totalYellows = cards.reduce((a, p) => a + p.yellows, 0);
  const totalReds = cards.reduce((a, p) => a + p.reds, 0);

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Statistiche</h1>
          <div className="subtitle">
            {totalGoals} gol · {totalYellows} ammonizioni · {totalReds} espulsioni
          </div>
        </div>
      </div>

      <div className="stats-tabs">
        <button className={"stats-tab " + (tab === "scorers" ? "active" : "")} onClick={() => setTab("scorers")}>
          ⚽ Marcatori
        </button>
        <button className={"stats-tab " + (tab === "cards" ? "active" : "")} onClick={() => setTab("cards")}>
          🟨🟥 Cartellini
        </button>
      </div>

      {tab === "scorers" && (
        <ScorersTab scorers={scorers} scorersByGirone={scorersByGirone} />
      )}

      {tab === "cards" && (
        <CardsTab cards={cards} cardsByGirone={cardsByGirone} />
      )}
    </>
  );
}

// =================================================================
// INVENTARIO — Bere e Mangiare
// =================================================================
const UNIT_OPTIONS = ["pz", "kg", "g", "lt", "ml", "cassa", "conf", "scat"];

const emptyInventoryItem = () => ({
  id: uid(),
  name: "",
  category: "bere", // "bere" | "mangiare"
  unit: "pz",
  supplier: "",
  initial: 0,
  remaining: 0,
});

function InventoryView({ inventory, setInventory, showToast }) {
  const [editing, setEditing] = useState(null);
  const [importOpen, setImportOpen] = useState(false);

  const bere = inventory.filter(i => i.category === "bere");
  const mangiare = inventory.filter(i => i.category === "mangiare");

  const saveItem = (item) => {
    if (inventory.find(i => i.id === item.id)) {
      setInventory(inventory.map(i => i.id === item.id ? item : i));
      showToast("Prodotto aggiornato");
    } else {
      setInventory([...inventory, item]);
      showToast("Prodotto aggiunto");
    }
    setEditing(null);
  };

  const deleteItem = (id) => {
    if (!confirm("Eliminare questo prodotto dall'inventario?")) return;
    setInventory(inventory.filter(i => i.id !== id));
    showToast("Prodotto eliminato");
  };

  const updateQty = (id, newRemaining) => {
    const clamped = Math.max(0, newRemaining);
    setInventory(inventory.map(i => i.id === id ? Object.assign({}, i, { remaining: clamped }) : i));
  };

  const importItems = (parsedItems, mode) => {
    if (mode === "replace") {
      setInventory(parsedItems);
    } else {
      setInventory([...inventory, ...parsedItems]);
    }
    setImportOpen(false);
    showToast("Importati " + parsedItems.length + " prodotti");
  };

  // Sommario
  const totalItems = inventory.length;
  const lowStock = inventory.filter(i => i.initial > 0 && i.remaining / i.initial < 0.25).length;
  const empty = inventory.filter(i => i.remaining === 0).length;

  return (
    <>
      <div className="section-head">
        <div>
          <h1>Inventario</h1>
          <div className="subtitle">{totalItems} prodotti · {bere.length} bere · {mangiare.length} mangiare</div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
          <button className="btn btn-primary" onClick={() => setEditing(emptyInventoryItem())}>+ Nuovo prodotto</button>
        </div>
      </div>

      {/* SOMMARIO */}
      {totalItems > 0 && (
        <div className="inv-summary">
          <div className="stat">
            <div className="stat-label">Prodotti totali</div>
            <div className="stat-value">{totalItems}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Sotto 25%</div>
            <div className={"stat-value " + (lowStock > 0 ? "warn" : "ok")}>{lowStock}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Esauriti</div>
            <div className={"stat-value " + (empty > 0 ? "warn" : "ok")}>{empty}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Bere</div>
            <div className="stat-value">{bere.length}</div>
          </div>
          <div className="stat">
            <div className="stat-label">Mangiare</div>
            <div className="stat-value">{mangiare.length}</div>
          </div>
        </div>
      )}

      {totalItems === 0 && (
        <div className="empty">
          <div className="empty-icon">📦</div>
          <h3>Inventario vuoto</h3>
          <p>Importa il tuo file Excel della spesa o aggiungi i prodotti uno a uno.</p>
          <div style={{display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap"}}>
            <button className="btn btn-gold" onClick={() => setImportOpen(true)}>📊 Importa Excel</button>
            <button className="btn btn-primary" onClick={() => setEditing(emptyInventoryItem())}>+ Nuovo prodotto</button>
          </div>
        </div>
      )}

      {/* SEZIONE BERE */}
      {totalItems > 0 && (
        <div className="inv-section">
          <div className="inv-section-head bere">
            <h2>🍺 Bere</h2>
            <span className="count">{bere.length} {bere.length === 1 ? "prodotto" : "prodotti"}</span>
          </div>
          <div className="inv-section-body">
            {bere.length === 0 ? (
              <div className="inv-empty-section">Nessun prodotto in questa categoria</div>
            ) : (
              bere.map(item => (
                <InventoryRow key={item.id} item={item} onUpdate={updateQty} onEdit={() => setEditing(item)} onDelete={() => deleteItem(item.id)} />
              ))
            )}
          </div>
        </div>
      )}

      {/* SEZIONE MANGIARE */}
      {totalItems > 0 && (
        <div className="inv-section">
          <div className="inv-section-head mangiare">
            <h2>🍔 Mangiare</h2>
            <span className="count">{mangiare.length} {mangiare.length === 1 ? "prodotto" : "prodotti"}</span>
          </div>
          <div className="inv-section-body">
            {mangiare.length === 0 ? (
              <div className="inv-empty-section">Nessun prodotto in questa categoria</div>
            ) : (
              mangiare.map(item => (
                <InventoryRow key={item.id} item={item} onUpdate={updateQty} onEdit={() => setEditing(item)} onDelete={() => deleteItem(item.id)} />
              ))
            )}
          </div>
        </div>
      )}

      {editing && <InventoryEditor item={editing} onSave={saveItem} onCancel={() => setEditing(null)} isNew={!inventory.find(i => i.id === editing.id)} />}
      {importOpen && <InventoryImportModal onImport={importItems} onCancel={() => setImportOpen(false)} existingCount={inventory.length} />}
    </>
  );
}

function InventoryRow({ item, onUpdate, onEdit, onDelete }) {
  const initial = parseFloat(item.initial) || 0;
  const remaining = parseFloat(item.remaining) || 0;
  const pct = initial > 0 ? Math.min(100, Math.max(0, (remaining / initial) * 100)) : 0;
  let level = "high";
  if (initial === 0 || remaining === 0) level = "empty";
  else if (pct < 25) level = "low";
  else if (pct < 50) level = "med";

  return (
    <div className="inv-item">
      <div className="inv-item-info">
        <div className="name">{item.name}</div>
        <div className="meta">
          {item.supplier && <span style={{color:"var(--gold-deep)", fontWeight:600}}>{item.supplier.toUpperCase()} · </span>}
          INIZ. {initial} {item.unit}
          {initial > 0 && " · " + Math.round(pct) + "% RIMASTO"}
        </div>
      </div>
      <div className="inv-progress">
        <div className="inv-bar">
          <div className={"inv-bar-fill " + level} style={{width: pct + "%"}} />
        </div>
        <div className="inv-progress-text">{remaining}/{initial} {item.unit}</div>
      </div>
      <div className="inv-qty">
        <button className="minus" onClick={() => onUpdate(item.id, remaining - 1)} title="-1">−</button>
        <input
          type="number"
          min="0"
          step="any"
          value={remaining}
          onChange={e => {
            const v = e.target.value === "" ? 0 : parseFloat(e.target.value);
            onUpdate(item.id, isNaN(v) ? 0 : v);
          }}
        />
        <button className="plus" onClick={() => onUpdate(item.id, remaining + 1)} title="+1">+</button>
        <span className="unit">{item.unit}</span>
      </div>
      <div className="inv-actions">
        <button className="edit" onClick={onEdit} title="Modifica">✎</button>
        <button className="delete" onClick={onDelete} title="Elimina">🗑</button>
      </div>
    </div>
  );
}

function InventoryEditor({ item, onSave, onCancel, isNew }) {
  const [name, setName] = useState(item.name || "");
  const [category, setCategory] = useState(item.category || "bere");
  const [unit, setUnit] = useState(item.unit || "pz");
  const [customUnit, setCustomUnit] = useState(UNIT_OPTIONS.includes(item.unit) ? "" : (item.unit || ""));
  const [supplier, setSupplier] = useState(item.supplier || "");
  const [initial, setInitial] = useState(item.initial != null ? String(item.initial) : "0");
  const [remaining, setRemaining] = useState(item.remaining != null ? String(item.remaining) : "0");

  const handleSave = () => {
    if (!name.trim()) { alert("Inserisci il nome del prodotto"); return; }
    const finalUnit = unit === "__custom__" ? (customUnit.trim() || "pz") : unit;
    const ini = parseFloat(initial) || 0;
    const rem = parseFloat(remaining) || 0;
    onSave(Object.assign({}, item, {
      name: name.trim(),
      category, unit: finalUnit,
      supplier: supplier.trim(),
      initial: ini, remaining: rem,
    }));
  };

  const initialChanged = (val) => {
    setInitial(val);
    if (isNew) setRemaining(val);
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>{isNew ? "Nuovo prodotto" : "Modifica prodotto"}</h2>
        </div>
        <div className="form-row">
          <div>
            <label>Nome prodotto <span className="req">*</span></label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Es. Birra Moretti 33cl" autoFocus />
          </div>
        </div>
        <div className="form-row" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div>
            <label>Categoria</label>
            <select value={category} onChange={e=>setCategory(e.target.value)}>
              <option value="bere">🍺 Bere</option>
              <option value="mangiare">🍔 Mangiare</option>
            </select>
          </div>
          <div>
            <label>Fornitore</label>
            <input value={supplier} onChange={e=>setSupplier(e.target.value)} placeholder="Es. Ghidoni, Conad..." />
          </div>
        </div>
        <div className="form-row" style={{gridTemplateColumns:"1fr"}}>
          <div>
            <label>Unità</label>
            <select value={UNIT_OPTIONS.includes(unit) ? unit : "__custom__"} onChange={e=>setUnit(e.target.value)}>
              {UNIT_OPTIONS.map(u => <option key={u} value={u}>{u}</option>)}
              <option value="__custom__">altro...</option>
            </select>
          </div>
        </div>
        {unit === "__custom__" && (
          <div className="form-row">
            <div>
              <label>Unità personalizzata</label>
              <input value={customUnit} onChange={e=>setCustomUnit(e.target.value)} placeholder="Es. busta, fusto..." />
            </div>
          </div>
        )}
        <div className="form-row" style={{gridTemplateColumns:"1fr 1fr"}}>
          <div>
            <label>Quantità iniziale</label>
            <input type="number" min="0" step="any" value={initial} onChange={e=>initialChanged(e.target.value)} />
          </div>
          <div>
            <label>Rimanenze</label>
            <input type="number" min="0" step="any" value={remaining} onChange={e=>setRemaining(e.target.value)} />
          </div>
        </div>
        <div className="modal-actions">
          <button className="btn" onClick={onCancel}>Annulla</button>
          <button className="btn btn-primary" onClick={handleSave}>Salva</button>
        </div>
      </div>
    </div>
  );
}

// Parser Excel inventario: cerca foglio "LISTA ORDINI" (formato lista materiale TdP)
// con header: N.ORDINAZIONE | TIPOLOGIA | FORNITORE | IMPORTO UNITARIO | QUANTITÀ | COSTO FINALE
// Se non trova il foglio specifico, fallback su un parser generico
function parseInventoryExcel(workbook) {
  // 1) Cerco il foglio "LISTA ORDINI" (case-insensitive, accetta anche "Lista Ordini", ecc.)
  let sheetName = workbook.SheetNames.find(n => /lista.*ordin/i.test(n));
  if (!sheetName) sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
  if (rows.length === 0) return [];

  // 2) Cerco la riga header
  let headerRowIdx = -1;
  let cols = { name: -1, supplier: -1, qty: -1, unit: -1, category: -1 };
  for (let i = 0; i < Math.min(20, rows.length); i++) {
    const row = rows[i] || [];
    const m = { name: -1, supplier: -1, qty: -1, unit: -1, category: -1 };
    row.forEach((cell, idx) => {
      if (cell == null) return;
      const s = String(cell).toLowerCase().trim();
      // TIPOLOGIA = è il NOME dell'articolo nella lista ordini TdP
      if (m.name === -1 && /^(tipologia|prodotto|nome|articolo|descrizione|item)/.test(s)) m.name = idx;
      else if (m.supplier === -1 && /^(fornitore|supplier|negozio)/.test(s)) m.supplier = idx;
      else if (m.category === -1 && /^(categoria|tipo|reparto|gruppo)$/.test(s)) m.category = idx;
      else if (m.qty === -1 && /(quantit|q\.t|qta|qty|pezzi|^n\.?$|n°)/.test(s)) m.qty = idx;
      else if (m.unit === -1 && /^(unit|u\.m|um|misura)/.test(s)) m.unit = idx;
    });
    if (m.name !== -1) {
      headerRowIdx = i;
      cols = m;
      break;
    }
  }

  // Fallback: nessuna header trovata, prendo le prime colonne
  if (headerRowIdx === -1) {
    headerRowIdx = -1;
    cols = { name: 0, supplier: -1, qty: 1, unit: 2, category: -1 };
  }

  const items = [];
  const startRow = headerRowIdx + 1;
  for (let i = startRow; i < rows.length; i++) {
    const row = rows[i] || [];
    const name = cols.name >= 0 ? row[cols.name] : null;
    if (name == null || name === "") continue;
    const sName = String(name).trim();
    if (!sName) continue;
    // Salto header parziali / totali
    if (/^(totale|total|sub-?total|categoria|reparto|tipologia|n\.ordinazione)$/i.test(sName)) continue;

    // Quantità (può essere vuota — è il caso del file TdP)
    let qty = cols.qty >= 0 ? row[cols.qty] : null;
    qty = parseFloat(qty);
    if (isNaN(qty)) qty = 0;

    // Unità (può essere vuota)
    let unit = cols.unit >= 0 && row[cols.unit] ? String(row[cols.unit]).trim().toLowerCase() : "";
    // Normalizzo unità comuni
    if (unit) {
      if (/^(kg|chilogrammi|chilogrammo)$/.test(unit)) unit = "kg";
      else if (/^(lt|litri|litro|l)$/.test(unit)) unit = "lt";
      else if (/^(ml|millilitri)$/.test(unit)) unit = "ml";
      else if (/^(g|grammi|grammo|gr)$/.test(unit)) unit = "g";
      else if (/^(pz|pezzi|pezzo|pcs|n)$/.test(unit)) unit = "pz";
      else if (/^(cas|cassa|casse)$/.test(unit)) unit = "cassa";
      else if (/^(conf|confezione|confezioni)$/.test(unit)) unit = "conf";
      else if (/^(scat|scatola|scatole)$/.test(unit)) unit = "scat";
    } else {
      unit = "pz"; // default
    }

    // Fornitore
    const supplier = cols.supplier >= 0 && row[cols.supplier] ? String(row[cols.supplier]).trim() : "";

    // Categoria: prima provo la colonna esplicita, poi il fornitore, poi euristica sul nome
    let category = "mangiare";
    if (cols.category >= 0 && row[cols.category]) {
      const c = String(row[cols.category]).toLowerCase();
      if (/(ber|bibit|bevand|drink|alcol|birr|vino|acqua|cola|succh)/.test(c)) category = "bere";
      else if (/(mangi|cib|food|salume|formag|pane|carne|pasta)/.test(c)) category = "mangiare";
    } else {
      // Heuristic dal nome (esteso per coprire i prodotti tipici del file TdP)
      const n = sName.toLowerCase();
      const bereKeywords = [
        "birra","vino","acqua","coca","cola","fanta","sprite","spritz","aperol","caff","caffe","caffè",
        "the","tè","succo","bevand","prosecco","rosso","bianco","moretti","peroni","heineken","nastro",
        "ichnusa","red bull","amaro","gin","vodka","rum","tequila","jager","jäger","montenegro",
        "campari","triple sec","vermut","tonica","lemonsoda","sciroppo","ghiaccio","cocktail",
        "bicchier","cannucc","pepsi","soda","bif"
      ];
      const mangiareKeywords = [
        "salsicc","wurstel","cotolett","nugget","pane","piad","pizza","panin","hamburg","carne",
        "patat","verdur","salsa","ketchup","maion","senape","formag","prosciutto","salume",
        "pasta","riso","sale","zucchero","limone","menta","rosmarino"
      ];
      if (bereKeywords.some(k => n.includes(k))) category = "bere";
      else if (mangiareKeywords.some(k => n.includes(k))) category = "mangiare";
      else category = "mangiare"; // default
    }

    items.push({
      id: uid(),
      name: sName,
      category, unit, supplier,
      initial: qty,
      remaining: qty,
    });
  }
  return items;
}

function InventoryImportModal({ onImport, onCancel, existingCount }) {
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const fileInputRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setLoading(true);
    setError("");
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true });
        const items = parseInventoryExcel(wb);
        if (items.length === 0) {
          setError("Nessun prodotto trovato nel file. Verifica che ci sia almeno una colonna con i nomi e una con le quantità.");
        } else {
          setParsed(items);
        }
      } catch (err) {
        setError("Errore lettura file: " + err.message);
      } finally {
        setLoading(false);
      }
    };
    reader.onerror = () => { setError("Impossibile leggere il file"); setLoading(false); };
    reader.readAsArrayBuffer(file);
  };

  const setCategory = (idx, newCat) => {
    const updated = parsed.slice();
    updated[idx] = Object.assign({}, updated[idx], { category: newCat });
    setParsed(updated);
  };

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal wide" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <h2>Importa inventario da Excel</h2>
          <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
            Carica il file con la lista dei prodotti acquistati.
          </div>
        </div>

        {!parsed && !loading && (
          <>
            <div style={{padding:"24px", background:"var(--cream-soft)", border:"1.5px dashed var(--ink)", borderRadius:4, textAlign:"center", marginBottom: 14}}>
              <div style={{fontSize:48, marginBottom:8}}>📊</div>
              <p style={{marginBottom:14, fontStyle:"italic"}}>Seleziona il file .xlsx con la lista materiale</p>
              <input ref={fileInputRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" onChange={handleFile} style={{display:"none"}} />
              <button className="btn btn-primary" onClick={() => fileInputRef.current && fileInputRef.current.click()}>
                Scegli file Excel
              </button>
            </div>
            <div style={{fontSize:12, color:"var(--ink-soft)", fontStyle:"italic"}}>
              <strong>Cosa cerca:</strong> il foglio "LISTA ORDINI" con colonne <em>TIPOLOGIA, FORNITORE, QUANTITÀ</em>. Funziona anche con altri layout (riconosce automaticamente nome, fornitore, quantità, unità). La categoria <em>bere/mangiare</em> viene dedotta dal nome dell'articolo (puoi correggerla nella preview).
            </div>
          </>
        )}

        {loading && <div style={{textAlign:"center", padding:30}}>Lettura file in corso...</div>}

        {error && (
          <div style={{padding:14, background:"#fff", border:"1.5px solid var(--terracotta-dark)", borderRadius:3, color:"var(--terracotta-dark)", marginBottom:14}}>
            ⚠ {error}
          </div>
        )}

        {parsed && (
          <>
            <div style={{padding:12, background:"rgba(45,143,90,0.1)", border:"1.5px solid var(--green-field)", borderRadius:3, marginBottom:14}}>
              ✓ Trovati <strong>{parsed.length} prodotti</strong>: {parsed.filter(p=>p.category==="bere").length} bere · {parsed.filter(p=>p.category==="mangiare").length} mangiare.
              <div style={{fontSize:12, marginTop:6, fontStyle:"italic"}}>Controlla la categoria di ciascuno e correggi prima di importare (click sui bottoni).</div>
            </div>
            <div className="import-preview">
              {parsed.map((it, idx) => (
                <div key={it.id} className="import-team-block" style={{borderLeftColor: it.category==="bere" ? "#2a4a8c" : "#a04420"}}>
                  <div style={{display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr auto", gap:8, alignItems:"center"}}>
                    <div>
                      <h4 style={{fontFamily:"'Fraunces', serif", fontSize:14, fontWeight:600, letterSpacing:0}}>{it.name}</h4>
                      {it.supplier && <div style={{fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--gold-deep)", marginTop:2, letterSpacing:"0.06em"}}>{it.supplier.toUpperCase()}</div>}
                    </div>
                    <span className="count">{it.initial || "?"} {it.unit}</span>
                    <div style={{display:"flex", gap:4}}>
                      <button
                        className={"btn btn-sm " + (it.category === "bere" ? "btn-primary" : "")}
                        style={{flex:1, fontSize:10}}
                        onClick={() => setCategory(idx, "bere")}
                      >🍺 Bere</button>
                      <button
                        className={"btn btn-sm " + (it.category === "mangiare" ? "btn-primary" : "")}
                        style={{flex:1, fontSize:10}}
                        onClick={() => setCategory(idx, "mangiare")}
                      >🍔 Mangiare</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div className="modal-actions">
              <button className="btn" onClick={onCancel}>Annulla</button>
              {existingCount > 0 && (
                <button className="btn" onClick={() => onImport(parsed, "append")}>
                  Aggiungi a esistenti ({existingCount})
                </button>
              )}
              <button className="btn btn-primary" onClick={() => {
                if (existingCount > 0 && !confirm("Vuoi SOSTITUIRE i " + existingCount + " prodotti esistenti?")) return;
                onImport(parsed, "replace");
              }}>
                {existingCount > 0 ? "Sostituisci tutto" : "Importa"}
              </button>
            </div>
          </>
        )}

        {!parsed && (
          <div className="modal-actions">
            <button className="btn" onClick={onCancel}>Chiudi</button>
          </div>
        )}
      </div>
    </div>
  );
}
