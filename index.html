                        >
                          {h.value > 0 && <span className="bar-value">{h.value.toFixed(0)}€</span>}
                        </div>
                      ))}
                    </div>
                    <div className="hourly-labels">
                      {hourlyData.map(h => (
                        <div key={h.hour} className="hourly-label">{h.hour}:00</div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              {/* TOP PRODOTTI */}
              <div className="cassa-section">
                <div className="cassa-section-head">
                  <span>Top prodotti venduti</span>
                  <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, opacity:0.7}}>{topProducts.length} ARTICOLI</span>
                </div>
                <div className="cassa-section-body">
                  <div className="top-products">
                    {topProducts.map((p, i) => (
                      <div key={p.name} className={"top-product-row " + (i < 3 ? "top-" + (i + 1) : "")}>
                        <div className="rank">{i + 1}</div>
                        <div>
                          <div className="name">{p.name}</div>
                          {p.cat && <div className="cat-tag">{p.cat}</div>}
                        </div>
                        <div>
                          <span className="qty">{p.qty}</span>
                          <span className="qty-unit"> pz</span>
                        </div>
                        <div className="revenue">{p.revenue.toFixed(0)}€</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* STORICO SCONTRINI */}
              <div className="cassa-section">
                <div className="cassa-section-head">
                  <span>Scontrini</span>
                  <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, opacity:0.7}}>{filteredOrders.length} SCONTRINI · DAL PIÙ RECENTE</span>
                </div>
                <div className="cassa-section-body">
                  <div className="receipts-list">
                    {reverseFilteredOrders.map((o) => {
                      const centroKey = getCentroKey(o.centro);
                      const d = parseCassaProDate(o.date);
                      const timeStr = d ? d.toLocaleTimeString("it-IT", {hour:"2-digit", minute:"2-digit"}) : "—";
                      const isExpanded = expandedReceipt === o._key;
                      return (
                        <div
                          key={o._key}
                          className={"receipt-row " + (isExpanded ? "expanded" : "")}
                          onClick={() => setExpandedReceipt(isExpanded ? null : o._key)}
                        >
                          <div className="receipt-row-head">
                            <span className="receipt-num">#{String(o.id || "?").padStart(4, "0")}</span>
                            <span className={"receipt-centro " + centroKey}>{o.centro || "—"}</span>
                            <span className="receipt-time">{timeStr}</span>
                            <span className="receipt-pay">{o.pay || "—"}</span>
                            <span className="receipt-total">{(parseFloat(o.total) || 0).toFixed(0)}€</span>
                          </div>
                          {isExpanded && (
                            <ul className="receipt-items">
                              {(o.items || []).map((it, j) => (
                                <li key={j}>
                                  <span className="item-name">{it.qty}× {it.name}</span>
                                  <span>{((parseFloat(it.price) || 0) * (parseFloat(it.qty) || 0)).toFixed(2)}€</span>
                                </li>
                              ))}
                              {o.disc > 0 && (
                                <li style={{borderTop:"1px dashed var(--ink)", marginTop:6, paddingTop:6}}>
                                  <span className="item-name">Sconto {o.disc}%</span>
                                  <span>-{(parseFloat(o.discAmt) || 0).toFixed(2)}€</span>
                                </li>
                              )}
                              {o.table && (
                                <li style={{fontStyle:"italic"}}>
                                  <span className="item-name">Tavolo: {o.table}</span>
                                  <span></span>
                                </li>
                              )}
                            </ul>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </>
          )}
        </>
      )}
    </>
  );
}

// =================================================================
// SHIFTS / TURNI STAFF
// =================================================================
function ShiftsView({ staff, setStaff, positions, setPositions, shifts, setShifts, insurance, setInsurance, shirts, setShirts, mansioni, setMansioni, showToast }) {
  const [subTab, setSubTab] = useState("turni"); // "turni" | "extra"
  const [addingStaff, setAddingStaff] = useState(false);
  const [newName, setNewName] = useState("");
  const [newPreferred, setNewPreferred] = useState("");
  const [newNote, setNewNote] = useState("");

  const [addingPos, setAddingPos] = useState(false);
  const [newPosName, setNewPosName] = useState("");

  // Picker per aggiungere persona a una cella: { iso, posId } | null
  const [picker, setPicker] = useState(null);
  // Editor persona staff (per modifica/eliminazione): persona | null
  const [editingStaff, setEditingStaff] = useState(null);

  // Import sondaggio presenze
  const surveyInputRef = useRef(null);
  const [importPreview, setImportPreview] = useState(null); // { people:[{name,availability,present}], dateCount, sheet }

  const isAvailable = (s, iso) => !!(s.availability && s.availability[iso]);

  const handleSurveyFile = (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /sondaggio/i.test(n)) || wb.SheetNames[0];
        const ws = wb.Sheets[sn];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });
        // Trovo la riga intestazione con "NOME E COGNOME"
        let hIdx = -1, nameCol = -1;
        for (let i = 0; i < rows.length; i++) {
          const r = rows[i] || [];
          for (let c = 0; c < r.length; c++) {
            if (typeof r[c] === "string" && /nome e cognome/i.test(r[c])) { hIdx = i; nameCol = c; break; }
          }
          if (hIdx >= 0) break;
        }
        if (hIdx < 0) { alert('Non ho trovato la tabella delle presenze (intestazione "NOME E COGNOME") nello sheet "' + sn + '".'); return; }
        const header = rows[hIdx];
        // Colonne-data: da nameCol+1 fino a "TOTALE" o fine
        const dateCols = [];
        for (let c = nameCol + 1; c < header.length; c++) {
          const h = header[c];
          if (h == null || String(h).trim() === "") continue;
          if (/totale/i.test(String(h))) break;
          const iso = parseDataIntestazioneIT(h, 2026);
          if (iso) dateCols.push({ col: c, iso });
        }
        if (dateCols.length === 0) { alert("Nessuna colonna-data riconosciuta nell'intestazione del sondaggio."); return; }
        // Persone
        const people = [];
        for (let i = hIdx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const raw = r[nameCol];
          if (raw == null) continue;
          const name = String(raw).trim();
          if (!name) continue;
          if (/^totale/i.test(name)) break;
          const availability = {};
          dateCols.forEach(dc => {
            const cell = r[dc.col];
            if (cell != null && String(cell).trim().toUpperCase() === "SI") availability[dc.iso] = true;
          });
          people.push({ name, availability, present: Object.keys(availability).length });
        }
        if (people.length === 0) { alert("Nessuna persona trovata nella tabella del sondaggio."); return; }
        // Seconda tabella "MAPPATURA PRESENZE E RUOLI": ricavo l'area per persona.
        // Header con celle "Ruolo"; la persona sta nella colonna immediatamente a sinistra di ogni "Ruolo".
        let h2 = -1;
        for (let i = hIdx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          if (r.some(c => typeof c === "string" && /^ruolo$/i.test(c.trim()))) { h2 = i; break; }
        }
        const areaByName = {};
        if (h2 >= 0) {
          const hr2 = rows[h2] || [];
          const ruoloCols = [];
          for (let c = 0; c < hr2.length; c++) {
            if (typeof hr2[c] === "string" && /^ruolo$/i.test(hr2[c].trim())) ruoloCols.push(c);
          }
          for (let i = h2 + 1; i < rows.length; i++) {
            const r = rows[i] || [];
            ruoloCols.forEach(rc => {
              const nm = r[rc - 1], ru = r[rc];
              if (nm != null && String(nm).trim() && ru != null && String(ru).trim()) {
                const k = String(nm).trim().toLowerCase();
                if (!areaByName[k]) areaByName[k] = String(ru).trim();
              }
            });
          }
        }
        people.forEach(p => { p.area = areaByName[p.name.toLowerCase()] || ""; });
        setImportPreview({ people, dateCount: dateCols.length, sheet: sn, withArea: Object.keys(areaByName).length });
      } catch (err) {
        alert("Errore lettura file: " + err.message);
      }
    };
    reader.onerror = () => alert("Impossibile leggere il file");
    reader.readAsArrayBuffer(file);
  };

  const applyImport = () => {
    if (!importPreview) return;
    // Reset pulito: lo staff e i turni vengono ricostruiti interamente dal sondaggio.
    // Mappo l'area (ruolo) dell'Excel su una posizione esistente (per nome); se non esiste la creo.
    const colors = ["#c8553d", "#1a5d3a", "#b8870f", "#2d8f5a", "#7a5cab", "#4a6fa5", "#a04668", "#5d8a4e"];
    const posByName = {};
    let newPositions = positions.slice();
    newPositions.forEach(p => { posByName[p.name.trim().toLowerCase()] = p.id; });
    const resolveArea = (areaName) => {
      if (!areaName) return "";
      const k = areaName.trim().toLowerCase();
      if (posByName[k]) return posByName[k];
      const used = newPositions.map(p => p.color);
      const color = colors.find(c => !used.includes(c)) || "#555";
      const np = { id: "pos_" + uid(), name: areaName.trim(), color };
      newPositions.push(np); posByName[k] = np.id;
      return np.id;
    };
    const newStaff = importPreview.people.map(p => ({
      id: uid(), name: p.name, note: "",
      availability: p.availability || {},
      preferredPosition: resolveArea(p.area),
    }));
    // Auto-popolo la matrice: ogni persona nella sua area, in tutte le serate disponibili.
    const validPosIds = new Set(newPositions.map(p => p.id));
    const newShifts = {};
    let assigned = 0;
    STAFF_DATES.forEach(d => {
      newStaff.forEach(s => {
        if (!s.preferredPosition || !validPosIds.has(s.preferredPosition)) return;
        if (!(s.availability && s.availability[d.iso])) return;
        const key = shiftKey(d.iso, s.preferredPosition);
        if (!newShifts[key]) newShifts[key] = [];
        newShifts[key].push(s.id); assigned++;
      });
    });
    if (newPositions.length !== positions.length) setPositions(newPositions);
    setStaff(newStaff);
    setShifts(newShifts);
    setImportPreview(null);
    const withoutArea = newStaff.filter(s => !s.preferredPosition).length;
    showToast(newStaff.length + " persone · " + assigned + " assegnazioni" + (withoutArea ? " · " + withoutArea + " senza area" : ""));
  };

  const setStaffArea = (id, posId) => {
    const person = staff.find(s => s.id === id);
    setStaff(staff.map(s => s.id === id ? Object.assign({}, s, { preferredPosition: posId }) : s));
    // Sincronizzazione immediata con l'ultima tabella: rimuovo la persona da tutte le celle,
    // poi (se ha un'area) la piazzo in quell'area in tutte le serate in cui è disponibile.
    const newShifts = {};
    Object.entries(shifts).forEach(([k, v]) => {
      const arr = !v ? [] : (typeof v === "string" ? [v] : (Array.isArray(v) ? v : []));
      const filtered = arr.filter(sid => sid !== id);
      if (filtered.length) newShifts[k] = filtered;
    });
    if (posId && person) {
      STAFF_DATES.forEach(d => {
        if (!(person.availability && person.availability[d.iso])) return;
        const key = shiftKey(d.iso, posId);
        newShifts[key] = [...(newShifts[key] || []), id];
      });
    }
    setShifts(newShifts);
  };

  // Export matrice turni (serate × aree con i nomi)
  const exportShiftsExcel = () => {
    try {
      const aoa = [["Serata", ...positions.map(p => p.name)]];
      STAFF_DATES.forEach(d => {
        const row = [d.label];
        positions.forEach(p => {
          const names = getAssigned(d.iso, p.id).map(sid => staffById[sid] ? staffById[sid].name : null).filter(Boolean);
          row.push(names.join(", "));
        });
        aoa.push(row);
      });
      const tot = ["Totale per area"];
      positions.forEach(p => { tot.push(STAFF_DATES.reduce((a, d) => a + getAssigned(d.iso, p.id).length, 0)); });
      aoa.push(tot);
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 16 }, ...positions.map(() => ({ wch: 24 }))];
      XLSX.utils.book_append_sheet(wb, ws, "Turni");
      XLSX.writeFile(wb, "TdP-Turni-" + new Date().toISOString().slice(0, 10) + ".xlsx");
      showToast("Excel turni esportato");
    } catch (e) { alert("Errore export Excel: " + e.message); }
  };

  const exportShiftsPDF = () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      doc.setFontSize(18); doc.setFont("helvetica", "bold");
      doc.text("Torneo del Prete 2026 — Turni Staff", 14, 16);
      doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100);
      doc.text("Generato il " + new Date().toLocaleDateString("it-IT") + " · Futsal Fabbrico ASD", 14, 22);
      doc.setTextColor(0);
      const head = [["Serata", ...positions.map(p => p.name)]];
      const body = STAFF_DATES.map(d => {
        const row = [d.label];
        positions.forEach(p => {
          const names = getAssigned(d.iso, p.id).map(sid => staffById[sid] ? staffById[sid].name : null).filter(Boolean);
          row.push(names.join("\n"));
        });
        return row;
      });
      doc.autoTable({
        startY: 28, head, body, theme: "grid",
        styles: { fontSize: 9, cellPadding: 2, valign: "top", lineColor: [180, 180, 180] },
        headStyles: { fillColor: [13, 40, 24], textColor: [232, 185, 72], fontStyle: "bold", halign: "center" },
        columnStyles: { 0: { cellWidth: 26, fontStyle: "bold", fillColor: [240, 234, 199] } },
        margin: { left: 14, right: 14 },
      });
      doc.save("TdP-Turni-" + new Date().toISOString().slice(0, 10) + ".pdf");
      showToast("PDF turni esportato");
    } catch (e) { alert("Errore export PDF: " + e.message); }
  };

  const populateFromMapping = () => {
    const validPosIds = new Set(positions.map(p => p.id));
    const withArea = staff.filter(s => s.preferredPosition);
    const noArea = staff.length - withArea.length;
    // Persone con area non più esistente (orfana)
    const orphanArea = withArea.filter(s => !validPosIds.has(s.preferredPosition));
    const assignable = withArea.filter(s => validPosIds.has(s.preferredPosition));
    if (assignable.length === 0) { alert("Nessuna persona ha un'area valida assegnata.\nImposta l'Area nell'ultima colonna della tabella di mappatura."); return; }
    if (!confirm("Popolo i turni dalla mappatura?\n\nOgni persona con un'area verrà assegnata a quell'area in TUTTE le serate in cui risulta disponibile (✓ nel sondaggio).\n\nLe assegnazioni già presenti restano: vengono solo aggiunte quelle mancanti.")) return;
    const newShifts = Object.assign({}, shifts);
    let count = 0;
    const skippedNoAvail = [];
    assignable.forEach(s => {
      const availDates = STAFF_DATES.filter(d => isAvailable(s, d.iso));
      if (availDates.length === 0) { skippedNoAvail.push(s.name); return; }
      availDates.forEach(d => {
        const key = shiftKey(d.iso, s.preferredPosition);
        const v = newShifts[key];
        const arr = !v ? [] : (typeof v === "string" ? [v] : (Array.isArray(v) ? v : []));
        if (!arr.includes(s.id)) { newShifts[key] = [...arr, s.id]; count++; }
      });
    });
    setShifts(newShifts);
    // Riepilogo trasparente
    const parts = [count + " assegnazioni create"];
    if (skippedNoAvail.length) parts.push(skippedNoAvail.length + " salt." + (skippedNoAvail.length === 1 ? "a (0 disponibilità)" : "e (0 disponibilità)"));
    if (noArea > 0) parts.push(noArea + " senza area");
    if (orphanArea.length) parts.push(orphanArea.length + " con area eliminata");
    showToast(parts.join(" · "));
    if (skippedNoAvail.length || orphanArea.length) {
      let msg = "Popolamento completato: " + count + " assegnazioni.\n";
      if (skippedNoAvail.length) msg += "\nNON piazzate (nessuna serata disponibile nel sondaggio):\n- " + skippedNoAvail.join("\n- ");
      if (orphanArea.length) msg += "\n\nArea non più esistente (riassegnala):\n- " + orphanArea.map(s => s.name).join("\n- ");
      alert(msg);
    }
  };

  // Helpers: ogni cella è un ARRAY di staff IDs
  const shiftKey = (iso, posId) => iso + "::" + posId;
  const getAssigned = (iso, posId) => {
    const v = shifts[shiftKey(iso, posId)];
    if (!v) return [];
    // Backward-compat: se per caso fosse string (vecchio formato), la converto in array
    if (typeof v === "string") return [v];
    return Array.isArray(v) ? v : [];
  };

  const addAssignment = (iso, posId, staffId) => {
    if (!staffId) return;
    const key = shiftKey(iso, posId);
    const current = getAssigned(iso, posId);
    if (current.includes(staffId)) return; // già presente
    setShifts(Object.assign({}, shifts, { [key]: [...current, staffId] }));
  };

  const removeAssignment = (iso, posId, staffId) => {
    const key = shiftKey(iso, posId);
    const current = getAssigned(iso, posId);
    const filtered = current.filter(id => id !== staffId);
    const newShifts = Object.assign({}, shifts);
    if (filtered.length === 0) delete newShifts[key];
    else newShifts[key] = filtered;
    setShifts(newShifts);
  };

  const addStaff = () => {
    if (!newName.trim()) { alert("Inserisci almeno il nome"); return; }
    setStaff([...staff, {
      id: uid(),
      name: newName.trim(),
      preferredPosition: newPreferred || "",
      note: newNote.trim()
    }]);
    setNewName(""); setNewPreferred(""); setNewNote("");
    setAddingStaff(false);
    showToast("Persona aggiunta allo staff");
  };

  const updateStaff = (updated) => {
    setStaff(staff.map(s => s.id === updated.id ? updated : s));
    setEditingStaff(null);
    showToast("Persona aggiornata");
  };

  const removeStaff = (id) => {
    if (!confirm("Rimuovere DEFINITIVAMENTE questa persona dallo staff?\nLe sue assegnazioni verranno cancellate.")) return;
    const newShifts = {};
    Object.entries(shifts).forEach(([k, v]) => {
      const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
      const filtered = arr.filter(sid => sid !== id);
      if (filtered.length > 0) newShifts[k] = filtered;
    });
    setShifts(newShifts);
    setStaff(staff.filter(s => s.id !== id));
    setEditingStaff(null);
    showToast("Persona rimossa");
  };

  const addPosition = () => {
    if (!newPosName.trim()) { alert("Inserisci il nome della posizione"); return; }
    const colors = ["#c8553d", "#1a5d3a", "#b8870f", "#2d8f5a", "#7a5cab", "#4a6fa5", "#a04668", "#5d8a4e"];
    const used = positions.map(p => p.color);
    const color = colors.find(c => !used.includes(c)) || "#555";
    setPositions([...positions, { id: "pos_" + uid(), name: newPosName.trim(), color }]);
    setNewPosName("");
    setAddingPos(false);
    showToast("Posizione aggiunta");
  };

  const removePosition = (posId) => {
    if (positions.length <= 1) { alert("Devi avere almeno una posizione."); return; }
    if (!confirm("Rimuovere questa posizione? Tutte le assegnazioni per questa posizione verranno cancellate.")) return;
    const newShifts = {};
    Object.entries(shifts).forEach(([k, v]) => { if (!k.endsWith("::" + posId)) newShifts[k] = v; });
    setShifts(newShifts);
    setPositions(positions.filter(p => p.id !== posId));
    // Ripulisco l'area delle persone che puntavano a questa posizione (evita aree "orfane")
    if (staff.some(s => s.preferredPosition === posId)) {
      setStaff(staff.map(s => s.preferredPosition === posId ? Object.assign({}, s, { preferredPosition: "" }) : s));
    }
    showToast("Posizione rimossa");
  };

  const clearAllShifts = () => {
    if (!confirm("Cancellare TUTTE le assegnazioni dei turni? L'azione è irreversibile.")) return;
    setShifts({});
    showToast("Turni svuotati");
  };

  // Stats: assegnazioni per persona (conto tutte le occorrenze, anche se in array)
  const staffStats = useMemo(() => {
    const counts = {};
    staff.forEach(s => { counts[s.id] = 0; });
    Object.values(shifts).forEach(v => {
      const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
      arr.forEach(sid => { if (counts[sid] != null) counts[sid]++; });
    });
    return counts;
  }, [shifts, staff]);

  const totalAssignments = Object.values(shifts).reduce((acc, v) => {
    const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
    return acc + arr.length;
  }, 0);

  const filledCells = Object.values(shifts).filter(v => {
    const arr = typeof v === "string" ? [v] : (Array.isArray(v) ? v : []);
    return arr.length > 0;
  }).length;
  const totalCells = STAFF_DATES.length * positions.length;

  // Lookup map per nome staff
  const staffById = useMemo(() => {
    const m = {};
    staff.forEach(s => { m[s.id] = s; });
    return m;
  }, [staff]);

  // Per la modale picker: ID delle persone già in quella cella
  const pickerCurrent = picker ? getAssigned(picker.iso, picker.posId) : [];
  const pickerAvailable = picker ? staff.filter(s => !pickerCurrent.includes(s.id)) : [];
  // Ordino i disponibili mettendo prima chi ha quella posizione come preferita
  const pickerSorted = picker ? pickerAvailable.slice().sort((a, b) => {
    const aAv = isAvailable(a, picker.iso) ? 0 : 1;
    const bAv = isAvailable(b, picker.iso) ? 0 : 1;
    if (aAv !== bAv) return aAv - bAv;
    const aPref = a.preferredPosition === picker.posId ? 0 : 1;
    const bPref = b.preferredPosition === picker.posId ? 0 : 1;
    if (aPref !== bPref) return aPref - bPref;
    return a.name.localeCompare(b.name);
  }) : [];

  return (
    <>
      <div className="shift-subtabs">
        <button className={"shift-subtab " + (subTab === "turni" ? "active" : "")} onClick={() => setSubTab("turni")}>Turni staff</button>
        <button className={"shift-subtab " + (subTab === "mansioni" ? "active" : "")} onClick={() => setSubTab("mansioni")}>Mansioni</button>
        <button className={"shift-subtab " + (subTab === "extra" ? "active" : "")} onClick={() => setSubTab("extra")}>Assicurazioni &amp; Maglie</button>
      </div>

      {subTab === "turni" && (
      <>
      <div className="section-head">
        <div>
          <h1>Turni Staff</h1>
          <div className="subtitle">
            {totalAssignments} assegnazioni · {filledCells}/{totalCells} celle coperte
          </div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {staff.length > 0 && <button className="btn btn-sm btn-gold" onClick={exportShiftsPDF} title="Esporta la tabella turni in PDF">📄 PDF</button>}
          {staff.length > 0 && <button className="btn btn-sm btn-gold" onClick={exportShiftsExcel} title="Esporta la tabella turni in Excel">📊 Excel</button>}
          {totalAssignments > 0 && <button className="btn btn-sm btn-danger" onClick={clearAllShifts}>Svuota tutto</button>}
        </div>
      </div>

      {/* PANNELLO STAFF */}
      <div className="shifts-panel">
        <div className="shifts-panel-head">
          <h3>Staff ({staff.length})</h3>
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            <input ref={surveyInputRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" onChange={handleSurveyFile} style={{display:"none"}} />
            <button className="btn btn-sm btn-gold" onClick={() => surveyInputRef.current && surveyInputRef.current.click()} title="Importa presenze dallo sheet Sondaggio (.xlsx)">📥 Importa sondaggio</button>
            <button className="btn btn-sm btn-primary" onClick={() => setAddingStaff(!addingStaff)}>
              {addingStaff ? "Annulla" : "+ Aggiungi persona"}
            </button>
          </div>
        </div>

        {addingStaff && (
          <div style={{display:"grid", gridTemplateColumns:"2fr 1.5fr 2fr auto", gap:8, marginBottom:14, alignItems:"end"}}>
            <div>
              <label>Nome <span className="req">*</span></label>
              <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Mario Rossi" autoFocus />
            </div>
            <div>
              <label>Posizione desiderata</label>
              <select value={newPreferred} onChange={e=>setNewPreferred(e.target.value)}>
                <option value="">— Nessuna preferenza —</option>
                {positions.map(p => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            </div>
            <div>
              <label>Note</label>
              <input value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Disponibile solo dopo le 21" />
            </div>
            <button className="btn btn-gold" onClick={addStaff}>Salva</button>
          </div>
        )}

        {staff.length === 0 ? (
          <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"12px"}}>
            Nessuna persona nello staff. Aggiungile per poterle assegnare ai turni.
          </p>
        ) : (
          <div className="staff-list">
            {staff.map(s => {
              const pref = s.preferredPosition ? positions.find(p => p.id === s.preferredPosition) : null;
              return (
                <span key={s.id} className="staff-chip" title={s.note || ""}>
                  <span className="name">{s.name}</span>
                  {pref && (
                    <span className="position-chip" style={{background: pref.color, padding:"2px 8px", fontSize:11, letterSpacing:"0.06em"}}>
                      {pref.name}
                    </span>
                  )}
                  <span className="phone" style={{color:"var(--gold-deep)", fontWeight:600}}>
                    {staffStats[s.id] || 0} turni
                  </span>
                  <button onClick={() => setEditingStaff(s)} title="Modifica / elimina" className="chip-edit-btn">✎</button>
                </span>
              );
            })}
          </div>
        )}
      </div>

      {/* PANNELLO POSIZIONI */}
      <div className="shifts-panel">
        <div className="shifts-panel-head">
          <h3>Posizioni ({positions.length})</h3>
          <button className="btn btn-sm btn-primary" onClick={() => setAddingPos(!addingPos)}>
            {addingPos ? "Annulla" : "+ Aggiungi posizione"}
          </button>
        </div>

        {addingPos && (
          <div style={{display:"grid", gridTemplateColumns:"1fr auto", gap:8, marginBottom:14, alignItems:"end"}}>
            <div>
              <label>Nome posizione <span className="req">*</span></label>
              <input value={newPosName} onChange={e=>setNewPosName(e.target.value)} placeholder="Es. Pizza, Griglia, Arbitro..." autoFocus />
            </div>
            <button className="btn btn-gold" onClick={addPosition}>Salva</button>
          </div>
        )}

        <div className="positions-list">
          {positions.map(p => (
            <span key={p.id} className="position-chip" style={{background: p.color}}>
              {p.name}
              <button onClick={() => removePosition(p.id)} title="Rimuovi">✕</button>
            </span>
          ))}
        </div>
      </div>

      {/* PANNELLO MAPPATURA PRESENZE E AREE (da sondaggio) */}
      {staff.length > 0 && (
        <div className="shifts-panel">
          <div className="shifts-panel-head">
            <h3>Mappatura presenze e aree</h3>
            <button className="btn btn-sm btn-gold" onClick={populateFromMapping} title="Assegna ogni persona alla sua area in tutte le serate disponibili">⚡ Popola turni dalla mappatura</button>
          </div>
          <p style={{fontSize:13, color:"var(--ink-soft)", marginBottom:12, fontStyle:"italic"}}>
            ✓ = serata in cui la persona è disponibile (dal sondaggio). Scegli l'<b>Area</b> in cui collocarla nell'ultima colonna; le aree si gestiscono nel pannello “Posizioni” qui sopra. Poi premi “Popola turni” per riempire la matrice in basso (resta modificabile a mano).
          </p>
          <div className="mapping-wrap">
            <table className="mapping-table">
              <thead>
                <tr>
                  <th className="m-name">Persona</th>
                  <th className="m-tot">Tot</th>
                  {STAFF_DATES.map(d => (
                    <th key={d.iso} className="m-date" title={d.label}>{d.label.replace(/^[A-Za-zàèìòù]+\s/, "")}</th>
                  ))}
                  <th className="m-area">Area</th>
                </tr>
              </thead>
              <tbody>
                {staff.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(s => {
                  const cnt = STAFF_DATES.filter(d => isAvailable(s, d.iso)).length;
                  return (
                    <tr key={s.id}>
                      <td className="m-name">{s.name}</td>
                      <td className="m-tot"><span className={"m-badge " + (cnt === 0 ? "zero" : "")}>{cnt}</span></td>
                      {STAFF_DATES.map(d => (
                        <td key={d.iso} className={"m-cell " + (isAvailable(s, d.iso) ? "yes" : "no")} title={d.label}>{isAvailable(s, d.iso) ? "✓" : ""}</td>
                      ))}
                      <td className="m-area">
                        <select value={s.preferredPosition || ""} onChange={e => setStaffArea(s.id, e.target.value)}>
                          <option value="">—</option>
                          {positions.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        </select>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* MATRICE TURNI */}
      {staff.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">👥</div>
          <h3>Aggiungi persone allo staff</h3>
          <p>Prima di poter compilare i turni devi aggiungere almeno una persona qui sopra.</p>
        </div>
      ) : (
        <div className="shifts-matrix-wrap">
          <table className="shifts-matrix">
            <thead>
              <tr>
                <th className="date-col">Serata</th>
                {positions.map(p => (
                  <th key={p.id} style={{background: p.color, color: "var(--cream)"}}>{p.name}</th>
                ))}
                <th className="total-col-header">Tot</th>
              </tr>
            </thead>
            <tbody>
              {STAFF_DATES.map(d => {
                // Totale per riga (questa serata)
                const rowTotal = positions.reduce((acc, p) => acc + getAssigned(d.iso, p.id).length, 0);
                return (
                  <tr key={d.iso}>
                    <td className="date-cell">
                      <div className="date-label">{d.label}</div>
                      <span className={"date-phase " + (d.phase === "Finali" ? "finali" : "")}>{d.phase}</span>
                    </td>
                    {positions.map(p => {
                      const assigned = getAssigned(d.iso, p.id);
                      return (
                        <td key={p.id} className={"shift-cell " + (assigned.length > 0 ? "assigned" : "empty")}>
                          <div className="assigned-stack">
                            {assigned.map(sid => {
                              const person = staffById[sid];
                              if (!person) return null;
                              return (
                                <span key={sid} className="assigned-pill">
                                  {person.name}
                                  <button onClick={() => removeAssignment(d.iso, p.id, sid)} title="Rimuovi">✕</button>
                                </span>
                              );
                            })}
                            <button
                              className="assign-add-btn"
                              onClick={() => setPicker({ iso: d.iso, posId: p.id })}
                              title="Aggiungi persona"
                            >
                              +
                            </button>
                          </div>
                        </td>
                      );
                    })}
                    <td className={"total-cell " + (rowTotal === 0 ? "zero" : "")}>{rowTotal}</td>
                  </tr>
                );
              })}
              {/* RIGA TOTALI PER COLONNA */}
              <tr className="totals-row">
                <td className="date-cell totals-label">Totale per area</td>
                {positions.map(p => {
                  const colTotal = STAFF_DATES.reduce((acc, d) => acc + getAssigned(d.iso, p.id).length, 0);
                  return (
                    <td key={p.id} className={"total-cell " + (colTotal === 0 ? "zero" : "")}>{colTotal}</td>
                  );
                })}
                <td className="total-cell grand-total">{totalAssignments}</td>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {/* RIEPILOGO TURNI PER PERSONA */}
      {staff.length > 0 && totalAssignments > 0 && (
        <div className="shifts-panel" style={{marginTop:24}}>
          <div className="shifts-panel-head">
            <h3>Riepilogo turni per persona</h3>
          </div>
          <div className="staff-summary">
            {staff
              .map(s => ({ ...s, count: staffStats[s.id] || 0 }))
              .sort((a,b) => b.count - a.count)
              .map(s => (
                <div key={s.id} className="staff-summary-item">
                  <div className="name">{s.name}</div>
                  <div className="count">{s.count}<span className="count-label" style={{marginLeft:6, fontSize:11}}>{s.count === 1 ? "turno" : "turni"}</span></div>
                </div>
              ))}
          </div>
        </div>
      )}

      {/* MODALE PICKER: aggiungi persona a cella */}
      {picker && (
        <div className="modal-overlay" onClick={() => setPicker(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 480}}>
            <div className="modal-head">
              <h2>Aggiungi a {positions.find(p => p.id === picker.posId) ? positions.find(p => p.id === picker.posId).name : ""}</h2>
              <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
                {STAFF_DATES.find(d => d.iso === picker.iso) ? STAFF_DATES.find(d => d.iso === picker.iso).label : ""}
                {pickerCurrent.length > 0 && " · " + pickerCurrent.length + " già assegnati"}
              </div>
            </div>
            {pickerSorted.length === 0 ? (
              <p style={{fontStyle:"italic", color:"var(--ink-soft)", textAlign:"center", padding:"20px"}}>
                Tutte le persone dello staff sono già assegnate a questa cella.
              </p>
            ) : (
              <div style={{display:"flex", flexDirection:"column", gap:6, maxHeight:400, overflowY:"auto"}}>
                {pickerSorted.map(s => {
                  const isPref = s.preferredPosition === picker.posId;
                  return (
                    <button
                      key={s.id}
                      className="btn"
                      style={{
                        textAlign:"left",
                        justifyContent:"space-between",
                        display:"flex",
                        alignItems:"center",
                        padding:"10px 14px",
                        background: isPref ? "rgba(232,185,72,0.15)" : "var(--paper)",
                        borderColor: isPref ? "var(--gold-deep)" : "var(--ink)",
                      }}
                      onClick={() => { addAssignment(picker.iso, picker.posId, s.id); setPicker(null); }}
                    >
                      <span style={{fontFamily:"'Fraunces', serif", fontWeight:600, fontSize:15, textTransform:"none", letterSpacing:0}}>
                        {s.name}
                        {isPref && <span style={{marginLeft:8, fontFamily:"'JetBrains Mono', monospace", fontSize:10, color:"var(--gold-deep)", letterSpacing:"0.1em"}}>★ DESIDERATA</span>}
                      </span>
                      <span style={{fontFamily:"'JetBrains Mono', monospace", fontSize:11, color:"var(--ink-soft)"}}>
                        {!isAvailable(s, picker.iso) && <span style={{marginRight:8, color:"var(--terracotta-dark)", letterSpacing:"0.08em"}}>NON DISP.</span>}
                        {staffStats[s.id] || 0} turni
                      </span>
                    </button>
                  );
                })}
              </div>
            )}
            <div className="modal-actions">
              <button className="btn" onClick={() => setPicker(null)}>Chiudi</button>
            </div>
          </div>
        </div>
      )}

      {/* MODALE CONFERMA IMPORT SONDAGGIO */}
      {importPreview && (
        <div className="modal-overlay" onClick={() => setImportPreview(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 560}}>
            <div className="modal-head">
              <h2>Importa presenze dal sondaggio</h2>
              <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
                Foglio “{importPreview.sheet}” · {importPreview.people.length} persone · {importPreview.dateCount} serate · {importPreview.withArea || 0} aree dall'Excel
              </div>
            </div>
            <div style={{maxHeight:340, overflowY:"auto", border:"1.5px solid var(--ink)", borderRadius:3}}>
              <table className="mapping-table" style={{minWidth:0}}>
                <thead>
                  <tr>
                    <th className="m-name">Persona</th>
                    <th className="m-tot">Serate</th>
                    <th>Area (Excel)</th>
                  </tr>
                </thead>
                <tbody>
                  {importPreview.people.map((p, i) => (
                    <tr key={i}>
                      <td className="m-name">{p.name}</td>
                      <td className="m-tot"><span className={"m-badge " + (p.present === 0 ? "zero" : "")}>{p.present}</span></td>
                      <td style={{padding:"4px 10px", fontSize:13, color: p.area ? "var(--green-deep)" : "var(--ink-soft)", fontStyle: p.area ? "normal" : "italic"}}>{p.area || "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:12.5, color:"var(--terracotta-dark)", marginTop:10}}>
              ⚠ L'import <b>ricostruisce da zero</b> staff e turni dal sondaggio: chi ha un'area assegnata nell'Excel viene piazzato automaticamente in tutte le serate disponibili. Potrai poi modificare le assegnazioni nell'ultima tabella.
            </p>
            <div className="modal-actions">
              <button className="btn" onClick={() => setImportPreview(null)}>Annulla</button>
              <button className="btn btn-gold" onClick={applyImport}>Importa {importPreview.people.length} persone</button>
            </div>
          </div>
        </div>
      )}

      {/* MODALE MODIFICA PERSONA STAFF */}
      {editingStaff && (
        <StaffEditModal
          person={editingStaff}
          positions={positions}
          turniCount={staffStats[editingStaff.id] || 0}
          onSave={updateStaff}
          onDelete={() => removeStaff(editingStaff.id)}
          onCancel={() => setEditingStaff(null)}
        />
      )}
      </>
      )}

      {subTab === "mansioni" && (
        <MansioniView staff={staff} positions={positions} shifts={shifts} mansioni={mansioni} setMansioni={setMansioni} showToast={showToast} />
      )}

      {subTab === "extra" && (
        <AssicurazioniMaglieView
          insurance={insurance} setInsurance={setInsurance}
          shirts={shirts} setShirts={setShirts}
          showToast={showToast}
        />
      )}
    </>
  );
}

const DEFAULT_MANSIONI = {
  "campo": [["Gestione arbitri/panchine",1],["Segnapunti e accoglienza squadre",1],["Raccattapalle + Palazzetto",2],["Video partita",1],["Jolly",1]],
  "cucina": [["Griglia",1],["Friggitrice",1],["Gestione ordini",1],["Assemblaggio panini",2],["Cameriere",2],["Jolly",1]],
  "bar": [["Gestione bar e aree comuni",1],["Barista",2],["Jolly",1]],
  "cassa": [["Cassiere",2]],
  "social": [["Interviste",1],["Storie Instagram/FB",1],["Fotografo/a",1],["Telecronaca",1],["Musica/Video",1],["Jolly",1]],
};

function MansioniView({ staff, positions, shifts, mansioni, setMansioni, showToast }) {
  const staffById = useMemo(() => { const m = {}; staff.forEach(s => m[s.id] = s); return m; }, [staff]);

  // Date del torneo presenti nell'ultima tabella turni (con almeno un'assegnazione)
  const activeDates = useMemo(() => {
    const isos = new Set();
    Object.entries(shifts || {}).forEach(([k, v]) => {
      const arr = !v ? [] : (typeof v === "string" ? [v] : (Array.isArray(v) ? v : []));
      if (arr.length) isos.add(k.split("::")[0]);
    });
    return STAFF_DATES.filter(d => isos.has(d.iso));
  }, [shifts]);

  const [selDate, setSelDate] = useState("");
  useEffect(() => {
    if (activeDates.length && !activeDates.some(d => d.iso === selDate)) setSelDate(activeDates[0].iso);
    if (!activeDates.length && selDate) setSelDate("");
  }, [activeDates]);

  // Pool persone per area NELLA DATA SELEZIONATA = chi è in quell'area quella serata nei turni
  const poolByArea = useMemo(() => {
    const out = {};
    positions.forEach(p => {
      const v = shifts[selDate + "::" + p.id];
      const arr = !v ? [] : (typeof v === "string" ? [v] : (Array.isArray(v) ? v : []));
      out[p.id] = arr.map(id => staffById[id]).filter(Boolean).sort((a, b) => a.name.localeCompare(b.name));
    });
    return out;
  }, [shifts, positions, staffById, selDate]);

  // Precarico la struttura mansioni di default (per nome area) se non ce ne sono ancora
  useEffect(() => {
    if (!positions.length) return;
    if (mansioni && Object.keys(mansioni).length > 0) return;
    const seed = {};
    positions.forEach(p => {
      const def = DEFAULT_MANSIONI[p.name.trim().toLowerCase()] || [];
      seed[p.id] = def.map(([name, qty]) => ({ id: uid(), name, qty, peopleByDate: {} }));
    });
    if (Object.keys(seed).length) setMansioni(seed);
  }, [positions]);

  const rowsOf = (pid) => (mansioni && Array.isArray(mansioni[pid])) ? mansioni[pid] : [];
  const setRows = (pid, newRows) => setMansioni(Object.assign({}, mansioni, { [pid]: newRows }));
  const addRow = (pid) => setRows(pid, [...rowsOf(pid), { id: uid(), name: "", qty: 1, peopleByDate: {} }]);
  const removeRow = (pid, rid) => setRows(pid, rowsOf(pid).filter(r => r.id !== rid));
  const updateRow = (pid, rid, patch) => setRows(pid, rowsOf(pid).map(r => r.id === rid ? Object.assign({}, r, patch) : r));
  const peopleOnDate = (r, iso) => (r.peopleByDate && r.peopleByDate[iso]) ? r.peopleByDate[iso] : [];
  const addPersonToRow = (pid, rid, sid) => {
    if (!sid || !selDate) return;
    const r = rowsOf(pid).find(x => x.id === rid); if (!r) return;
    const cur = peopleOnDate(r, selDate);
    if (cur.includes(sid)) return;
    updateRow(pid, rid, { peopleByDate: Object.assign({}, r.peopleByDate, { [selDate]: [...cur, sid] }) });
  };
  const removePersonFromRow = (pid, rid, sid) => {
    const r = rowsOf(pid).find(x => x.id === rid); if (!r) return;
    updateRow(pid, rid, { peopleByDate: Object.assign({}, r.peopleByDate, { [selDate]: peopleOnDate(r, selDate).filter(x => x !== sid) }) });
  };
  const resetDefaults = () => {
    if (!confirm("Ripristino le mansioni predefinite per tutte le aree? Le assegnazioni di persone alle mansioni (per tutte le date) andranno perse.")) return;
    const seed = {};
    positions.forEach(p => {
      const def = DEFAULT_MANSIONI[p.name.trim().toLowerCase()] || [];
      seed[p.id] = def.map(([name, qty]) => ({ id: uid(), name, qty, peopleByDate: {} }));
    });
    setMansioni(seed);
    showToast("Mansioni predefinite ripristinate");
  };

  // Export PDF: una sezione per ogni giornata (stesso stile dell'export turni). dates = elenco giornate da includere.
  const exportMansioniPDF = (dates) => {
    try {
      const list = (dates && dates.length) ? dates : activeDates;
      const single = list.length === 1;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      doc.setFontSize(18); doc.setFont("helvetica", "bold");
      doc.text("Torneo del Prete 2026 — Mansioni" + (single ? " · " + list[0].label : " per giornata"), 14, 16);
      doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100);
      doc.text("Generato il " + new Date().toLocaleDateString("it-IT") + " · Futsal Fabbrico ASD", 14, 22);
      doc.setTextColor(0);
      let y = 30, any = false;
      list.forEach(d => {
        const body = [];
        positions.forEach(p => {
          rowsOf(p.id).forEach(r => {
            const names = peopleOnDate(r, d.iso).map(sid => staffById[sid] ? staffById[sid].name : null).filter(Boolean);
            if (!(r.name || "").trim() && names.length === 0) return;
            body.push([p.name, r.name || "—", String(r.qty || 0), names.join(", ") || "—"]);
          });
        });
        if (body.length === 0) return;
        any = true;
        if (y > 178) { doc.addPage(); y = 18; }
        doc.setFillColor(13, 40, 24); doc.setTextColor(232, 185, 72);
        doc.rect(14, y - 4, 269, 7, "F");
        doc.setFontSize(12); doc.setFont("helvetica", "bold");
        doc.text(d.label + "  ·  " + d.phase, 16, y + 1);
        doc.setTextColor(0);
        y += 6;
        doc.autoTable({
          startY: y, head: [["Area", "Mansione", "Q.tà", "Persone"]], body, theme: "grid",
          styles: { fontSize: 9, cellPadding: 2, valign: "top", lineColor: [180, 180, 180] },
          headStyles: { fillColor: [240, 234, 199], textColor: [50, 50, 50], fontStyle: "bold" },
          columnStyles: { 0: { cellWidth: 34, fontStyle: "bold", fillColor: [247, 243, 230] }, 1: { cellWidth: 64 }, 2: { cellWidth: 16, halign: "center" } },
          margin: { left: 14, right: 14 },
        });
        y = doc.lastAutoTable.finalY + 8;
      });
      if (!any) { alert(single ? "Nessuna mansione assegnata per questa giornata." : "Nessuna mansione assegnata da esportare."); return; }
      const suffix = single ? list[0].iso : new Date().toISOString().slice(0, 10);
      doc.save("TdP-Mansioni-" + suffix + ".pdf");
      showToast(single ? "PDF giornata esportato" : "PDF mansioni esportato");
    } catch (e) { alert("Errore export PDF: " + e.message); }
  };

  const hasAnyPeople = positions.some(p => (poolByArea[p.id] || []).length > 0);


  return (
    <>
      <div className="section-head">
        <div>
          <h1>Mansioni specifiche</h1>
          <div className="subtitle">Assegna le mansioni per ogni giornata · le persone si pescano dai turni di quella serata</div>
        </div>
        <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
          {activeDates.length > 0 && selDate && <button className="btn btn-sm btn-gold" onClick={() => exportMansioniPDF(activeDates.filter(d => d.iso === selDate))} title="Esporta solo la giornata selezionata in PDF">📄 PDF giornata</button>}
          {activeDates.length > 0 && <button className="btn btn-sm btn-gold" onClick={() => exportMansioniPDF(activeDates)} title="Esporta tutte le giornate in PDF">📄 PDF tutte</button>}
          <button className="btn btn-sm" onClick={resetDefaults} title="Ripristina l'elenco mansioni predefinito">↺ Predefinite</button>
        </div>
      </div>

      {activeDates.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">📅</div>
          <h3>Nessuna giornata nei turni</h3>
          <p>Compila prima i turni (importa il sondaggio o assegna le aree nella mappatura). Le giornate del torneo compariranno qui come filtro, e per ognuna potrai assegnare le mansioni.</p>
        </div>
      ) : (
      <>
        {/* FILTRO DATE */}
        <div className="date-filter">
          {activeDates.map(d => (
            <button key={d.iso} className={"date-chip " + (selDate === d.iso ? "active" : "")} onClick={() => setSelDate(d.iso)}>
              {d.label.replace(/^[A-Za-zàèìòù]+\s/, "")}
            </button>
          ))}
        </div>

        {!hasAnyPeople && (
          <p style={{fontSize:13, color:"var(--terracotta-dark)", marginBottom:16, fontStyle:"italic"}}>
            In questa serata non c'è nessuno assegnato nei turni: i menù “aggiungi persona” saranno vuoti. Assegna le persone alle aree nella tabella turni per questa data.
          </p>
        )}

        {positions.map(p => {
          const available = poolByArea[p.id] || [];
          const rows = rowsOf(p.id);
          return (
            <div className="shifts-panel" key={p.id}>
              <div className="shifts-panel-head" style={{borderLeft: "6px solid " + p.color, paddingLeft: 12}}>
                <h3>{p.name} <span style={{color:"var(--ink-soft)", fontFamily:"'JetBrains Mono', monospace", fontSize:12, fontWeight:400}}>· {available.length} in turno questa sera</span></h3>
                <button className="btn btn-sm btn-primary" onClick={() => addRow(p.id)}>+ Mansione</button>
              </div>
              {rows.length === 0 ? (
                <p style={{fontStyle:"italic", color:"var(--ink-soft)", padding:"10px 2px", fontSize:13}}>Nessuna mansione. Aggiungine una con “+ Mansione”.</p>
              ) : (
                <div className="extra-table-wrap">
                  <table className="extra-table mansioni-table">
                    <thead>
                      <tr>
                        <th style={{minWidth:170}}>Mansione</th>
                        <th className="c" style={{width:90}}>Q.tà rich.</th>
                        <th>Persone assegnate (questa giornata)</th>
                        <th className="c" style={{width:40}}></th>
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map(r => {
                        const dayPeople = peopleOnDate(r, selDate);
                        const assigned = dayPeople.map(sid => staffById[sid]).filter(Boolean);
                        const full = assigned.length >= (Number(r.qty) || 0);
                        const options = available.filter(s => !dayPeople.includes(s.id));
                        return (
                          <tr key={r.id}>
                            <td><input type="text" value={r.name} onChange={e => updateRow(p.id, r.id, { name: e.target.value })} placeholder="Nome mansione" /></td>
                            <td className="c">
                              <input className="qty" type="number" min="0" value={r.qty} onChange={e => updateRow(p.id, r.id, { qty: Math.max(0, parseInt(e.target.value) || 0) })} />
                            </td>
                            <td>
                              <div className="mansione-people">
                                {assigned.map(person => (
                                  <span className="person-chip" key={person.id}>
                                    {person.name}
                                    <button onClick={() => removePersonFromRow(p.id, r.id, person.id)} title="Togli">✕</button>
                                  </span>
                                ))}
                                <select value="" onChange={e => { addPersonToRow(p.id, r.id, e.target.value); e.target.value = ""; }} className={"add-person-select " + (full ? "full" : "")}>
                                  <option value="">{assigned.length}/{r.qty || 0} · + aggiungi…</option>
                                  {options.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                              </div>
                            </td>
                            <td className="c"><button className="row-del" onClick={() => removeRow(p.id, r.id)} title="Rimuovi mansione">✕</button></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          );
        })}
      </>
      )}
    </>
  );
}

function AssicurazioniMaglieView({ insurance, setInsurance, shirts, setShirts, showToast }) {
  const [tab, setTab] = useState("assicurazioni"); // "assicurazioni" | "maglie"
  const insInputRef = useRef(null);
  const shirtInputRef = useRef(null);
  const [insPreview, setInsPreview] = useState(null);
  const [shirtPreview, setShirtPreview] = useState(null);
  const [perPerson, setPerPerson] = useState(10);

  // Trova la riga intestazione cercando le etichette indicate (richiede almeno "name")
  const findHeaderRow = (rows, labelRegexes) => {
    for (let i = 0; i < rows.length; i++) {
      const r = rows[i] || [];
      const cols = {};
      Object.entries(labelRegexes).forEach(([key, rx]) => {
        for (let c = 0; c < r.length; c++) {
          if (typeof r[c] === "string" && rx.test(r[c])) { cols[key] = c; break; }
        }
      });
      if (cols.name != null) return { idx: i, cols };
    }
    return null;
  };

  // ====== ASSICURAZIONI ======
  const handleInsFile = (e) => {
    const file = e.target.files[0]; e.target.value = ""; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /assicuraz/i.test(n)) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, raw: true, defval: null });
        const hr = findHeaderRow(rows, {
          insured: /gi[àa]\s*assicurat/i, name: /nome e cognome/i, birthDate: /data di nascita/i,
          birthPlace: /luogo di nascita/i, address: /indirizzo/i, residence: /residenza/i, fiscalCode: /codice fiscale/i,
        });
        if (!hr) { alert('Non ho trovato la colonna "Nome e cognome" nello sheet "' + sn + '".'); return; }
        const get = (r, k) => (hr.cols[k] != null && r[hr.cols[k]] != null ? String(r[hr.cols[k]]).trim() : "");
        const people = [];
        for (let i = hr.idx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const name = get(r, "name");
          if (!name) continue;
          if (/^totale/i.test(name)) break;
          const insuredCell = hr.cols.insured != null ? r[hr.cols.insured] : null;
          people.push({
            name, birthDate: fmtDateIT(hr.cols.birthDate != null ? r[hr.cols.birthDate] : ""), birthPlace: get(r, "birthPlace"),
            address: get(r, "address"), residence: get(r, "residence"), fiscalCode: get(r, "fiscalCode").toUpperCase(),
            insured: insuredCell != null && String(insuredCell).trim() !== "",
          });
        }
        if (!people.length) { alert("Nessun nominativo trovato nel foglio."); return; }
        setInsPreview({ people, sheet: sn });
      } catch (err) { alert("Errore lettura file: " + err.message); }
    };
    reader.onerror = () => alert("Impossibile leggere il file");
    reader.readAsArrayBuffer(file);
  };

  const applyInsImport = () => {
    if (!insPreview) return;
    const byName = {}; insurance.forEach(p => { byName[p.name.trim().toLowerCase()] = p; });
    const list = insurance.slice(); let added = 0, updated = 0;
    insPreview.people.forEach(p => {
      const ex = byName[p.name.toLowerCase()];
      if (ex) {
        const idx = list.findIndex(x => x.id === ex.id);
        list[idx] = Object.assign({}, ex, p, { id: ex.id, insured: ex.insured || p.insured });
        updated++;
      } else { const np = Object.assign({ id: uid() }, p); list.push(np); byName[p.name.toLowerCase()] = np; added++; }
    });
    setInsurance(list); setInsPreview(null);
    showToast(added + " aggiunti · " + updated + " aggiornati");
  };

  const toggleInsured = (id) => setInsurance(insurance.map(p => p.id === id ? Object.assign({}, p, { insured: !p.insured }) : p));
  const removeIns = (id) => { if (!confirm("Rimuovere questo nominativo dalla lista assicurazioni?")) return; setInsurance(insurance.filter(p => p.id !== id)); };
  const addInsRow = () => setInsurance([...insurance, { id: uid(), name: "", birthDate: "", birthPlace: "", address: "", residence: "", fiscalCode: "", insured: false }]);
  const updateIns = (id, patch) => setInsurance(insurance.map(p => p.id === id ? Object.assign({}, p, patch) : p));

  const insTotals = useMemo(() => {
    const total = insurance.length;
    const already = insurance.filter(p => p.insured).length;
    const toInsure = total - already;
    return { total, already, toInsure, cost: toInsure * (Number(perPerson) || 0) };
  }, [insurance, perPerson]);

  const exportInsExcel = () => {
    try {
      const aoa = [["Già assicurato", "Nome e cognome", "Data di nascita", "Luogo di nascita", "Indirizzo", "Residenza", "Codice Fiscale"]];
      insurance.forEach(p => aoa.push([p.insured ? "SI" : "", p.name, p.birthDate || "", p.birthPlace || "", p.address || "", p.residence || "", p.fiscalCode || ""]));
      aoa.push([]);
      aoa.push(["Totale nominativi", insTotals.total]);
      aoa.push(["Già assicurati", insTotals.already]);
      aoa.push(["Da assicurare", insTotals.toInsure]);
      aoa.push(["Costo (" + perPerson + " EUR/persona)", insTotals.cost]);
      const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 14 }, { wch: 24 }, { wch: 14 }, { wch: 18 }, { wch: 28 }, { wch: 14 }, { wch: 20 }];
      XLSX.utils.book_append_sheet(wb, ws, "Assicurazioni");
      XLSX.writeFile(wb, "TdP-Assicurazioni-" + new Date().toISOString().slice(0, 10) + ".xlsx");
      showToast("Excel assicurazioni esportato");
    } catch (e) { alert("Errore export: " + e.message); }
  };

  const exportInsPDF = () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
      doc.setFontSize(18); doc.setFont("helvetica", "bold");
      doc.text("Torneo del Prete 2026 — Assicurazioni", 14, 16);
      doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100);
      doc.text("Generato il " + new Date().toLocaleDateString("it-IT") + " · Futsal Fabbrico ASD", 14, 22);
      doc.setTextColor(0);
      const head = [["Assic.", "Nome e cognome", "Data di nascita", "Luogo di nascita", "Indirizzo", "Residenza", "Codice Fiscale"]];
      const body = insurance.map(p => [p.insured ? "SI" : "", p.name || "", p.birthDate || "", p.birthPlace || "", p.address || "", p.residence || "", p.fiscalCode || ""]);
      doc.autoTable({
        startY: 28, head, body, theme: "grid",
        styles: { fontSize: 8.5, cellPadding: 1.8, lineColor: [180, 180, 180], overflow: "linebreak" },
        headStyles: { fillColor: [13, 40, 24], textColor: [232, 185, 72], fontStyle: "bold" },
        columnStyles: { 0: { cellWidth: 14, halign: "center", fontStyle: "bold" }, 1: { cellWidth: 42 }, 2: { cellWidth: 26, halign: "center" }, 6: { cellWidth: 38 } },
        margin: { left: 14, right: 14 },
      });
      let y = doc.lastAutoTable.finalY + 8;
      if (y > 185) { doc.addPage(); y = 18; }
      doc.setFontSize(11); doc.setFont("helvetica", "bold");
      doc.text("Nominativi: " + insTotals.total + "      Già assicurati: " + insTotals.already + "      Da assicurare: " + insTotals.toInsure, 14, y);
      doc.text("Costo stimato (" + perPerson + " €/persona): € " + insTotals.cost, 14, y + 7);
      doc.save("TdP-Assicurazioni-" + new Date().toISOString().slice(0, 10) + ".pdf");
      showToast("PDF assicurazioni esportato");
    } catch (e) { alert("Errore export PDF: " + e.message); }
  };

  // ====== MAGLIE (per persona: maglie e canottiere separate, taglia, ritiro) ======
  const SIZE_ORDER = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "XXXL", "3XL", "4XL"];
  const sizeRank = (s) => { const i = SIZE_ORDER.indexOf((s || "").toUpperCase()); return i < 0 ? 999 : i; };

  // Migrazione una-tantum dai vecchi formati (items[] o item piatto) al nuovo per-persona
  useEffect(() => {
    const list = shirts || [];
    if (!list.length) return;
    const isOld = list.some(s => s && (Array.isArray(s.items) || s.type !== undefined));
    if (!isOld) return;
    const byName = {}; const order = [];
    const ensure = (name) => { const k = (name || "").trim().toLowerCase(); if (!byName[k]) { byName[k] = { id: uid(), name: name || "", size: "", qMaglie: 0, qCanottiere: 0, ritiro: "" }; order.push(k); } return byName[k]; };
    const add = (rec, type, size, qty, collected) => { const q = Number(qty) || 0; if (/canott/i.test(type || "")) rec.qCanottiere += q; else rec.qMaglie += q; if (size && !rec.size) rec.size = String(size).toUpperCase(); if (collected && !rec.ritiro) rec.ritiro = "totale"; };
    list.forEach(s => {
      if (!s) return;
      const rec = ensure(s.name);
      if (Array.isArray(s.items)) s.items.forEach(it => add(rec, it.type, it.size, it.qty, it.collected));
      else if (s.type !== undefined) add(rec, s.type, s.size, s.qty, s.collected);
    });
    setShirts(order.map(k => byName[k]));
  }, [shirts]);

  const handleShirtFile = (e) => {
    const file = e.target.files[0]; e.target.value = ""; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: "array", cellDates: true });
        const sn = wb.SheetNames.find(n => /magli/i.test(n)) || wb.SheetNames[0];
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header: 1, raw: true, defval: null });
        const hr = findHeaderRow(rows, { name: /persona|nome/i, size: /taglia/i, qty: /quantit/i, type: /tipologia/i, qMagl: /magli/i, qCanot: /canott/i });
        if (!hr) { alert('Non ho trovato la colonna "PERSONA" nello sheet "' + sn + '".'); return; }
        const splitCols = (hr.cols.qMagl != null || hr.cols.qCanot != null);
        const byName = {}; const order = [];
        for (let i = hr.idx + 1; i < rows.length; i++) {
          const r = rows[i] || [];
          const name = hr.cols.name != null && r[hr.cols.name] != null ? String(r[hr.cols.name]).trim() : "";
          if (!name) continue;
          if (/^totale/i.test(name)) break;
          const size = hr.cols.size != null && r[hr.cols.size] != null ? String(r[hr.cols.size]).trim().toUpperCase() : "";
          const k = name.toLowerCase();
          if (!byName[k]) { byName[k] = { name, size: "", qMaglie: 0, qCanottiere: 0 }; order.push(k); }
          const rec = byName[k];
          if (splitCols) {
            // Colonne dedicate "q maglie" e "q canotte"
            const numAt = (c) => (c != null && r[c] != null && !isNaN(Number(r[c]))) ? Number(r[c]) : 0;
            rec.qMaglie += numAt(hr.cols.qMagl);
            rec.qCanottiere += numAt(hr.cols.qCanot);
          } else {
            // Schema legacy: Tipologia + Quantità
            const typeRaw = hr.cols.type != null && r[hr.cols.type] != null ? String(r[hr.cols.type]).trim() : "";
            const qtyRaw = hr.cols.qty != null ? r[hr.cols.qty] : null;
            const hasInfo = !!(size || typeRaw || (qtyRaw != null && Number(qtyRaw) > 0));
            const qty = (qtyRaw != null && !isNaN(Number(qtyRaw)) && Number(qtyRaw) > 0) ? Number(qtyRaw) : (hasInfo ? 1 : 0);
            if (/canott/i.test(typeRaw)) rec.qCanottiere += qty;
            else if (typeRaw || hasInfo) rec.qMaglie += qty;
          }
          if (size && !rec.size) rec.size = size;
        }
        const people = order.map(k => byName[k]);
        if (!people.length) { alert("Nessun nominativo trovato nel foglio."); return; }
        setShirtPreview({ people, sheet: sn });
      } catch (err) { alert("Errore lettura file: " + err.message); }
    };
    reader.onerror = () => alert("Impossibile leggere il file");
    reader.readAsArrayBuffer(file);
  };

  const applyShirtImport = () => {
    if (!shirtPreview) return;
    setShirts(shirtPreview.people.map(p => ({ id: uid(), name: p.name, size: p.size || "", qMaglie: p.qMaglie || 0, qCanottiere: p.qCanottiere || 0, ritiro: "" })));
    setShirtPreview(null);
    showToast(shirtPreview.people.length + " righe importate");
  };

  const addRow = () => setShirts([...(shirts || []), { id: uid(), name: "", size: "", qMaglie: 0, qCanottiere: 0, ritiro: "" }]);
  const removeRow = (id) => setShirts(shirts.filter(p => p.id !== id));
  const updateRow = (id, patch) => setShirts(shirts.map(p => p.id === id ? Object.assign({}, p, patch) : p));

  const orderSummary = useMemo(() => {
    let totMaglie = 0, totCanottiere = 0, ritTot = 0, ritParz = 0;
    const bySize = {};
    (shirts || []).forEach(p => {
      const m = Number(p.qMaglie) || 0, c = Number(p.qCanottiere) || 0;
      totMaglie += m; totCanottiere += c;
      if (p.ritiro === "totale") ritTot++; else if (p.ritiro === "parziale") ritParz++;
      const s = (p.size || "—").toUpperCase();
      if (!bySize[s]) bySize[s] = { maglie: 0, canottiere: 0 };
      bySize[s].maglie += m; bySize[s].canottiere += c;
    });
    const sizeRows = Object.entries(bySize).map(([size, v]) => ({ size, maglie: v.maglie, canottiere: v.canottiere })).filter(r => r.maglie || r.canottiere).sort((a, b) => sizeRank(a.size) - sizeRank(b.size) || a.size.localeCompare(b.size));
    return { totMaglie, totCanottiere, ritTot, ritParz, sizeRows };
  }, [shirts]);

  const ritLabel = (v) => v === "totale" ? "Totale" : (v === "parziale" ? "Parziale" : "");

  const exportShirtsExcel = () => {
    try {
      const aoa = [["Nome", "Taglia", "Q Maglie", "Q Canotte", "Ritiro"]];
      (shirts || []).forEach(p => aoa.push([p.name || "", p.size || "", Number(p.qMaglie) || 0, Number(p.qCanottiere) || 0, ritLabel(p.ritiro)]));
      aoa.push([]);
      aoa.push(["RIEPILOGO ORDINE", "Taglia", "Maglie", "Canotte"]);
      orderSummary.sizeRows.forEach(r => aoa.push(["", r.size, r.maglie, r.canottiere]));
      aoa.push(["TOTALE", "", orderSummary.totMaglie, orderSummary.totCanottiere]);
      const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [{ wch: 24 }, { wch: 10 }, { wch: 10 }, { wch: 12 }, { wch: 10 }];
      XLSX.utils.book_append_sheet(wb, ws, "Maglie");
      XLSX.writeFile(wb, "TdP-Maglie-" + new Date().toISOString().slice(0, 10) + ".xlsx");
      showToast("Excel maglie esportato");
    } catch (e) { alert("Errore export: " + e.message); }
  };

  const exportShirtsPDF = () => {
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      doc.setFontSize(18); doc.setFont("helvetica", "bold");
      doc.text("Torneo del Prete 2026 — Maglie", 14, 16);
      doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100);
      doc.text("Generato il " + new Date().toLocaleDateString("it-IT") + " · Futsal Fabbrico ASD", 14, 22);
      doc.setTextColor(0);
      const body = (shirts || []).map(p => [p.name || "", p.size || "", String(Number(p.qMaglie) || 0), String(Number(p.qCanottiere) || 0), ritLabel(p.ritiro)]);
      doc.autoTable({
        startY: 28, head: [["Nome", "Taglia", "Q Maglie", "Q Canotte", "Ritiro"]], body, theme: "grid",
        styles: { fontSize: 9.5, cellPadding: 2, lineColor: [180, 180, 180] },
        headStyles: { fillColor: [13, 40, 24], textColor: [232, 185, 72], fontStyle: "bold" },
        columnStyles: { 1: { halign: "center" }, 2: { halign: "center" }, 3: { halign: "center" }, 4: { halign: "center" } },
        margin: { left: 14, right: 14 },
      });
      let y = doc.lastAutoTable.finalY + 8;
      doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("Riepilogo ordine", 14, y); y += 6;
      doc.setFontSize(10); doc.setFont("helvetica", "normal");
      orderSummary.sizeRows.forEach(r => { doc.text("Taglia " + r.size + ":   Maglie " + r.maglie + "  ·  Canotte " + r.canottiere, 16, y); y += 5; });
      doc.setFont("helvetica", "bold");
      doc.text("TOTALE:   Maglie " + orderSummary.totMaglie + "  ·  Canotte " + orderSummary.totCanottiere, 14, y + 1);
      doc.save("TdP-Maglie-" + new Date().toISOString().slice(0, 10) + ".pdf");
      showToast("PDF maglie esportato");
    } catch (e) { alert("Errore export PDF: " + e.message); }
  };

  return (
    <>
      <div className="section-head">
        <div><h1>Assicurazioni &amp; Maglie</h1></div>
      </div>

      <div className="stats-tabs">
        <button className={"stats-tab " + (tab === "assicurazioni" ? "active" : "")} onClick={() => setTab("assicurazioni")}>Assicurazioni</button>
        <button className={"stats-tab " + (tab === "maglie" ? "active" : "")} onClick={() => setTab("maglie")}>Maglie</button>
      </div>

      {/* ============ ASSICURAZIONI ============ */}
      {tab === "assicurazioni" && (
        <div className="shifts-panel">
          <div className="shifts-panel-head">
            <h3>Assicurazioni ({insurance.length})</h3>
            <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
              <input ref={insInputRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" onChange={handleInsFile} style={{display:"none"}} />
              <button className="btn btn-sm btn-gold" onClick={() => insInputRef.current && insInputRef.current.click()} title="Importa lo sheet Dati assicurazioni">📥 Importa</button>
              {insurance.length > 0 && <button className="btn btn-sm btn-gold" onClick={exportInsPDF}>📄 PDF</button>}
              {insurance.length > 0 && <button className="btn btn-sm btn-gold" onClick={exportInsExcel}>📊 Excel</button>}
              <button className="btn btn-sm btn-primary" onClick={addInsRow}>+ Riga</button>
            </div>
          </div>

          <div className="extra-summary">
            <div className="extra-card"><div className="lbl">Nominativi</div><div className="val">{insTotals.total}</div></div>
            <div className="extra-card"><div className="lbl">Già assicurati</div><div className="val">{insTotals.already}</div></div>
            <div className="extra-card"><div className="lbl">Da assicurare</div><div className="val">{insTotals.toInsure}</div></div>
            <div className="extra-card cost"><div className="lbl">Costo stimato</div><div className="val">€ {insTotals.cost}</div></div>

              <div className="lbl">€ / persona</div>

                      <td><input className="size" type="text" value={p.size || ""} onChange={e => updateRow(p.id, { size: e.target.value.toUpperCase() })} placeholder="—" /></td>
                      <td className="c"><input className="qty" type="number" min="0" value={p.qMaglie} onChange={e => updateRow(p.id, { qMaglie: Math.max(0, parseInt(e.target.value) || 0) })} /></td>
                      <td className="c"><input className="qty" type="number" min="0" value={p.qCanottiere} onChange={e => updateRow(p.id, { qCanottiere: Math.max(0, parseInt(e.target.value) || 0) })} /></td>

      {/* MODALE CONFERMA IMPORT ASSICURAZIONI */}
      {insPreview && (

                <thead><tr><th className="c">Assic.</th><th>Nome</th><th>Stato</th></tr></thead>
                <tbody>
                  {insPreview.people.map((p, i) => {
                    const exists = insurance.some(x => x.name.trim().toLowerCase() === p.name.toLowerCase());
                    return (
                      <tr key={i} className={p.insured ? "insured-row" : ""}>

                        <td>{p.name}</td>

              <button className="btn" onClick={() => setInsPreview(null)}>Annulla</button>

      {/* MODALE CONFERMA IMPORT MAGLIE */}
      {shirtPreview && (
        <div className="modal-overlay" onClick={() => setShirtPreview(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth: 560}}>
            <div className="modal-head">
              <h2>Importa gestione maglie</h2>
              <div className="subtitle" style={{fontStyle:"italic", color:"var(--ink-soft)", fontSize:13, marginTop:4}}>
                Foglio “{shirtPreview.sheet}” · {shirtPreview.people.length} persone · {shirtPreview.people.reduce((a,p)=>a+(p.qMaglie||0),0)} maglie · {shirtPreview.people.reduce((a,p)=>a+(p.qCanottiere||0),0)} canotte

              <table className="extra-table">

                <tbody>
                  {shirtPreview.people.map((p, i) => (
                    <tr key={i}>
                      <td>{p.name}</td>
                      <td>{p.size || "—"}</td>
                      <td className="c">{p.qMaglie || 0}</td>
                      <td className="c">{p.qCanottiere || 0}</td>

                  ))}
                </tbody>
              </table>
            </div>
            <p style={{fontSize:12.5, color:"var(--terracotta-dark)", marginTop:10}}>
              ⚠ L'import <b>sostituisce</b> l'elenco maglie attuale con le righe del foglio.

              <button className="btn" onClick={() => setShirtPreview(null)}>Annulla</button>
